  </g>

  <!-- Left accent border -->
  <rect x="0" y="0" width="6" height="630" fill="#e06030" opacity="0.7"/>

  <!-- Text content -->
  <text x="80" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-weight="400" fill="#f2e4c4" letter-spacing="-1">Cal St Francis</text>
