on":"Forward Hold","mood":"tense","art":"pavel","on_enter":{"note":"pavel_she_said","thought":"kenosis_thought"},"text":["Pavel looks at you for a long moment.","'She said you are asleep. Not as an insult. She says it warmly — like someone watching a person sleep who is glad they are resting but knows it is nearly time.'","He adjusts his coat.","'She is not wrong about you, you know. Sorry. I say things like that. It happens.'"],"choices":[{"text":"'What does nearly time mean?'","next":"pavel_act2_bridge","effect":{"doubt":1}},{"text":"'Are you always like this?'","next":"pavel_act2_bridge","effect":{"communion":1}},{"text":"Walk away. You need to think.","next":"corridor_first"}]},"pavel_matters":{"location":"Forward Hold","mood":"neutral","text":["'Something is going to be decided on this ship, and the deciding will have consequences beyond the crossing. That is as specific as I can be. She does not send memos.'"],"choices":[{"text":"'What is your role in what is being decided?'","next":"pavel_about_you","effect":{"doubt":1}},{"text":"'What is mine?'","next":"pavel_about_you","effect":{"communion":1}}]},"pavel_understands":{"location":"Forward Hold","mood":"neutral","text":["He stops. Takes inventory.","'Good. Then we can skip several conversations I was prepared to have.'","'Tell me what you know about this crossing.'"],"choices":[{"text":"'Less than you, I think.'","next":"pavel_about_you","effect":{"communion":1}},{"text":"'I know I am the chaplain and I do not fully know why.'","next":"pavel_about_you","effect":{"doubt":1}}]},"pavel_life":{"location":"Forward Hold","mood":"neutral","text":["Postal worker. Teacher of postal workers. Civic administration. Then nothing for a while. Then this.","'She did not ask if I was convenient. She asked if I was available. I said yes before I knew what I was saying yes to. That seemed to be the right answer.'"],"choices":[{"text":"'What did you say yes to?'","next":"pavel_about_you","effect":{"doubt":1}},{"text":"'That is how it tends to work.'","next":"pavel_about_you","effect":{"communion":1}}]},"pavel_act2_bridge":{"location":"Forward Hold","mood":"neutral","on_enter":{"flag":"act2_unlocked"},"text":["You stay in the hold with Pavel for a while. The engines move through the floor. He talks. You listen.","You are good at listening. You may have always been good at it.","At some point he says: 'She is not wrong about you, you know.' He has said this before. He does not know he has said it before.","'The ship will be at port in three days,' he says. 'She is very clear that three days is enough. For both of us.'","You do not yet know what you are for. But something is for you.","New parts of the ship have opened to you. The sick bay. Cabin 2. The engine room. You should explore."],"choices":[{"text":"Go to the sick bay.","next":"sick_bay"},{"text":"Go to the passenger section. Cabin 2.","next":"passenger_corridor"},{"text":"Go to the engine room.","next":"engine_room"},{"text":"Return to the chapel.","next":"chapel_waking"}]},"act3_approach":{"location":"The Ship's Chapel","mood":"neutral","on_enter":{"flag":"act3_unlocked"},"text":["You sit in the chapel for a long time.","The {ICON} is on the table. Its counterpart is in the lower hold, documented in a language you can now partially read.","You were sent here to authenticate a transfer. The transfer would take both icons further from the people they belong to. Further from the community that made them, lost them, and is still, in its dispersed way, waiting.","The ship will reach port in less than a day.","Pavel is on this ship because she told him to be here. Butterantonio is here because the dispersed community can still commission someone. Sinhola is here to translate. Tim's hands know something now.","You were sent here by whoever wants the transfer to succeed.","You have to decide what you are."],"choices":[{"text":"Go to the hold. Make your choice.","next":"the_choice"}]},"the_choice":{"location":"Forward Hold — Lower Aft","mood":"tense","text":["You stand before the container.","It is warm. Your hands are near the seal.","Pavel is behind you somewhere. You hear him not speaking.","The port is close. You have perhaps six hours.","Three things you could do."],"choices":[{"text":"Complete the mission. Authenticate the transfer. The icons go West.","next":"ending_intercept"},{"text":"Facilitate the return. The icons go back to the people they belong to.","next":"ending_facilitate"},{"text":"Witness and record. Do not act. Let the mechanism play out without your hand in it.","next":"ending_witness"}]},"ending_intercept":{"location":"Forward Hold — Lower Aft","mood":"tense","text":["You do what you were sent to do.","The authentication is a formality. A signature on a document that Butterantonio brings to you, looking at you carefully. You sign it.","The container reaches its destination. The icons enter a private collection. They are well preserved. They are never seen publicly.","You wake again on another ship, another crossing. The harbour was grey. The coffee was thick.","Something is different. You cannot locate what.","Pavel is not on this crossing.","Спасибо."],"choices":[{"text":"[ Begin the next crossing ]","next":"__new_play__","style":"cold"}]},"ending_facilitate":{"location":"Forward Hold — Lower Aft","mood":"revelation","text":["You do not authenticate the transfer.","You find Butterantonio and tell him what you know. He listens. He nods once, very slowly, and opens his briefcase.","What follows is complicated and takes the remaining hours. Sinhola translates documentation. Butterantonio makes calls. Vance does not prevent anything. Merky asks you once, quietly, if you know what you are doing. You tell them the truth.","The container does not reach its intended destination.","Pavel weeps, which he does not appear to notice.","You wake again. The harbour was grey. The coffee was thick. The {ICON} on the table was facing the right direction — and you knew it.","Спасибо.","───────────────────────────────────────","The next crossing begins differently."],"choices":[{"text":"[ Begin the next crossing ]","next":"__new_play__","style":"cold"}]},"ending_witness":{"location":"Forward Hold — Lower Aft","mood":"uncanny","text":["You do not sign. You do not intervene.","You stand near the container and you witness.","The transfer happens without your authentication, which means it is not authenticated, which means it is legally and liturgically incomplete. Butterantonio explains this to someone on the other end of a communication you do not hear directly.","The container is held at the port. The matter is referred to people who will argue about it for years.","You have not stopped anything. You have not helped anything. You have created a delay. Perhaps the delay is enough.","Pavel says: 'That was the hardest of the three.' He does not say whether he means hardest to do or hardest to justify.","You wake again. The harbour was grey. The coffee was thick. The {ICON} faced the wrong direction.","You knew it before you looked.","Спасибо."],"choices":[{"text":"[ Begin the next crossing ]","next":"__new_play__","style":"cold"}]}};

// ── UTILITIES ─────────────────────────────────────────────────
function hasFlag(f){return G.flags.has(f);}
function addNote(key){
  if(!key||G.notes.includes(key))return;
  G.notes.push(key);
  const l=noteLabel(key);showToast(l.length>52?l.slice(0,52)+'\u2026':l,'note');
}
function setFlag(f){if(f)G.flags.add(f);}
function applyEffect(e){if(!e)return;for(const[k,v]of Object.entries(e))if(G.stats[k]!==undefined)G.stats[k]=Math.max(0,G.stats[k]+v);}
function setCover(key,value){G.cover[key]=value;setFlag('cover_'+key+'_set');}
function showToast(msg,type){
  const old=document.querySelector('.note-toast');if(old)old.remove();
  const t=document.createElement('div');
  t.className='note-toast'+(type==='sounding'?' sounding-toast':'');
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{if(t.parentNode)t.remove();},3200);
}

function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({stats:G.stats,charisms:G.charisms,soundings:G.soundings,cover:G.cover,notes:G.notes,flags:[...G.flags],scene:G.scene,mode:G.mode}));
    const el=document.querySelector('.save-indicator');
    if(el){el.style.display='block';el.style.animation='none';void el.offsetWidth;el.style.animation='save-flash 2.2s ease forwards';setTimeout(()=>{if(el)el.style.display='none';},2300);}
  }catch(e){console.warn('Save:',e);}
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;
    const s=JSON.parse(raw);
    G.stats=s.stats||G.stats;G.charisms=s.charisms||[];
    G.soundings=s.soundings||{available:[],taken:[],settled:[]};
    G.cover=s.cover||G.cover;G.notes=s.notes||[];
    G.flags=new Set(s.flags||[]);G.scene=s.scene||'chapel_waking';G.mode=s.mode||'attended';
    G.phase='game';return true;
  }catch(e){console.warn('Load:',e);return false;}
}
function commitPlay(){
  G.playCount++;
  try{
    localStorage.setItem(PLAY_KEY,G.playCount.toString());
    const m=[...new Set([...G.pastFlags,...G.flags])];
    localStorage.setItem(FLAGS_KEY,JSON.stringify(m));G.pastFlags=m;
  }catch(e){}
}
function newPlay(){
  commitPlay();
  G.stats={vigilance:0,composure:0,communion:0,doubt:0};G.charisms=[];
  G.soundings={available:[],taken:[],settled:[]};G.soundingPending=null;
  G.cover={posting:null,background:null,denomination:null,connection:null,left:null};
  G.notes=[];G.flags=new Set();G.scene='chapel_waking';G.phase='charism';
  G.panelOpen=null;G.confirmRestart=false;render();
}

// ── RENDER DISPATCHER ─────────────────────────────────────────
function render(){
  const root=document.getElementById('root');root.innerHTML='';
  if(G.phase==='title')renderTitle(root);
  else if(G.phase==='mode')renderMode(root);
  else if(G.phase==='charism')renderCharism(root);
  else if(G.phase==='game')renderGame(root);
}

// ── TITLE ─────────────────────────────────────────────────────
function renderTitle(root){
  setMood('neutral');
  const replay=G.playCount>0,hasSave=!!localStorage.getItem(SAVE_KEY);
  root.innerHTML=`<div class="title-screen">
    <div class="title-cyrillic">\u0421\u041f\u0410\u0421\u0418\u0411\u041e</div>
    <div class="title-romanised">Spasibo</div>
    <div class="title-translation">Thank You</div>
    <pre class="title-ship">
            ___
       ____/ | \\____
  ~~~~|______________|~~~~
    ~~~~~~~~~~~~~~~~~~~~~~~~~~</pre>
    <div class="title-sub${replay?' replay':''}"> ${replay?'another crossing.':'a crossing.'}</div>
    <div class="title-btns">
      ${hasSave?'<button class="btn" onclick="continueGame()">Continue crossing</button><button class="btn btn-sm" onclick="G.phase=\'mode\';render()">New crossing</button>':'<button class="btn" onclick="G.phase=\'mode\';render()">Begin the crossing</button>'}
    </div>
    ${replay?`<div style="margin-top:.8rem;font-size:.66rem;color:var(--text-dim);letter-spacing:.1em">crossing ${G.playCount+1}</div>`:''}
  </div>`;
}
function continueGame(){if(loadGame())render();else{G.phase='mode';render();}}

// ── MODE ──────────────────────────────────────────────────────
function renderMode(root){
  root.innerHTML=`<div class="sel-screen"><div class="sel-h">How will you cross?</div><div class="sel-sub">Can be changed on a new crossing.</div><div class="sel-grid">
    <div class="sel-opt${G.mode==='attended'?' chosen':''}" onclick="G.mode='attended';render()"><div class="sel-name">First Crossing</div><div class="sel-desc">Mechanics visible. The game tells you what it is asking and why. Locked choices show their requirements.</div></div>
    <div class="sel-opt${G.mode==='open'?' chosen':''}" onclick="G.mode='open';render()"><div class="sel-name">Open Water</div><div class="sel-desc">Less held. The game trusts you. Some things are not explained. Locked choices are simply absent.</div></div>
  </div><button class="btn" onclick="G.phase='charism';render()">Continue</button></div>`;
}

// ── CHARISM ───────────────────────────────────────────────────
function renderCharism(root){
  const showWaking=G.playCount>=2;
  const div=document.createElement('div');div.className='sel-screen';
  let html=`<div class="sel-h">A charism.</div><div class="sel-sub">Not a skill. Something given \u2014 though it needs to be used to mean anything.${showWaking?'<br><span style="color:var(--cold);font-size:.76rem">Something new is available to those who have crossed before.</span>':''}</div><div class="sel-section">Sleeping</div>`;
  CHARISMS.sleeping.forEach(c=>{html+=`<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')"><div class="sel-name sel-name-cold">${c.name}</div><div class="sel-desc">${c.desc}</div></div>`;});
  if(showWaking){html+=`<div class="sel-section sel-section-cold">Waking</div>`;CHARISMS.waking.forEach(c=>{html+=`<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')"><div class="sel-name sel-name-cold">${c.name}</div><div class="sel-desc">${c.desc}</div></div>`;});}
  html+=`<button class="btn btn-cold" style="margin-top:1.5rem" ${G.charisms.length===0?'disabled':''} onclick="beginGame()">Board the ship</button>`;
  div.innerHTML=html;root.appendChild(div);
}
function selCharism(id){G.charisms=G.charisms.includes(id)?[]:[id];render();}
function beginGame(){
  if(!G.charisms.length)return;
  G.charisms.forEach(id=>addNote('charism_'+id));
  if(G.charisms.includes('kenosis'))offerSounding('kenosis_thought');
  if(G.charisms.includes('apophasis'))offerSounding('via_negativa');
  G.phase='game';G.scene='chapel_waking';render();
}

// ── GAME RENDER ────────────────────────────────────────────────
function renderGame(root){
  const scene=SCENES[G.scene];
  if(!scene){root.innerHTML=`<p style="padding:2rem;color:var(--rust)">Scene not found: ${G.scene}</p>`;return;}
  setMood(scene.mood||'neutral');
  saveGame();

  // on_enter fires once per scene
  const visitKey='visited_'+G.scene;
  const isFirstVisit=!hasFlag(visitKey);
  if(isFirstVisit){
    setFlag(visitKey);
    if(scene.on_enter){
      if(scene.on_enter.note)addNote(scene.on_enter.note);
      if(scene.on_enter.flag)setFlag(scene.on_enter.flag);
      if(scene.on_enter.thought)offerSounding(scene.on_enter.thought);
    }
  }

  const wrap=document.createElement('div');wrap.className='game';

  // Sticky header
  const hdr=document.createElement('div');hdr.className='game-header';
  const si=document.createElement('div');si.className='save-indicator';si.textContent='\u25e6 autosaved';si.style.display='none';hdr.appendChild(si);
  const moodCls=scene.mood==='uncanny'?' uncanny':scene.mood==='revelation'?' revelation':'';
  const lb=document.createElement('div');lb.className='location-bar'+moodCls;lb.textContent=scene.location;hdr.appendChild(lb);
  const sb=document.createElement('div');sb.className='sbar';
  Object.entries(G.stats).forEach(([k,v])=>{
    const d=document.createElement('div');d.className='stat';
    d.innerHTML=k+' <span class="stat-val">'+v+'</span>';
    sb.appendChild(d);
  });
  hdr.appendChild(sb);
  const tags=[];
  G.charisms.forEach(id=>{const c=findCharism(id);if(c)tags.push('<span class="ctag">'+c.name+'</span>');});
  const cc=Object.values(G.cover).filter(Boolean).length;if(cc>0)tags.push('<span class="cover-tag">cover '+cc+'/5</span>');
  const tc=G.soundings.taken.length+G.soundings.settled.length,ta=G.soundings.available.length;
  if(tc>0||ta>0)tags.push('<span class="breviary-tag">\u2693 '+tc+'/'+MAX_SOUNDINGS+(ta?' +'+ta:'')+'</span>');
  if(tags.length){const cb=document.createElement('div');cb.className='cbar';cb.innerHTML=tags.join('');hdr.appendChild(cb);}
  wrap.appendChild(hdr);

  // Body
  const body=document.createElement('div');body.className='game-body';
  if(scene.art&&ART[scene.art]){const art=document.createElement('pre');art.className='art-block';art.textContent=ART[scene.art];body.appendChild(art);}

  // Text + anamnesis
  const stxt=document.createElement('div');stxt.className='stxt';
  const showAnam=G.playCount>0&&scene.anamnesis;
  scene.text.forEach((raw,idx)=>{
    const p=document.createElement('p');p.className='sp';p.innerHTML=processText(raw);stxt.appendChild(p);
    if(showAnam&&scene.anamnesis.after===idx){
      const ap=document.createElement('p');ap.className='sp sp-anamnesis';ap.innerHTML=processText(scene.anamnesis.text);stxt.appendChild(ap);
      if(scene.anamnesis.note)addNote(scene.anamnesis.note);
    }
  });
  body.appendChild(stxt);

  // Choices
  const cd=document.createElement('div');cd.className='choices';
  if(scene.return_to){
    const rb=document.createElement('button');rb.className='choice choice-return';
    rb.textContent=scene.return_label||'Return.';rb.onclick=()=>navigate(scene.return_to);
    cd.appendChild(rb);
  }
  scene.choices.forEach(ch=>{
    if(ch.hide_if&&hasFlag(ch.hide_if))return;
    if(ch.show_if&&!hasFlag(ch.show_if))return;
    if(ch.once&&ch.next&&hasFlag('visited_'+ch.next))return;
    const btn=document.createElement('button');
    let locked=false;
    if(ch.requires_flag&&!hasFlag(ch.requires_flag))locked=true;
    if(ch.requires_stat){const[s,m]=ch.requires_stat;if((G.stats[s]||0)<m)locked=true;}
    if(locked){
      if(G.mode==='open')return; // Open Water: hide locked choices entirely
      btn.className='choice choice-locked';btn.disabled=true;
      btn.textContent=processText(ch.text)+(ch.requires_stat?` [${ch.requires_stat[0]} ${ch.requires_stat[1]}+]`:'');
    }else{
      const tv=ch.next&&hasFlag('visited_'+ch.next)&&scene.hub;
      let cls='choice';
      if(ch.style==='cold')cls+=' choice-cold';
      if(ch.style==='return')cls+=' choice-return';
      if(ch.style==='vespers')cls+=' choice-vespers';
      if(ch.cover_set)cls+=' choice-cover';
      if(tv)cls+=' choice-visited';
      btn.className=cls;
      btn.innerHTML=(tv?'\u25e6 ':'')+processText(ch.text);
      if(ch.cover_set&&!hasFlag('cover_'+ch.cover_set.key+'_set')){
        const lbl=document.createElement('span');lbl.className='cover-label';lbl.textContent='\u2b25 establishing cover';btn.appendChild(lbl);
      }
      btn.onclick=()=>applyChoice(ch);
    }
    cd.appendChild(btn);
  });
  body.appendChild(cd);

  if(G.notes.length){
    const od=document.createElement('div');od.className='obs-section';
    const ot=document.createElement('div');ot.className='obs-title';ot.textContent='observations';od.appendChild(ot);
    G.notes.slice(-4).forEach(k=>{const d=document.createElement('div');d.className='obs-item';d.textContent=noteLabel(k);od.appendChild(d);});
    body.appendChild(od);
  }

  const rb2=document.createElement('div');rb2.className='restart-bar';
  if(G.confirmRestart){
    const msg=document.createElement('span');msg.className='confirm-msg';msg.textContent='End this crossing?';rb2.appendChild(msg);
    const yes=document.createElement('button');yes.className='btn confirm-yes';yes.textContent='Yes \u2014 return to shore';yes.onclick=doRestart;rb2.appendChild(yes);
    const no=document.createElement('button');no.className='btn confirm-no';no.textContent='No \u2014 continue';no.onclick=()=>{G.confirmRestart=false;render();};rb2.appendChild(no);
  }else{
    const rbt=document.createElement('button');rbt.className='btn restart-btn';rbt.textContent='abandon crossing';rbt.onclick=()=>{G.confirmRestart=true;render();};rb2.appendChild(rbt);
  }
  body.appendChild(rb2);
  wrap.appendChild(body);
  root.appendChild(wrap);

  // Panel buttons — createElement only, never innerHTML+= after appendChild
  const nb=document.createElement('button');nb.className='notes-btn';nb.textContent='observations';nb.onclick=()=>openPanel('notes');root.appendChild(nb);
  const sb2=document.createElement('button');sb2.className='status-btn';sb2.textContent='status';sb2.onclick=()=>openPanel('status');root.appendChild(sb2);
  const bb=document.createElement('button');bb.className='breviary-btn';bb.textContent='breviary';bb.onclick=()=>openPanel('breviary');root.appendChild(bb);

  if(G.panelOpen==='notes')renderNotesPanel(root);
  if(G.panelOpen==='status')renderStatusPanel(root);
  if(G.panelOpen==='breviary')renderBreviaryPanel(root);
}

function navigate(id){
  const isNew=!hasFlag('visited_'+id);
  G.scene=id;
  // FIX: only tick soundings on genuinely new scene visits
  if(isNew)tickSoundings();
  window.scrollTo(0,0);render();
}

function applyChoice(ch){
  applyEffect(ch.effect);
  if(ch.set_flag)setFlag(ch.set_flag);
  if(ch.set_flag2)setFlag(ch.set_flag2);
  if(ch.set_note)addNote(ch.set_note);
  if(ch.cover_set)setCover(ch.cover_set.key,ch.cover_set.value);
  if(ch.thought)offerSounding(ch.thought);
  if(ch.next==='__new_play__'){newPlay();return;}
  if(ch.next&&ch.next.startsWith('pavel_'))setFlag('met_pavel_flag');
  navigate(ch.next);
}

// ── PANELS ────────────────────────────────────────────────────
function openPanel(w){G.panelOpen=G.panelOpen===w?null:w;render();}
function mkOverlay(fn){const o=document.createElement('div');o.className='overlay-bg';o.onclick=fn;return o;}

function renderNotesPanel(root){
  const p=document.createElement('div');p.className='side-panel side-panel-r';
  const h=document.createElement('h3');h.style.color='var(--amber)';
  h.innerHTML='<button class="panel-close" onclick="openPanel(\'notes\')">\u2715</button>Observations';p.appendChild(h);
  if(!G.notes.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='Nothing noted yet.';p.appendChild(d);}
  else[...G.notes].reverse().forEach(k=>{const d=document.createElement('div');d.className='panel-item';d.textContent=noteLabel(k);p.appendChild(d);});
  root.appendChild(mkOverlay(()=>openPanel('notes')));root.appendChild(p);
}

function renderStatusPanel(root){
  const cl={posting:'Reason here',background:'Prior work',denomination:'Declared tradition',connection:'Claims to know',left:'Left behind'};
  const p=document.createElement('div');p.className='side-panel side-panel-l';
  const h=document.createElement('h3');h.style.color='var(--cold)';
  h.innerHTML='<button class="panel-close" onclick="openPanel(\'status\')">\u2715</button>Status';p.appendChild(h);
  const addSec=t=>{const s=document.createElement('div');s.className='panel-sec';s.textContent=t;p.appendChild(s);};
  const addRow=(a,b,bc)=>{const r=document.createElement('div');r.className='stat-row';r.innerHTML=`<span style="color:var(--text-dim)">${a}</span><span style="color:${bc||'var(--text-bright)'};font-weight:bold;font-size:.78rem">${b}</span>`;p.appendChild(r);};
  addSec('Stats');Object.entries(G.stats).forEach(([k,v])=>addRow(k,v));
  addSec('Charisms');
  if(!G.charisms.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='None.';p.appendChild(d);}
  else G.charisms.forEach(id=>{const c=findCharism(id);if(!c)return;const d=document.createElement('div');d.className='panel-item';d.innerHTML=`<strong>${c.name}</strong> \u2014 ${c.desc}`;p.appendChild(d);});
  addSec('Cover');
  Object.entries(G.cover).forEach(([k,v])=>addRow(cl[k]||k,v?v.replace(/_/g,' '):'\u2014',v?'var(--amber)':'var(--border-mid)'));
  addSec('Crossing');addRow('number',G.playCount+1);
  root.appendChild(mkOverlay(()=>openPanel('status')));root.appendChild(p);
}

function renderBreviaryPanel(root){
  const p=document.createElement('div');p.className='side-panel side-panel-c';
  const h=document.createElement('h3');h.style.color='var(--thought)';
  h.innerHTML='<button class="panel-close" onclick="G.soundingPending=null;openPanel(\'breviary\')">\u2715</button>The Breviary <span style="font-size:.65rem;color:var(--thought-dim)">('+G.soundings.taken.length+'/'+MAX_SOUNDINGS+' taking)</span>';
  p.appendChild(h);

  if(G.soundingPending){
    const pd=SOUNDINGS[G.soundingPending];
    const warn=document.createElement('div');
    warn.style.cssText='border:1px solid var(--rust);padding:.8rem;margin-bottom:1rem;font-size:.78rem;color:var(--rust);line-height:1.6;';
    warn.textContent='Breviary full. To take "'+pd.name+'", release a sounding below.';
    p.appendChild(warn);
  }

  if(G.soundings.available.length){
    const s=document.createElement('div');s.className='panel-sec';s.textContent='Available \u2014 not yet taken';p.appendChild(s);
    G.soundings.available.forEach(id=>{
      const snd=SOUNDINGS[id];if(!snd)return;
      const card=document.createElement('div');card.className='sounding-card';
      card.innerHTML='<div class="sounding-name">'+snd.name+'</div><div class="sounding-fragment">'+snd.fragment+'</div><div class="sounding-origin">'+snd.origin+'</div><div class="sounding-body">'+processText(snd.taking)+'</div>';
      const full=G.soundings.taken.length>=MAX_SOUNDINGS&&!G.soundingPending;
      const btn=document.createElement('button');btn.className='sounding-btn sounding-btn-take';
      btn.textContent=full?'Breviary full \u2014 release a sounding first':'Take this sounding';
      btn.disabled=full;if(!full)btn.onclick=()=>takeSounding(id);
      card.appendChild(btn);p.appendChild(card);
    });
  }

  if(G.soundings.taken.length){
    const s=document.createElement('div');s.className='panel-sec';s.textContent='Taking \u2014 in progress';p.appendChild(s);
    G.soundings.taken.forEach(({id,progress})=>{
      const snd=SOUNDINGS[id];if(!snd)return;
      const card=document.createElement('div');card.className='sounding-card';
      card.innerHTML='<div class="sounding-name">'+snd.name+'</div><div class="sounding-progress">'+soundingBar(progress,SOUNDING_THRESHOLD)+' '+progress+'/'+SOUNDING_THRESHOLD+'</div><div class="sounding-body">'+processText(snd.taking)+'</div>';
      const btn=document.createElement('button');btn.className='sounding-btn sounding-btn-release';
      btn.textContent='Release (lose permanently)';
      btn.onclick=()=>{if(confirm('Release "'+snd.name+'"?\nThis sounding will be lost.'))releaseSounding(id);};
      card.appendChild(btn);p.appendChild(card);
    });
  }

  if(G.soundings.settled.length){
    const s=document.createElement('div');s.className='panel-sec';s.textContent='Settled';p.appendChild(s);
    G.soundings.settled.forEach(id=>{
      const snd=SOUNDINGS[id];if(!snd)return;
      const card=document.createElement('div');card.className='sounding-card sounding-settled';
      card.innerHTML='<div class="sounding-name">'+snd.name+' \u25cf</div><div class="sounding-fragment">'+snd.fragment+'</div><div class="sounding-body">'+processText(snd.settled)+'</div><div class="sounding-effect">'+snd.effect_desc+'</div>';
      p.appendChild(card);
    });
  }

  if(!G.soundings.available.length&&!G.soundings.taken.length&&!G.soundings.settled.length){
    const d=document.createElement('div');d.className='panel-empty';
    d.textContent='No soundings yet. They surface through choices \u2014 and must be deliberately taken.';p.appendChild(d);
  }

  root.appendChild(mkOverlay(()=>{G.soundingPending=null;openPanel('breviary');}));root.appendChild(p);
}

// ── RESTART ───────────────────────────────────────────────────
function doRestart(){
  commitPlay();try{localStorage.removeItem(SAVE_KEY);}catch(e){}
  G.phase='title';G.flags=new Set();G.notes=[];
  G.stats={vigilance:0,composure:0,communion:0,doubt:0};G.charisms=[];
  G.soundings={available:[],taken:[],settled:[]};G.soundingPending=null;
  G.cover={posting:null,background:null,denomination:null,connection:null,left:null};
  G.panelOpen=null;G.confirmRestart=false;G.scene='chapel_waking';render();
}

render();
</script>
</body>
</html>
