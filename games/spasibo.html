<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>СПАСИБО — v0.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:           #06080c;
  --text:         #a8bcc8;
  --text-dim:     #526070;
  --text-bright:  #d4e4f0;
  --amber:        #b08030;
  --amber-dim:    #5a4018;
  --cold:         #5aa0b8;
  --cold-dim:     #1a3040;
  --rust:         #8a3828;
  --border:       #182028;
  --border-mid:   #283848;
  --border-bright:#3a5060;
  --choice-bg:    rgba(10,14,20,0.72);
  --choice-hover: rgba(18,26,34,0.92);
}
body { background:var(--bg); color:var(--text); font-family:"Courier Prime","Courier New",monospace; min-height:100vh; overflow-x:hidden; }
#atmos { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; }
#root  { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

@keyframes fi        { from{opacity:0} to{opacity:1} }
@keyframes pulse-cold{ 0%,100%{color:var(--cold)} 50%{color:var(--cold-dim)} }
@keyframes flicker   { 0%,100%{opacity:1} 45%{opacity:.88} 46%{opacity:1} 80%{opacity:.95} }
@keyframes slide-r   { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes slide-l   { from{transform:translateX(-100%)} to{transform:translateX(0)} }
@keyframes toast-in  { from{opacity:0;transform:translateY(.5rem)} to{opacity:1;transform:translateY(0)} }
@keyframes toast-out { to{opacity:0;transform:translateY(-.5rem)} }

/* ── TITLE ─────────────────────────────────────────────── */
.title-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:3rem 2rem; animation:fi 3s ease-in; }
.title-cyrillic { font-family:"Special Elite",serif; font-size:clamp(2.8rem,8vw,5rem); color:var(--text-bright); letter-spacing:.35em; margin-bottom:.4rem; text-shadow:0 0 40px rgba(90,160,184,0.12); }
.title-romanised { font-size:.72rem; color:var(--text-dim); letter-spacing:.3em; text-transform:uppercase; margin-bottom:.2rem; }
.title-translation { font-size:.68rem; color:var(--amber-dim); letter-spacing:.18em; font-style:italic; margin-bottom:3.5rem; }
.title-ship { font-family:"Courier Prime",monospace; font-size:.62rem; color:var(--border-mid); white-space:pre; line-height:1.3; margin-bottom:3rem; animation:flicker 8s ease-in-out infinite; }
.title-sub { font-size:.78rem; color:var(--text-dim); letter-spacing:.12em; font-style:italic; margin-bottom:2rem; }
.title-sub.replay { color:var(--cold-dim); animation:pulse-cold 4s ease-in-out infinite; }
.title-btns { display:flex; flex-direction:column; gap:.6rem; align-items:center; }

/* ── BUTTONS ─────────────────────────────────────────── */
.btn { background:transparent; border:1px solid var(--border-mid); color:var(--amber); font-family:"Courier Prime",monospace; font-size:.84rem; padding:.6rem 1.8rem; cursor:pointer; letter-spacing:.12em; transition:all .2s; }
.btn:hover { border-color:var(--amber); color:var(--text-bright); }
.btn:disabled { opacity:.3; cursor:default; }
.btn-sm { font-size:.72rem; padding:.45rem 1.2rem; border-color:var(--border); color:var(--text-dim); }
.btn-sm:hover { border-color:var(--border-mid); color:var(--text); }
.btn-cold { border-color:var(--cold-dim); color:var(--cold); }
.btn-cold:hover { border-color:var(--cold); color:var(--text-bright); }

/* ── MODE / CHARISM SCREENS ──────────────────────────── */
.sel-screen { max-width:620px; width:100%; padding:3rem 1.5rem 4rem; animation:fi .8s ease-in; }
.sel-h { font-family:"Special Elite",serif; font-size:1.1rem; color:var(--text-bright); letter-spacing:.18em; margin-bottom:.4rem; text-align:center; }
.sel-sub { font-size:.78rem; color:var(--text-dim); letter-spacing:.08em; margin-bottom:2rem; text-align:center; font-style:italic; }
.sel-grid { display:flex; flex-direction:column; gap:.9rem; margin-bottom:2rem; }
.sel-opt { border:1px solid var(--border); padding:1.1rem 1.3rem; cursor:pointer; transition:all .2s; background:var(--choice-bg); }
.sel-opt:hover { border-color:var(--border-bright); background:var(--choice-hover); }
.sel-opt.chosen { border-color:var(--amber); }
.sel-opt.chosen-cold { border-color:var(--cold); }
.sel-name { font-family:"Special Elite",serif; font-size:1rem; color:var(--amber); letter-spacing:.1em; margin-bottom:.35rem; }
.sel-name-cold { color:var(--cold); }
.sel-desc { font-size:.78rem; color:var(--text-dim); line-height:1.65; }
.sel-section { font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--amber-dim); margin:.9rem 0 .4rem; }
.sel-section-cold { color:var(--cold-dim); }

/* ── GAME LAYOUT ─────────────────────────────────────── */
.game { width:100%; max-width:720px; padding:0 1.5rem 5rem; animation:fi .6s ease-in; }

/* Sticky header */
.game-header {
  position:sticky; top:0; z-index:50;
  background:rgba(6,8,12,0.97);
  backdrop-filter:blur(3px);
  padding:.75rem 0 .55rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.2rem;
}
.location-bar { font-size:.68rem; letter-spacing:.16em; text-transform:uppercase; color:var(--amber-dim); margin-bottom:.5rem; }
.location-bar.uncanny { color:var(--cold); animation:pulse-cold 3s ease-in-out infinite; }
.sbar { display:flex; gap:.8rem; flex-wrap:wrap; margin-bottom:.4rem; }
.stat { font-size:.64rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
.stat-val { color:var(--amber); }
.cbar { display:flex; flex-wrap:wrap; gap:.35rem; }
.ctag { font-size:.58rem; letter-spacing:.07em; padding:.1rem .45rem; border:1px solid var(--cold-dim); color:var(--cold); text-transform:uppercase; }
.cover-tag { font-size:.58rem; letter-spacing:.07em; padding:.1rem .45rem; border:1px solid var(--amber-dim); color:var(--amber-dim); text-transform:uppercase; }

/* ── GAME BODY ────────────────────────────────────────── */
.game-body {}
.art-block { font-family:"Courier Prime",monospace; font-size:.64rem; color:var(--amber-dim); white-space:pre; line-height:1.35; margin:1rem 0; overflow-x:auto; }
.stxt { margin-bottom:1.2rem; }
.sp { font-size:.93rem; line-height:1.95; color:var(--text); margin-bottom:.9rem; }
.sp-dim { color:var(--text-dim); font-style:italic; }
.sp-cold { color:var(--cold); }
.sp-amber { color:var(--amber); }
.sp-anamnesis { color:var(--cold); border-left:1px solid var(--cold-dim); padding-left:.8rem; margin-left:.3rem; font-style:italic; animation:pulse-cold 5s ease-in-out infinite; }
.choices { display:flex; flex-direction:column; gap:.5rem; margin-top:1.4rem; }
.choice { background:var(--choice-bg); border:1px solid var(--border); color:var(--amber); font-family:"Courier Prime",monospace; font-size:.85rem; padding:.65rem .95rem; text-align:left; cursor:pointer; transition:all .18s; line-height:1.5; width:100%; }
.choice:hover { border-color:var(--amber); color:var(--text-bright); background:var(--choice-hover); }
.choice-locked { color:var(--border-mid); border-color:var(--border); cursor:not-allowed; opacity:.5; }
.choice-cold { border-color:var(--cold-dim); color:var(--cold); }
.choice-cold:hover { border-color:var(--cold); color:var(--text-bright); }
.choice-cover { border-color:var(--amber-dim); }
.choice-visited { color:var(--text-dim); border-color:var(--border); font-style:italic; font-size:.82rem; }
.choice-visited:hover { color:var(--text); border-color:var(--border-mid); }
.choice-return { color:var(--text-dim); border-color:var(--border); font-size:.8rem; }
.choice-return:hover { color:var(--text); border-color:var(--border-mid); }
.cover-label { font-size:.62rem; color:var(--amber-dim); display:block; margin-bottom:.12rem; letter-spacing:.06em; text-transform:uppercase; }
.obs-section { margin-top:2rem; border-top:1px solid var(--border); padding-top:.8rem; }
.obs-title { font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--amber-dim); margin-bottom:.4rem; }
.obs-item { font-size:.75rem; color:var(--text-dim); font-style:italic; line-height:1.65; margin-bottom:.18rem; padding-left:.6rem; border-left:1px solid var(--border-mid); }

/* ── PANELS ──────────────────────────────────────────── */
.notes-btn  { position:fixed; bottom:1.2rem; right:1.2rem; background:var(--choice-bg); border:1px solid var(--border); color:var(--text-dim); font-family:"Courier Prime",monospace; font-size:.68rem; letter-spacing:.1em; padding:.42rem .78rem; cursor:pointer; z-index:100; }
.status-btn { position:fixed; bottom:1.2rem; left:1.2rem;  background:var(--choice-bg); border:1px solid var(--border); color:var(--text-dim); font-family:"Courier Prime",monospace; font-size:.68rem; letter-spacing:.1em; padding:.42rem .78rem; cursor:pointer; z-index:100; }
.notes-btn:hover  { border-color:var(--amber-dim); color:var(--amber); }
.status-btn:hover { border-color:var(--cold-dim);  color:var(--cold);  }
.side-panel   { position:fixed; top:0; height:100vh; width:min(340px,92vw); background:rgba(4,6,10,0.97); padding:1.5rem; overflow-y:auto; z-index:200; }
.side-panel-l { left:0;  border-right:1px solid var(--border); animation:slide-l .2s ease; }
.side-panel-r { right:0; border-left:1px solid var(--border);  animation:slide-r .2s ease; }
.side-panel h3 { font-family:"Special Elite",serif; font-size:.88rem; letter-spacing:.16em; margin-bottom:1rem; border-bottom:1px solid var(--border); padding-bottom:.5rem; }
.panel-close { float:right; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1rem; }
.panel-close:hover { color:var(--amber); }
.panel-item { font-size:.76rem; color:var(--text-dim); font-style:italic; line-height:1.7; margin-bottom:.3rem; padding-left:.6rem; border-left:1px solid var(--border-mid); }
.panel-empty { font-size:.76rem; color:var(--border-mid); font-style:italic; }
.panel-sec { font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--amber-dim); margin:.8rem 0 .4rem; }
.stat-row { display:flex; justify-content:space-between; font-size:.78rem; margin-bottom:.3rem; padding:.15rem 0; border-bottom:1px solid var(--border); }
.overlay-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:150; }

/* ── RESTART ──────────────────────────────────────────── */
.restart-bar { margin-top:2.5rem; padding-top:1rem; border-top:1px solid var(--border); display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
.restart-btn  { font-size:.66rem; color:var(--border-mid); border-color:var(--border); letter-spacing:.08em; }
.restart-btn:hover { color:var(--rust); border-color:var(--rust); }
.confirm-msg  { font-size:.7rem; color:var(--rust); font-style:italic; }
.confirm-yes  { font-size:.7rem; color:var(--rust); border-color:var(--rust); }
.confirm-no   { font-size:.7rem; color:var(--border-bright); border-color:var(--border-mid); }
.confirm-no:hover { color:var(--text); border-color:var(--border-bright); }

/* ── TOAST ───────────────────────────────────────────── */
.note-toast { position:fixed; bottom:4.5rem; right:1.2rem; background:var(--choice-bg); border:1px solid var(--amber-dim); color:var(--amber); font-family:"Courier Prime",monospace; font-size:.7rem; padding:.38rem .78rem; z-index:300; pointer-events:none; animation:toast-in .3s ease,toast-out .4s ease 2.6s forwards; }
</style>
</head>
<body>
<canvas id="atmos"></canvas>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════
// СПАСИБО — v0.3
// A crossing. A waking. A choice.
// ═══════════════════════════════════════════════════════

// ── ATMOSPHERE ────────────────────────────────────────

const canvas = document.getElementById('atmos');
const ctx    = canvas.getContext('2d');
let mood       = 'neutral';
let targetMood = 'neutral';
let moodLerp   = 1;
let fogParts   = [];
let rainDrops  = [];
let T          = 0;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  initRain(); // fix: re-init rain on resize so drops track the porthole
}
resize();
window.addEventListener('resize', resize);

function initFog() {
  fogParts = [];
  for (let i = 0; i < 22; i++) {
    fogParts.push({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height,
      r:  80 + Math.random() * 140,
      vx: (Math.random() - .5) * .25,
      vy: (Math.random() - .5) * .08,
      ph: Math.random() * Math.PI * 2,
      base: .025 + Math.random() * .05,
    });
  }
}
initFog();

function initRain() {
  const pr = porthole();
  rainDrops = [];
  for (let i = 0; i < 24; i++) {
    rainDrops.push({
      x:   pr.x + (Math.random() - .5) * pr.r * 2,
      y:   pr.y + (Math.random() - .5) * pr.r * 2,
      len: 5  + Math.random() * 9,
      spd: 1.2 + Math.random() * 2,
    });
  }
}
initRain();

function porthole() {
  const r = Math.min(canvas.width, canvas.height) * .085;
  return { x: canvas.width - r - 28, y: r + 28, r };
}

const MOOD_COL = {
  neutral:    [130,170,190,  6, 8,12],
  tense:      [140, 90, 70, 10, 6, 4],
  uncanny:    [ 60,130,170,  4, 8,14],
  revelation: [180,180,160, 10,12,16],
};

function setMood(m) {
  if (!m || m === targetMood) return;
  targetMood = m; moodLerp = 0;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function drawAtmos() {
  T += 0.008;
  if (moodLerp < 1) { moodLerp = Math.min(1, moodLerp + .008); if (moodLerp >= 1) mood = targetMood; }

  const cm = MOOD_COL[mood]  || MOOD_COL.neutral;
  const tm = MOOD_COL[targetMood] || MOOD_COL.neutral;
  const t  = moodLerp;
  const fr  = lerp(cm[0],tm[0],t), fg_ = lerp(cm[1],tm[1],t), fb  = lerp(cm[2],tm[2],t);
  const br  = lerp(cm[3],tm[3],t), bg_ = lerp(cm[4],tm[4],t), bb  = lerp(cm[5],tm[5],t);

  ctx.fillStyle = `rgb(${br|0},${bg_|0},${bb|0})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // fix: was mood==='uncanny'?.6:1  — invalid optional chaining on number literal
  const fogMult = mood === 'tense' ? 2.5 : (mood === 'uncanny' ? 0.6 : 1);

  for (const p of fogParts) {
    p.x += p.vx; p.y += p.vy; p.ph += .004;
    if (p.x < -p.r) p.x = canvas.width  + p.r;
    if (p.x > canvas.width  + p.r) p.x = -p.r;
    if (p.y < -p.r) p.y = canvas.height + p.r;
    if (p.y > canvas.height + p.r) p.y = -p.r;
    const op = (p.base + Math.sin(p.ph) * .012) * fogMult;
    const g2 = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    g2.addColorStop(0, `rgba(${fr|0},${fg_|0},${fb|0},${op.toFixed(3)})`);
    g2.addColorStop(1, `rgba(${fr|0},${fg_|0},${fb|0},0)`);
    ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }

  let li = .09 + Math.sin(T * .4) * .008;
  if (mood === 'tense')      li += Math.sin(T * 4.5) * .03;
  if (mood === 'revelation') li = .22;
  if (mood === 'uncanny')    li = .04;
  const lx = canvas.width * .12, ly = canvas.height * .08;
  const lg = ctx.createRadialGradient(lx, ly, 0, lx, ly, Math.min(canvas.width, canvas.height) * .28);
  lg.addColorStop(0, `rgba(176,120,40,${li.toFixed(3)})`);
  lg.addColorStop(1, `rgba(176,120,40,0)`);
  ctx.fillStyle = lg; ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawPorthole();
  requestAnimationFrame(drawAtmos);
}

function drawPorthole() {
  const { x, y, r } = porthole();
  ctx.strokeStyle = '#1c2830'; ctx.lineWidth = r * .18;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#243038';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(x + Math.cos(a)*(r+r*.1), y + Math.sin(a)*(r+r*.1), r*.045, 0, Math.PI*2); ctx.fill();
  }
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r*.87, 0, Math.PI*2); ctx.clip();
  const sc = mood === 'uncanny' ? '#060e18' : mood === 'revelation' ? '#182030' : '#0e1820';
  const sg = ctx.createLinearGradient(x, y-r, x, y+r);
  sg.addColorStop(0, sc); sg.addColorStop(1, '#182430');
  ctx.fillStyle = sg; ctx.fillRect(x-r, y-r, r*2, r*2);
  ctx.strokeStyle = `rgba(60,100,130,${mood==='uncanny'?.5:.25})`; ctx.lineWidth = .8;
  for (let i = 0; i < 6; i++) {
    const wy = y + r*.2 + i*r*.12 + Math.sin(T*.6+i*1.2)*2;
    ctx.beginPath(); ctx.moveTo(x-r, wy); ctx.quadraticCurveTo(x, wy+Math.sin(T+i)*3, x+r, wy); ctx.stroke();
  }
  if (mood !== 'uncanny' && mood !== 'revelation') {
    ctx.strokeStyle = `rgba(100,150,180,${mood==='tense'?.35:.18})`; ctx.lineWidth = .6;
    for (const d of rainDrops) {
      d.y += d.spd;
      if (d.y > y + r) { d.y = y - r; d.x = x + (Math.random()-.5)*r*2; }
      ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x-1, d.y+d.len); ctx.stroke();
    }
  }
  if (mood === 'uncanny') {
    const cg = ctx.createRadialGradient(x, y-r*.3, 0, x, y, r);
    cg.addColorStop(0, 'rgba(60,140,180,0.08)'); cg.addColorStop(1, 'rgba(60,140,180,0)');
    ctx.fillStyle = cg; ctx.fillRect(x-r, y-r, r*2, r*2);
  }
  ctx.restore();
  ctx.strokeStyle = '#2a3c48'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, r*.87, 0, Math.PI*2); ctx.stroke();
}

drawAtmos();

// ── SAVE / REPLAY ─────────────────────────────────────

const SAVE_KEY  = 'spasibo_save';
const PLAY_KEY  = 'spasibo_plays';
const FLAGS_KEY = 'spasibo_past_flags';

// ── GAME STATE ────────────────────────────────────────

let G = {
  phase:    'title',
  mode:     'attended',
  stats:    { vigilance:0, composure:0, communion:0, doubt:0 },
  charisms: [],
  cover:    { posting:null, background:null, denomination:null, connection:null, left:null },
  notes:    [],
  flags:    new Set(),
  scene:    'chapel_waking',
  panelOpen: null,
  confirmRestart: false,
  playCount: parseInt(localStorage.getItem(PLAY_KEY) || '0'),
  pastFlags: JSON.parse(localStorage.getItem(FLAGS_KEY) || '[]'),
};

// ── ICON WORD (progression across plays) ──────────────
// play 1 = "icon", play 2-3 = "ikon", play 4+ = "Икон"
function iconWord() {
  if (G.playCount >= 4) return 'Икон';
  if (G.playCount >= 2) return 'ikon';
  return 'icon';
}

// ── NOTE LABELS ───────────────────────────────────────

const NOTES = {
  // Cover
  cover_posting_requested: `You told Merky you requested this posting yourself.`,
  cover_posting_assigned:  `You told Merky you were assigned — didn't ask.`,
  cover_posting_escape:    `You told Merky you needed to leave where you were.`,
  cover_posting_summoned:  `You told Merky someone asked for you specifically.`,
  cover_bg_teacher:        `You've said you were a teacher before ordination.`,
  cover_bg_medical:        `You've said you worked in medicine before ordination.`,
  cover_bg_functionary:    `You've said you were a minor functionary before ordination.`,
  cover_bg_scholar:        `You've said you were a scholar before ordination.`,
  cover_denom_orthodox:    `You declared yourself Orthodox.`,
  cover_denom_protestant:  `You declared Protestant — a useful blankness.`,
  cover_denom_ecumenical:  `You said "ecumenical." They didn't press.`,
  cover_denom_catholic:    `You declared Catholic. Implications untraced.`,
  cover_conn_doctor:       `You claim to know the ship's doctor from years ago.`,
  cover_conn_cargo:        `You claim a cargo officer once wrote to you.`,
  cover_conn_passenger:    `You claim a passenger sought you out.`,
  cover_conn_none:         `You came aboard claiming to know no one.`,
  cover_left_congregation: `You left a congregation mid-crisis.`,
  cover_left_question:     `You left a question you couldn't resolve.`,
  cover_left_relationship: `You left something without a name yet.`,
  cover_left_nothing:      `You can't remember clearly what you left.`,
  // Charisms
  charism_cover:            `CHARISM: Cover — your false self is load-bearing.`,
  charism_suspicion:        `CHARISM: Suspicion — you feel when you're being watched.`,
  charism_withholding:      `CHARISM: Withholding — present, unreadable.`,
  charism_interruption:     `CHARISM: Interruption — you can stop things quietly.`,
  charism_anamnesis:        `CHARISM: Anamnesis — you remember what you shouldn't.`,
  charism_kenosis:          `CHARISM: Kenosis — you empty yourself; people confide.`,
  charism_tathagatagarbha:  `CHARISM: Tathāgatagarbha — you see the comrade in someone before they do.`,
  charism_apophasis:        `CHARISM: Apophasis — you know what cannot be said.`,
  // Events
  icon_examined:         () => `The ${iconWord()}: Orthodox, old, worn to near-nothing. Writing on the back you can't name.`,
  icon_wrong_direction:  () => `The ${iconWord()} was facing the wrong direction. You are certain it was not, before.`,
  crossing_noted:        `You have been at sea for some time. You do not know how long.`,

// ── UTILITIES ─────────────────────────────────────────

function hasFlag(f) { return G.flags.has(f); }

function addNote(key) {
  if (!key || G.notes.includes(key)) return;
  G.notes.push(key);
  const label = noteLabel(key);
  showToast(label.length > 50 ? label.slice(0, 50) + '…' : label);
}

function setFlag(f)  { if (f) G.flags.add(f); }

function applyEffect(e) {
  if (!e) return;
  for (const [k, v] of Object.entries(e)) {
    if (G.stats[k] !== undefined) G.stats[k] = Math.max(0, G.stats[k] + v);
  }
}

function setCover(key, value) {
  G.cover[key] = value;
  setFlag(`cover_${key}_set`);
}

function showToast(msg) {
  const old = document.querySelector('.note-toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'note-toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 3200);
}

// Process text: replace {ICON}, handle functions
function processText(raw) {
  if (typeof raw === 'function') raw = raw();
  return raw
    .replace(/\{ICON\}/g, iconWord())
    .replace(/Спасибо/g, '<span class="sp-cold">Спасибо</span>')
    .replace(/───+/g, '<span class="sp-dim">$&</span>');
}

// ── SAVE / LOAD ───────────────────────────────────────

function saveGame() {
  // Critical: no render() call here — that was the stack overflow in v0.2
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      stats: G.stats, charisms: G.charisms, cover: G.cover,
      notes: G.notes, flags: [...G.flags], scene: G.scene, mode: G.mode,
    }));
  } catch(e) { console.warn('Save failed (private browsing?):', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    G.stats    = s.stats    || G.stats;
    G.charisms = s.charisms || [];
    G.cover    = s.cover    || G.cover;
    G.notes    = s.notes    || [];
    G.flags    = new Set(s.flags || []);
    G.scene    = s.scene    || 'chapel_waking';
    G.mode     = s.mode     || 'attended';
    G.phase    = 'game';
    return true;
  } catch(e) {
    console.warn('Load failed:', e);
    return false;
  }
}

function commitPlay() {
  G.playCount++;
  try {
    localStorage.setItem(PLAY_KEY, G.playCount.toString());
    const merged = [...new Set([...G.pastFlags, ...G.flags])];
    localStorage.setItem(FLAGS_KEY, JSON.stringify(merged));
    G.pastFlags = merged;
  } catch(e) { console.warn('commitPlay failed:', e); }
}

function newPlay() {
  commitPlay();
  G.stats    = { vigilance:0, composure:0, communion:0, doubt:0 };
  G.charisms = [];
  G.cover    = { posting:null, background:null, denomination:null, connection:null, left:null };
  G.notes    = [];
  G.flags    = new Set();
  G.scene    = 'chapel_waking';
  G.phase    = 'charism';
  G.panelOpen = null;
  G.confirmRestart = false;
  render();
}

// ── RENDER DISPATCHER ─────────────────────────────────

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  if      (G.phase === 'title')   renderTitle(root);
  else if (G.phase === 'mode')    renderMode(root);
  else if (G.phase === 'charism') renderCharism(root);
  else if (G.phase === 'game')    renderGame(root);
}

// ── TITLE ─────────────────────────────────────────────

function renderTitle(root) {
  setMood('neutral');
  const replay   = G.playCount > 0;
  const hasSave  = !!localStorage.getItem(SAVE_KEY);
  const subtitle = replay ? 'another crossing.' : 'a crossing.';

  root.innerHTML = `
  <div class="title-screen">
    <div class="title-cyrillic">СПАСИБО</div>
    <div class="title-romanised">Spasibo</div>
    <div class="title-translation">Thank You</div>
    <pre class="title-ship">
            ___
       ____/ | \\____
  ~~~~|______________|~~~~
    ~~~~~~~~~~~~~~~~~~~~~~~~~~</pre>
    <div class="title-sub${replay?' replay':''}">
      ${subtitle}
    </div>
    <div class="title-btns">
      ${hasSave ? `
        <button class="btn" onclick="continueGame()">Continue crossing</button>
        <button class="btn btn-sm" onclick="G.phase='mode';render()">New crossing</button>
      ` : `
        <button class="btn" onclick="G.phase='mode';render()">Begin the crossing</button>
      `}
    </div>
    ${replay ? `<div style="margin-top:.8rem;font-size:.66rem;color:var(--text-dim);letter-spacing:.1em">crossing ${G.playCount+1}</div>` : ''}
  </div>`;
}

function continueGame() { if (loadGame()) render(); else { G.phase='mode'; render(); } }

    <div class="sel-sub">Not a skill. Something given — though it will need to be used to mean anything.<br>

    html += `<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')">

  if (showWaking) {
    html += `<div class="sel-section sel-section-cold">Waking</div>`;
    for (const c of CHARISMS.waking) {
      html += `<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')">
        <div class="sel-name sel-name-cold">${c.name}</div>
        <div class="sel-desc">${c.desc}</div>
      </div>`;
    }
  }
  html += `<button class="btn btn-cold" style="margin-top:1.5rem" ${G.charisms.length===0?'disabled':''} onclick="beginGame()">Board the ship</button>`;
  div.innerHTML = html;
  root.appendChild(div);
}

function selCharism(id) { G.charisms = G.charisms.includes(id) ? [] : [id]; render(); }
function beginGame() {
  if (!G.charisms.length) return;
  G.charisms.forEach(id => addNote(`charism_${id}`));
  G.phase = 'game'; G.scene = 'chapel_waking';
  render();
}

// ── GAME RENDER ───────────────────────────────────────

function renderGame(root) {
  const scene = SCENES[G.scene];
  if (!scene) {
    root.innerHTML = `<p style="padding:2rem;color:var(--rust)">Scene not found: ${G.scene}</p>`;
    return;
  }

  setMood(scene.mood || 'neutral');
  saveGame(); // no render() inside here anymore

  // Fire on_enter once per scene visit (tracked by visited flag)
  const visitKey = `visited_${G.scene}`;
  if (!hasFlag(visitKey)) {
    setFlag(visitKey);
    if (scene.on_enter) {
      if (scene.on_enter.note) addNote(scene.on_enter.note);
      if (scene.on_enter.flag) setFlag(scene.on_enter.flag);
    }
  }

  const wrap = document.createElement('div');
  wrap.className = 'game';

  // ── STICKY HEADER ──────────────────────────────────
  const header = document.createElement('div');
  header.className = 'game-header';

  const unc = scene.mood === 'uncanny';
  header.innerHTML = `
    <div class="location-bar${unc?' uncanny':''}">${scene.location}</div>
    <div class="sbar">
      ${Object.entries(G.stats).map(([k,v])=>`<div class="stat">${k} <span class="stat-val">${v}</span></div>`).join('')}
    </div>`;

  const tags = [];
  G.charisms.forEach(id => { const c = findCharism(id); if(c) tags.push(`<span class="ctag">${c.name}</span>`); });
  const coverCount = Object.values(G.cover).filter(Boolean).length;
  if (coverCount > 0) tags.push(`<span class="cover-tag">cover ${coverCount}/5</span>`);
  if (tags.length) header.innerHTML += `<div class="cbar">${tags.join('')}</div>`;
  wrap.appendChild(header);

  // ── GAME BODY ──────────────────────────────────────
  const body = document.createElement('div');
  body.className = 'game-body';

  // Art
  if (scene.art && ART[scene.art]) {
    body.innerHTML += `<pre class="art-block">${ART[scene.art]}</pre>`;
  }

  // Text
  const stxt = document.createElement('div');
  stxt.className = 'stxt';
  const showAnamnesis = G.playCount > 0 && scene.anamnesis;

  scene.text.forEach((raw, idx) => {
    const p = document.createElement('p');
    p.className = 'sp';
    p.innerHTML = processText(raw);
    stxt.appendChild(p);

    // Anamnesis fires AFTER paragraph at index `after` (fix: was before)
    if (showAnamnesis && scene.anamnesis.after === idx) {
      const ap = document.createElement('p');
      ap.className = 'sp sp-anamnesis';
      ap.innerHTML = processText(scene.anamnesis.text);
      stxt.appendChild(ap);
      if (scene.anamnesis.note) addNote(scene.anamnesis.note);
    }
  });
  body.appendChild(stxt);

  // Choices
  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'choices';

  // Add return choice first if scene has one
  if (scene.return_to) {
    const rb = document.createElement('button');
    rb.className = 'choice choice-return';
    rb.textContent = scene.return_label || `Return.`;
    rb.onclick = () => navigate(scene.return_to);
    choicesDiv.appendChild(rb);
  }

  scene.choices.forEach(ch => {
    // Visibility
    if (ch.hide_if  && hasFlag(ch.hide_if))  return;
    if (ch.show_if  && !hasFlag(ch.show_if)) return;

    // One-time: hide if target already visited
    if (ch.once && ch.next && hasFlag(`visited_${ch.next}`)) return;

    const btn = document.createElement('button');

    // Lock check
    let locked = false;
    if (ch.requires_flag && !hasFlag(ch.requires_flag)) locked = true;
    if (ch.requires_stat) {
      const [s, m] = ch.requires_stat;
      if ((G.stats[s] || 0) < m) locked = true;
    }

    if (locked) {
      btn.className = 'choice choice-locked';
      btn.disabled = true;
      btn.textContent = ch.text.replace(/\{ICON\}/g, iconWord());
    } else {
      // Visited but not once-hidden: show dimmed
      const targetVisited = ch.next && hasFlag(`visited_${ch.next}`) && scene.hub;
      let cls = 'choice';
      if (ch.style === 'cold')   cls += ' choice-cold';
      if (ch.style === 'return') cls += ' choice-return';
      if (ch.cover_set)          cls += ' choice-cover';
      if (targetVisited)         cls += ' choice-visited';
      btn.className = cls;

      let label = processText(ch.text);
      if (targetVisited) label = '◦ ' + label;
      btn.innerHTML = label;

      if (ch.cover_set && !hasFlag(`cover_${ch.cover_set.key}_set`)) {
        const lbl = document.createElement('span');
        lbl.className = 'cover-label';
        lbl.textContent = '⬥ establishing cover';
        btn.appendChild(lbl);
      }

      btn.onclick = () => applyChoice(ch);
    }

    choicesDiv.appendChild(btn);
  });

  body.appendChild(choicesDiv);

  // Recent observations
  if (G.notes.length) {
    const od = document.createElement('div');
    od.className = 'obs-section';
    od.innerHTML = `<div class="obs-title">observations</div>`;
    G.notes.slice(-4).forEach(k => {
      od.innerHTML += `<div class="obs-item">${noteLabel(k)}</div>`;
    });
    body.appendChild(od);
  }

  // Restart bar
  const rb = document.createElement('div');
  rb.className = 'restart-bar';
  rb.innerHTML = G.confirmRestart ? `
    <span class="confirm-msg">End this crossing?</span>
    <button class="btn confirm-yes" onclick="doRestart()">Yes — return to shore</button>
    <button class="btn confirm-no"  onclick="G.confirmRestart=false;render()">No — continue</button>` :
    `<button class="btn restart-btn" onclick="G.confirmRestart=true;render()">abandon crossing</button>`;
  body.appendChild(rb);
  wrap.appendChild(body);
  root.appendChild(wrap);

  // Fixed panel buttons
  root.innerHTML += `
    <button class="notes-btn"  onclick="openPanel('notes')">observations</button>
    <button class="status-btn" onclick="openPanel('status')">status</button>`;

  if (G.panelOpen === 'notes')  renderNotesPanel(root);
  if (G.panelOpen === 'status') renderStatusPanel(root);
}

function navigate(sceneId) {
  G.scene = sceneId;
  window.scrollTo(0, 0);
  render();
}

function applyChoice(ch) {
  applyEffect(ch.effect);
  if (ch.set_flag)   setFlag(ch.set_flag);
  if (ch.set_note)   addNote(ch.set_note);
  if (ch.cover_set)  setCover(ch.cover_set.key, ch.cover_set.value);

  if (ch.next === '__new_play__') { newPlay(); return; }

  // Auto-flags
  if (ch.next && ch.next.startsWith('pavel_')) setFlag('met_pavel');

  navigate(ch.next);
}

// ── PANELS ────────────────────────────────────────────

function openPanel(which) { G.panelOpen = G.panelOpen === which ? null : which; render(); }

function renderNotesPanel(root) {
  const p = document.createElement('div');
  p.className = 'side-panel side-panel-r';
  p.innerHTML = `
    <button class="panel-close" onclick="openPanel('notes')">✕</button>
    <h3 style="color:var(--amber)">Observations</h3>
    ${G.notes.length === 0
      ? `<div class="panel-empty">Nothing noted yet.</div>`
      : [...G.notes].reverse().map(k => `<div class="panel-item">${noteLabel(k)}</div>`).join('')}`;
  const ov = document.createElement('div');
  ov.className = 'overlay-bg'; ov.onclick = () => openPanel('notes');
  root.appendChild(ov); root.appendChild(p);
}

function renderStatusPanel(root) {
  const coverLbls = { posting:'Reason here', background:'Prior work', denomination:'Declared tradition', connection:'Claims to know', left:'Left behind' };
  const allC = allCharisms();
  const p = document.createElement('div');
  p.className = 'side-panel side-panel-l';
  p.innerHTML = `
    <button class="panel-close" onclick="openPanel('status')">✕</button>
    <h3 style="color:var(--cold)">Status</h3>
    <div class="panel-sec">Stats</div>
    ${Object.entries(G.stats).map(([k,v])=>`<div class="stat-row"><span>${k}</span><span style="color:var(--text-bright);font-weight:bold">${v}</span></div>`).join('')}
    <div class="panel-sec">Charisms</div>
    ${G.charisms.length === 0 ? `<div class="panel-empty">None.</div>` :
      G.charisms.map(id=>{ const c=allC.find(x=>x.id===id); return `<div class="panel-item"><strong>${c?c.name:id}</strong> — ${c?c.desc:''}</div>`; }).join('')}
    <div class="panel-sec">Cover</div>
    ${Object.entries(G.cover).map(([k,v])=>`<div class="stat-row">
      <span style="color:var(--text-dim)">${coverLbls[k]||k}</span>
      <span style="color:${v?'var(--amber)':'var(--border-mid)'};font-size:.68rem;font-style:italic">${v?v.replace(/_/g,' '):'—'}</span>
    </div>`).join('')}
    <div class="panel-sec">Crossing</div>
    <div class="stat-row"><span>number</span><span style="color:var(--text-bright)">${G.playCount+1}</span></div>`;
  const ov = document.createElement('div');
  ov.className = 'overlay-bg'; ov.onclick = () => openPanel('status');
  root.appendChild(ov); root.appendChild(p);
}

// ── RESTART ───────────────────────────────────────────

function doRestart() {
  commitPlay();
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
  G.phase = 'title';
  G.flags = new Set(); G.notes = [];
  G.stats = { vigilance:0, composure:0, communion:0, doubt:0 };
  G.charisms = [];
  G.cover = { posting:null, background:null, denomination:null, connection:null, left:null };
  // fix: removed G.coverStep — not part of state
  G.panelOpen = null; G.confirmRestart = false;
  G.scene = 'chapel_waking';
  render();
}

// ── INIT ──────────────────────────────────────────────

render();
</script>
</body>
</html>
