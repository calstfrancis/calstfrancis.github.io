// ── UTILITIES ──────────────────────────────────────────────
function hasFlag(f){return G.flags.has(f);}
function addNote(key){if(!key||G.notes.includes(key))return;G.notes.push(key);const l=noteLabel(key);showToast(l.length>52?l.slice(0,52)+'…':l,'note');}
function setFlag(f){if(f)G.flags.add(f);}
function applyEffect(e){if(!e)return;for(const[k,v]of Object.entries(e))if(G.stats[k]!==undefined)G.stats[k]=Math.max(0,G.stats[k]+v);}
function setCover(key,value){G.cover[key]=value;setFlag('cover_'+key+'_set');}
function showToast(msg,type){const old=document.querySelector('.note-toast');if(old)old.remove();const t=document.createElement('div');t.className='note-toast'+(type==='thought'?' thought-toast':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},3200);}
function saveGame(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({stats:G.stats,charisms:G.charisms,thoughts:G.thoughts,cover:G.cover,notes:G.notes,flags:[...G.flags],scene:G.scene,mode:G.mode}));
    const el=document.querySelector('.save-indicator');if(el){el.style.display='block';el.style.animation='none';void el.offsetWidth;el.style.animation='save-flash 2.2s ease forwards';setTimeout(()=>{if(el)el.style.display='none';},2300);}
  }catch(e){console.warn('Save:',e);}
}
function loadGame(){
  try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;const s=JSON.parse(raw);
    G.stats=s.stats||G.stats;G.charisms=s.charisms||[];G.thoughts=s.thoughts||{available:[],cabinet:[],settled:[]};
    G.cover=s.cover||G.cover;G.notes=s.notes||[];G.flags=new Set(s.flags||[]);G.scene=s.scene||'chapel_waking';G.mode=s.mode||'attended';G.phase='game';return true;
  }catch(e){console.warn('Load:',e);return false;}
}
function commitPlay(){G.playCount++;try{localStorage.setItem(PLAY_KEY,G.playCount.toString());const m=[...new Set([...G.pastFlags,...G.flags])];localStorage.setItem(FLAGS_KEY,JSON.stringify(m));G.pastFlags=m;}catch(e){}}
function newPlay(){
  commitPlay();
  G.stats={vigilance:0,composure:0,communion:0,doubt:0};G.charisms=[];
  G.thoughts={available:[],cabinet:[],settled:[]};G.thoughtPendingSeat=null;
  G.cover={posting:null,background:null,denomination:null,connection:null,left:null};
  G.notes=[];G.flags=new Set();G.scene='chapel_waking';G.phase='charism';G.panelOpen=null;G.confirmRestart=false;render();
}
function render(){const root=document.getElementById('root');root.innerHTML='';if(G.phase==='title')renderTitle(root);else if(G.phase==='mode')renderMode(root);else if(G.phase==='charism')renderCharism(root);else if(G.phase==='game')renderGame(root);}
function renderTitle(root){
  setMood('neutral');const replay=G.playCount>0,hasSave=!!localStorage.getItem(SAVE_KEY);
  root.innerHTML=`<div class="title-screen"><div class="title-cyrillic">СПАСИБО</div><div class="title-romanised">Spasibo</div><div class="title-translation">Thank You</div><pre class="title-ship">
            ___
       ____/ | \\____
  ~~~~|______________|~~~~
    ~~~~~~~~~~~~~~~~~~~~~~~~~~</pre><div class="title-sub${replay?' replay':''}"> ${replay?'another crossing.':'a crossing.'}</div><div class="title-btns">${hasSave?'<button class="btn" onclick="continueGame()">Continue crossing</button><button class="btn btn-sm" onclick="G.phase=\'mode\';render()">New crossing</button>':'<button class="btn" onclick="G.phase=\'mode\';render()">Begin the crossing</button>'}</div>${replay?`<div style="margin-top:.8rem;font-size:.66rem;color:var(--text-dim);letter-spacing:.1em">crossing ${G.playCount+1}</div>`:''}</div>`;
}
function continueGame(){if(loadGame())render();else{G.phase='mode';render();}}
function renderMode(root){
  root.innerHTML=`<div class="sel-screen"><div class="sel-h">How will you cross?</div><div class="sel-sub">Can be changed on a new crossing.</div><div class="sel-grid"><div class="sel-opt${G.mode==='attended'?' chosen':''}" onclick="G.mode='attended';render()"><div class="sel-name">First Crossing</div><div class="sel-desc">Mechanics visible. The game tells you what it is asking and why.</div></div><div class="sel-opt${G.mode==='open'?' chosen':''}" onclick="G.mode='open';render()"><div class="sel-name">Open Water</div><div class="sel-desc">Less held. The game trusts you. Some things are not explained.</div></div></div><button class="btn" onclick="G.phase='charism';render()">Continue</button></div>`;
}
function renderCharism(root){
  const showWaking=G.playCount>=2;const div=document.createElement('div');div.className='sel-screen';
  let html=`<div class="sel-h">A charism.</div><div class="sel-sub">Not a skill. Something given — though it needs to be used to mean anything.${showWaking?'<br><span style="color:var(--cold);font-size:.76rem">Something new is available to those who have crossed before.</span>':''}</div><div class="sel-section">Sleeping</div>`;
  CHARISMS.sleeping.forEach(c=>{html+=`<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')"><div class="sel-name sel-name-cold">${c.name}</div><div class="sel-desc">${c.desc}</div></div>`;});
  if(showWaking){html+=`<div class="sel-section sel-section-cold">Waking</div>`;CHARISMS.waking.forEach(c=>{html+=`<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')"><div class="sel-name sel-name-cold">${c.name}</div><div class="sel-desc">${c.desc}</div></div>`;});}
  html+=`<button class="btn btn-cold" style="margin-top:1.5rem" ${G.charisms.length===0?'disabled':''} onclick="beginGame()">Board the ship</button>`;
  div.innerHTML=html;root.appendChild(div);
}
function selCharism(id){G.charisms=G.charisms.includes(id)?[]:[id];render();}
function beginGame(){
  if(!G.charisms.length)return;G.charisms.forEach(id=>addNote('charism_'+id));
  if(G.charisms.includes('kenosis'))offerThought('kenosis_thought');
  if(G.charisms.includes('apophasis'))offerThought('via_negativa');
  G.phase='game';G.scene='chapel_waking';render();
}
function renderGame(root){
  const scene=SCENES[G.scene];if(!scene){root.innerHTML=`<p style="padding:2rem;color:var(--rust)">Scene not found: ${G.scene}</p>`;return;}
  setMood(scene.mood||'neutral');saveGame();
  const visitKey='visited_'+G.scene;
  if(!hasFlag(visitKey)){setFlag(visitKey);if(scene.on_enter){if(scene.on_enter.note)addNote(scene.on_enter.note);if(scene.on_enter.flag)setFlag(scene.on_enter.flag);if(scene.on_enter.thought)offerThought(scene.on_enter.thought);}}
  const wrap=document.createElement('div');wrap.className='game';
  const hdr=document.createElement('div');hdr.className='game-header';
  const si=document.createElement('div');si.className='save-indicator';si.textContent='◦ autosaved';si.style.display='none';hdr.appendChild(si);
  const lb=document.createElement('div');lb.className='location-bar'+(scene.mood==='uncanny'?' uncanny':'');lb.textContent=scene.location;hdr.appendChild(lb);
  const sb=document.createElement('div');sb.className='sbar';
  Object.entries(G.stats).forEach(([k,v])=>{const d=document.createElement('div');d.className='stat';d.innerHTML=k+' <span class="stat-val">'+v+'</span>';sb.appendChild(d);});hdr.appendChild(sb);
  const tags=[];
  G.charisms.forEach(id=>{const c=findCharism(id);if(c)tags.push('<span class="ctag">'+c.name+'</span>');});
  const cc=Object.values(G.cover).filter(Boolean).length;if(cc>0)tags.push('<span class="cover-tag">cover '+cc+'/5</span>');
  const tc=G.thoughts.cabinet.length+G.thoughts.settled.length,ta=G.thoughts.available.length;
  if(tc>0||ta>0)tags.push('<span class="thought-tag">⊕ '+tc+'/'+MAX_THOUGHT_SLOTS+(ta?' +'+ta+' new':'')+'</span>');
  if(tags.length){const cb=document.createElement('div');cb.className='cbar';cb.innerHTML=tags.join('');hdr.appendChild(cb);}
  wrap.appendChild(hdr);
  const body=document.createElement('div');body.className='game-body';
  if(scene.art&&ART[scene.art]){const art=document.createElement('pre');art.className='art-block';art.textContent=ART[scene.art];body.appendChild(art);}
  const stxt=document.createElement('div');stxt.className='stxt';
  const showAnam=G.playCount>0&&scene.anamnesis;
  scene.text.forEach((raw,idx)=>{
    const p=document.createElement('p');p.className='sp';p.innerHTML=processText(raw);stxt.appendChild(p);
    if(showAnam&&scene.anamnesis.after===idx){const ap=document.createElement('p');ap.className='sp sp-anamnesis';ap.innerHTML=processText(scene.anamnesis.text);stxt.appendChild(ap);if(scene.anamnesis.note)addNote(scene.anamnesis.note);}
  });body.appendChild(stxt);
  const cd=document.createElement('div');cd.className='choices';
  if(scene.return_to){const rb=document.createElement('button');rb.className='choice choice-return';rb.textContent=scene.return_label||'Return.';rb.onclick=()=>navigate(scene.return_to);cd.appendChild(rb);}
  scene.choices.forEach(ch=>{
    if(ch.hide_if&&hasFlag(ch.hide_if))return;if(ch.show_if&&!hasFlag(ch.show_if))return;
    if(ch.once&&ch.next&&hasFlag('visited_'+ch.next))return;
    const btn=document.createElement('button');let locked=false;
    if(ch.requires_flag&&!hasFlag(ch.requires_flag))locked=true;
    if(ch.requires_stat){const[s,m]=ch.requires_stat;if((G.stats[s]||0)<m)locked=true;}
    if(locked){btn.className='choice choice-locked';btn.disabled=true;btn.textContent=processText(ch.text)+(ch.requires_stat?` [${ch.requires_stat[0]} ${ch.requires_stat[1]}+]`:'');}
    else{
      const tv=ch.next&&hasFlag('visited_'+ch.next)&&scene.hub;
      let cls='choice';if(ch.style==='cold')cls+=' choice-cold';if(ch.style==='return')cls+=' choice-return';if(ch.style==='vespers')cls+=' choice-vespers';if(ch.cover_set)cls+=' choice-cover';if(tv)cls+=' choice-visited';
      btn.className=cls;btn.innerHTML=(tv?'◦ ':'')+processText(ch.text);
      if(ch.cover_set&&!hasFlag('cover_'+ch.cover_set.key+'_set')){const lbl=document.createElement('span');lbl.className='cover-label';lbl.textContent='⬥ establishing cover';btn.appendChild(lbl);}
      btn.onclick=()=>applyChoice(ch);
    }cd.appendChild(btn);
  });body.appendChild(cd);
  if(G.notes.length){const od=document.createElement('div');od.className='obs-section';const ot=document.createElement('div');ot.className='obs-title';ot.textContent='observations';od.appendChild(ot);G.notes.slice(-4).forEach(k=>{const d=document.createElement('div');d.className='obs-item';d.textContent=noteLabel(k);od.appendChild(d);});body.appendChild(od);}
  const rb2=document.createElement('div');rb2.className='restart-bar';
  if(G.confirmRestart){const msg=document.createElement('span');msg.className='confirm-msg';msg.textContent='End this crossing?';rb2.appendChild(msg);const yes=document.createElement('button');yes.className='btn confirm-yes';yes.textContent='Yes — return to shore';yes.onclick=doRestart;rb2.appendChild(yes);const no=document.createElement('button');no.className='btn confirm-no';no.textContent='No — continue';no.onclick=()=>{G.confirmRestart=false;render();};rb2.appendChild(no);}
  else{const rbt=document.createElement('button');rbt.className='btn restart-btn';rbt.textContent='abandon crossing';rbt.onclick=()=>{G.confirmRestart=true;render();};rb2.appendChild(rbt);}
  body.appendChild(rb2);wrap.appendChild(body);root.appendChild(wrap);
  const nb=document.createElement('button');nb.className='notes-btn';nb.textContent='observations';nb.onclick=()=>openPanel('notes');root.appendChild(nb);
  const sb2=document.createElement('button');sb2.className='status-btn';sb2.textContent='status';sb2.onclick=()=>openPanel('status');root.appendChild(sb2);
  const tb=document.createElement('button');tb.className='thoughts-btn';tb.textContent='thoughts';tb.onclick=()=>openPanel('thoughts');root.appendChild(tb);
  if(G.panelOpen==='notes')renderNotesPanel(root);if(G.panelOpen==='status')renderStatusPanel(root);if(G.panelOpen==='thoughts')renderThoughtsPanel(root);
}
function navigate(id){G.scene=id;tickThoughts();window.scrollTo(0,0);render();}
function applyChoice(ch){
  applyEffect(ch.effect);if(ch.set_flag)setFlag(ch.set_flag);if(ch.set_flag2)setFlag(ch.set_flag2);if(ch.set_note)addNote(ch.set_note);if(ch.cover_set)setCover(ch.cover_set.key,ch.cover_set.value);if(ch.thought)offerThought(ch.thought);
  if(ch.next==='__new_play__'){newPlay();return;}
  if(ch.next&&ch.next.startsWith('pavel_'))setFlag('met_pavel_flag');navigate(ch.next);
}
function openPanel(w){G.panelOpen=G.panelOpen===w?null:w;render();}
function mkOverlay(fn){const o=document.createElement('div');o.className='overlay-bg';o.onclick=fn;return o;}
function renderNotesPanel(root){
  const p=document.createElement('div');p.className='side-panel side-panel-r';const h=document.createElement('h3');h.style.color='var(--amber)';h.innerHTML='<button class="panel-close" onclick="openPanel(\'notes\')">✕</button>Observations';p.appendChild(h);
  if(!G.notes.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='Nothing noted yet.';p.appendChild(d);}
  else[...G.notes].reverse().forEach(k=>{const d=document.createElement('div');d.className='panel-item';d.textContent=noteLabel(k);p.appendChild(d);});
  root.appendChild(mkOverlay(()=>openPanel('notes')));root.appendChild(p);
}
function renderStatusPanel(root){
  const cl={posting:'Reason here',background:'Prior work',denomination:'Declared tradition',connection:'Claims to know',left:'Left behind'};
  const p=document.createElement('div');p.className='side-panel side-panel-l';const h=document.createElement('h3');h.style.color='var(--cold)';h.innerHTML='<button class="panel-close" onclick="openPanel(\'status\')">✕</button>Status';p.appendChild(h);
  const addSec=t=>{const s=document.createElement('div');s.className='panel-sec';s.textContent=t;p.appendChild(s);};
  const addRow=(a,b,bc)=>{const r=document.createElement('div');r.className='stat-row';r.innerHTML=`<span style="color:var(--text-dim)">${a}</span><span style="color:${bc||'var(--text-bright)'};font-weight:bold;font-size:.78rem">${b}</span>`;p.appendChild(r);};
  addSec('Stats');Object.entries(G.stats).forEach(([k,v])=>addRow(k,v));
  addSec('Charisms');if(!G.charisms.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='None.';p.appendChild(d);}
  else G.charisms.forEach(id=>{const c=findCharism(id);if(!c)return;const d=document.createElement('div');d.className='panel-item';d.innerHTML=`<strong>${c.name}</strong> — ${c.desc}`;p.appendChild(d);});
  addSec('Cover');Object.entries(G.cover).forEach(([k,v])=>addRow(cl[k]||k,v?v.replace(/_/g,' '):'—',v?'var(--amber)':'var(--border-mid)'));
  addSec('Crossing');addRow('number',G.playCount+1);
  root.appendChild(mkOverlay(()=>openPanel('status')));root.appendChild(p);
}
function renderThoughtsPanel(root){
  const p=document.createElement('div');p.className='side-panel side-panel-c';
  const h=document.createElement('h3');h.style.color='var(--thought)';h.innerHTML='<button class="panel-close" onclick="G.thoughtPendingSeat=null;openPanel(\'thoughts\')">✕</button>Thought Cabinet <span style="font-size:.65rem;color:var(--thought-dim)">('+G.thoughts.cabinet.length+'/'+MAX_THOUGHT_SLOTS+' seated)</span>';p.appendChild(h);
  if(G.thoughtPendingSeat){const pd=THOUGHTS[G.thoughtPendingSeat];const warn=document.createElement('div');warn.style.cssText='border:1px solid var(--rust);padding:.8rem;margin-bottom:1rem;font-size:.78rem;color:var(--rust);line-height:1.6;';warn.textContent='Cabinet full. To seat "'+pd.name+'", release a thought below.';p.appendChild(warn);}
  if(G.thoughts.available.length){const s=document.createElement('div');s.className='panel-sec';s.textContent='Available — not yet seated';p.appendChild(s);
    G.thoughts.available.forEach(id=>{const t=THOUGHTS[id];if(!t)return;const card=document.createElement('div');card.className='thought-card';card.innerHTML='<div class="thought-name">'+t.name+'</div><div class="thought-fragment">'+t.fragment+'</div><div class="thought-origin">'+t.origin+'</div><div class="thought-body">'+t.sitting+'</div>';
    const full=G.thoughts.cabinet.length>=MAX_THOUGHT_SLOTS&&!G.thoughtPendingSeat;const btn=document.createElement('button');btn.className='thought-btn thought-btn-seat';btn.textContent=full?'Cabinet full — release something first':'Seat this thought';btn.disabled=full;if(!full)btn.onclick=()=>seatThought(id);card.appendChild(btn);p.appendChild(card);});}
  if(G.thoughts.cabinet.length){const s=document.createElement('div');s.className='panel-sec';s.textContent='Sitting with — developing';p.appendChild(s);
    G.thoughts.cabinet.forEach(({id,progress})=>{const t=THOUGHTS[id];if(!t)return;const card=document.createElement('div');card.className='thought-card';card.innerHTML='<div class="thought-name">'+t.name+'</div><div class="thought-progress">'+progressBar(progress,THOUGHT_THRESHOLD)+' '+progress+'/'+THOUGHT_THRESHOLD+'</div><div class="thought-body">'+t.sitting+'</div>';
    const btn=document.createElement('button');btn.className='thought-btn thought-btn-release';btn.textContent='Release (lose permanently)';btn.onclick=()=>{if(confirm('Release "'+t.name+'"?\nThis thought will be lost.'))releaseThought(id);};card.appendChild(btn);p.appendChild(card);});}
  if(G.thoughts.settled.length){const s=document.createElement('div');s.className='panel-sec';s.textContent='Settled';p.appendChild(s);
    G.thoughts.settled.forEach(id=>{const t=THOUGHTS[id];if(!t)return;const card=document.createElement('div');card.className='thought-card thought-settled';card.innerHTML='<div class="thought-name">'+t.name+' ●</div><div class="thought-fragment">'+t.fragment+'</div><div class="thought-body">'+t.settled+'</div><div class="thought-effect">'+t.effect_desc+'</div>';p.appendChild(card);});}
  if(!G.thoughts.available.length&&!G.thoughts.cabinet.length&&!G.thoughts.settled.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='No thoughts yet. They surface through choices — and must be deliberately seated here.';p.appendChild(d);}
  root.appendChild(mkOverlay(()=>{G.thoughtPendingSeat=null;openPanel('thoughts');}));root.appendChild(p);
}
function doRestart(){
  commitPlay();try{localStorage.removeItem(SAVE_KEY);}catch(e){}
  G.phase='title';G.flags=new Set();G.notes=[];G.stats={vigilance:0,composure:0,communion:0,doubt:0};G.charisms=[];
  G.thoughts={available:[],cabinet:[],settled:[]};G.thoughtPendingSeat=null;
  G.cover={posting:null,background:null,denomination:null,connection:null,left:null};G.panelOpen=null;G.confirmRestart=false;G.scene='chapel_waking';render();
}
render();
</script>
</body>
</html>
