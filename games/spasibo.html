<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>СПАСИБО — v0.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080c;--text:#a8bcc8;--text-dim:#526070;--text-bright:#d4e4f0;
  --amber:#b08030;--amber-dim:#5a4018;--cold:#5aa0b8;--cold-dim:#1a3040;
  --rust:#8a3828;--border:#182028;--border-mid:#283848;--border-bright:#3a5060;
  --choice-bg:rgba(10,14,20,0.72);--choice-hover:rgba(18,26,34,0.92);
  --thought:#7a6898;--thought-dim:#2a2038;
}
body{background:var(--bg);color:var(--text);font-family:"Courier Prime","Courier New",monospace;min-height:100vh;overflow-x:hidden}
#atmos{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
#root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse-cold{0%,100%{color:var(--cold)}50%{color:var(--cold-dim)}}
@keyframes flicker{0%,100%{opacity:1}45%{opacity:.88}46%{opacity:1}80%{opacity:.95}}
@keyframes slide-r{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slide-l{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes toast-in{from{opacity:0;transform:translateY(.5rem)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateY(-.5rem)}}
@keyframes save-flash{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;animation:fi 3s ease-in}
.title-cyrillic{font-family:"Special Elite",serif;font-size:clamp(2.8rem,8vw,5rem);color:var(--text-bright);letter-spacing:.35em;margin-bottom:.4rem;text-shadow:0 0 40px rgba(90,160,184,0.12)}
.title-romanised{font-size:.72rem;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;margin-bottom:.2rem}
.title-translation{font-size:.68rem;color:var(--amber-dim);letter-spacing:.18em;font-style:italic;margin-bottom:3.5rem}
.title-ship{font-family:"Courier Prime",monospace;font-size:.62rem;color:var(--border-mid);white-space:pre;line-height:1.3;margin-bottom:3rem;animation:flicker 8s ease-in-out infinite}
.title-sub{font-size:.78rem;color:var(--text-dim);letter-spacing:.12em;font-style:italic;margin-bottom:2rem}
.title-sub.replay{color:var(--cold-dim);animation:pulse-cold 4s ease-in-out infinite}
.title-btns{display:flex;flex-direction:column;gap:.6rem;align-items:center}
.btn{background:transparent;border:1px solid var(--border-mid);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.84rem;padding:.6rem 1.8rem;cursor:pointer;letter-spacing:.12em;transition:all .2s}
.btn:hover{border-color:var(--amber);color:var(--text-bright)}.btn:disabled{opacity:.3;cursor:default}
.btn-sm{font-size:.72rem;padding:.45rem 1.2rem;border-color:var(--border);color:var(--text-dim)}
.btn-sm:hover{border-color:var(--border-mid);color:var(--text)}
.btn-cold{border-color:var(--cold-dim);color:var(--cold)}.btn-cold:hover{border-color:var(--cold);color:var(--text-bright)}
.sel-screen{max-width:620px;width:100%;padding:3rem 1.5rem 4rem;animation:fi .8s ease-in}
.sel-h{font-family:"Special Elite",serif;font-size:1.1rem;color:var(--text-bright);letter-spacing:.18em;margin-bottom:.4rem;text-align:center}
.sel-sub{font-size:.78rem;color:var(--text-dim);margin-bottom:2rem;text-align:center;font-style:italic;line-height:1.7}
.sel-grid{display:flex;flex-direction:column;gap:.9rem;margin-bottom:2rem}
.sel-opt{border:1px solid var(--border);padding:1.1rem 1.3rem;cursor:pointer;transition:all .2s;background:var(--choice-bg)}
.sel-opt:hover{border-color:var(--border-bright);background:var(--choice-hover)}
.sel-opt.chosen{border-color:var(--amber)}.sel-opt.chosen-cold{border-color:var(--cold)}
.sel-name{font-family:"Special Elite",serif;font-size:1rem;color:var(--amber);letter-spacing:.1em;margin-bottom:.35rem}
.sel-name-cold{color:var(--cold)}.sel-desc{font-size:.78rem;color:var(--text-dim);line-height:1.65}
.sel-section{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin:.9rem 0 .4rem}
.sel-section-cold{color:var(--cold-dim)}
.game{width:100%;max-width:720px;padding:0 1.5rem 5rem;animation:fi .6s ease-in}
.game-header{position:sticky;top:0;z-index:50;background:rgba(6,8,12,0.97);backdrop-filter:blur(3px);padding:.75rem 0 .55rem;border-bottom:1px solid var(--border);margin-bottom:1.2rem}
.save-indicator{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--border-bright);text-align:right;display:none;animation:save-flash 2.2s ease forwards}
.location-bar{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:.5rem}
.location-bar.uncanny{color:var(--cold);animation:pulse-cold 3s ease-in-out infinite}
.location-bar.revelation{color:#c8b870;animation:pulse-cold 4s ease-in-out infinite}
.sbar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.4rem}
.stat{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.stat-val{color:var(--amber)}
.cbar{display:flex;flex-wrap:wrap;gap:.35rem}
.ctag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--cold-dim);color:var(--cold);text-transform:uppercase}
.cover-tag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--amber-dim);color:var(--amber-dim);text-transform:uppercase}
.breviary-tag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--thought-dim);color:var(--thought);text-transform:uppercase}
.art-block{font-family:"Courier Prime",monospace;font-size:.64rem;color:var(--amber-dim);white-space:pre;line-height:1.35;margin:1rem 0;overflow-x:auto}
.stxt{margin-bottom:1.2rem}
.sp{font-size:.93rem;line-height:1.95;color:var(--text);margin-bottom:.9rem}
.sp-cold{color:var(--cold)}.sp-dim{color:var(--text-dim);font-style:italic}
.sp-anamnesis{color:var(--cold);border-left:1px solid var(--cold-dim);padding-left:.8rem;margin-left:.3rem;font-style:italic;animation:pulse-cold 5s ease-in-out infinite}
.choices{display:flex;flex-direction:column;gap:.5rem;margin-top:1.4rem}
.choice{background:var(--choice-bg);border:1px solid var(--border);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.85rem;padding:.65rem .95rem;text-align:left;cursor:pointer;transition:all .18s;line-height:1.5;width:100%}
.choice:hover{border-color:var(--amber);color:var(--text-bright);background:var(--choice-hover)}
.choice-locked{color:var(--border-mid);border-color:var(--border);cursor:not-allowed;opacity:.5}
.choice-cold{border-color:var(--cold-dim);color:var(--cold)}.choice-cold:hover{border-color:var(--cold);color:var(--text-bright)}
.choice-cover{border-color:var(--amber-dim)}
.choice-visited{color:var(--text-dim);border-color:var(--border);font-style:italic;font-size:.82rem}
.choice-visited:hover{color:var(--text);border-color:var(--border-mid)}
.choice-return{color:var(--text-dim);border-color:var(--border);font-size:.8rem}
.choice-return:hover{color:var(--text);border-color:var(--border-mid)}
.choice-vespers{border-color:#4a5838;color:#8aab68}.choice-vespers:hover{border-color:#7a9858;color:var(--text-bright)}
.cover-label{font-size:.62rem;color:var(--amber-dim);display:block;margin-bottom:.12rem;letter-spacing:.06em;text-transform:uppercase}
.obs-section{margin-top:2rem;border-top:1px solid var(--border);padding-top:.8rem}
.obs-title{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:.4rem}
.obs-item{font-size:.75rem;color:var(--text-dim);font-style:italic;line-height:1.65;margin-bottom:.18rem;padding-left:.6rem;border-left:1px solid var(--border-mid)}
.notes-btn,.status-btn,.breviary-btn{position:fixed;background:var(--choice-bg);border:1px solid var(--border);font-family:"Courier Prime",monospace;font-size:.68rem;letter-spacing:.1em;padding:.42rem .78rem;cursor:pointer;z-index:100;color:var(--text-dim)}
.notes-btn{bottom:1.2rem;right:1.2rem}.notes-btn:hover{border-color:var(--amber-dim);color:var(--amber)}
.status-btn{bottom:1.2rem;left:1.2rem}.status-btn:hover{border-color:var(--cold-dim);color:var(--cold)}
.breviary-btn{bottom:1.2rem;left:50%;transform:translateX(-50%);color:var(--thought);border-color:var(--thought-dim)}
.breviary-btn:hover{border-color:var(--thought);color:var(--text-bright)}
.side-panel{position:fixed;top:0;height:100vh;width:min(340px,92vw);background:rgba(4,6,10,0.97);padding:1.5rem;overflow-y:auto;z-index:200}
.side-panel-l{left:0;border-right:1px solid var(--border);animation:slide-l .2s ease}
.side-panel-r{right:0;border-left:1px solid var(--border);animation:slide-r .2s ease}
.side-panel-c{left:50%;transform:translateX(-50%);width:min(500px,96vw);border:1px solid var(--thought-dim);animation:fi .2s ease}
.side-panel h3{font-family:"Special Elite",serif;font-size:.88rem;letter-spacing:.16em;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.panel-close{float:right;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem}
.panel-close:hover{color:var(--amber)}
.panel-item{font-size:.76rem;color:var(--text-dim);font-style:italic;line-height:1.7;margin-bottom:.3rem;padding-left:.6rem;border-left:1px solid var(--border-mid)}
.panel-empty{font-size:.76rem;color:var(--border-mid);font-style:italic}
.panel-sec{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin:.8rem 0 .4rem}
.stat-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem;padding:.15rem 0;border-bottom:1px solid var(--border)}
.overlay-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:150}
.sounding-card{border:1px solid var(--thought-dim);padding:.9rem 1rem;margin-bottom:.9rem;background:rgba(20,14,32,0.6)}
.sounding-name{font-family:"Special Elite",serif;font-size:.95rem;color:var(--thought);letter-spacing:.08em;margin-bottom:.25rem}
.sounding-fragment{font-size:1.1rem;color:var(--text-dim);font-style:italic;margin-bottom:.15rem;letter-spacing:.04em}
.sounding-origin{font-size:.62rem;color:var(--border-bright);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.45rem}
.sounding-body{font-size:.78rem;color:var(--text-dim);line-height:1.65;margin-bottom:.3rem}
.sounding-effect{font-size:.7rem;color:var(--thought);font-style:italic;border-left:1px solid var(--thought-dim);padding-left:.6rem}
.sounding-progress{font-family:monospace;font-size:.72rem;color:var(--thought-dim);margin:.2rem 0}
.sounding-btn{margin-top:.5rem;background:transparent;font-family:"Courier Prime",monospace;font-size:.72rem;padding:.3rem .7rem;cursor:pointer}
.sounding-btn-take{border:1px solid var(--thought-dim);color:var(--thought)}
.sounding-btn-take:hover{border-color:var(--thought)}
.sounding-btn-release{border:1px solid var(--rust);color:var(--rust)}
.sounding-btn-release:hover{border-color:#c05040;color:#c05040}
.sounding-settled{border-color:var(--cold-dim)}
.sounding-settled .sounding-name{color:var(--cold)}
.restart-bar{margin-top:2.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.restart-btn{font-size:.66rem;color:var(--border-mid);border-color:var(--border);letter-spacing:.08em}
.restart-btn:hover{color:var(--rust);border-color:var(--rust)}
.confirm-msg{font-size:.7rem;color:var(--rust);font-style:italic}
.confirm-yes{font-size:.7rem;color:var(--rust);border-color:var(--rust)}
.confirm-no{font-size:.7rem;color:var(--border-bright);border-color:var(--border-mid)}
.confirm-no:hover{color:var(--text);border-color:var(--border-bright)}
.note-toast{position:fixed;bottom:4.5rem;right:1.2rem;background:var(--choice-bg);border:1px solid var(--amber-dim);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.7rem;padding:.38rem .78rem;z-index:300;pointer-events:none;animation:toast-in .3s ease,toast-out .4s ease 2.6s forwards}
.sounding-toast{border-color:var(--thought-dim);color:var(--thought)}
</style>
</head>
<body>
<canvas id="atmos"></canvas>
<div id="root"></div>
<script>
// СПАСИБО v0.6

// ── ATMOSPHERE ──────────────────────────────────────────────────
const canvas=document.getElementById('atmos');
const ctx=canvas.getContext('2d');
let mood='neutral',targetMood='neutral',moodLerp=1,fogParts=[],rainDrops=[],T=0;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;initRain();}
resize();window.addEventListener('resize',resize);
function initFog(){fogParts=[];for(let i=0;i<22;i++)fogParts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:80+Math.random()*140,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.08,ph:Math.random()*Math.PI*2,base:.025+Math.random()*.05});}
initFog();
function initRain(){const p=porthole();rainDrops=[];for(let i=0;i<24;i++)rainDrops.push({x:p.x+(Math.random()-.5)*p.r*2,y:p.y+(Math.random()-.5)*p.r*2,len:5+Math.random()*9,spd:1.2+Math.random()*2});}
function porthole(){const r=Math.min(canvas.width,canvas.height)*.085;return{x:canvas.width-r-28,y:r+28,r};}
const MOOD_COL={neutral:[130,170,190,6,8,12],tense:[140,90,70,10,6,4],uncanny:[60,130,170,4,8,14],revelation:[200,190,140,12,14,10]};
function lerp(a,b,t){return a+(b-a)*t;}
function setMood(m){if(!m||m===targetMood)return;targetMood=m;moodLerp=0;}
function drawAtmos(){
  T+=.008;
  if(moodLerp<1){moodLerp=Math.min(1,moodLerp+.008);if(moodLerp>=1)mood=targetMood;}
  const cm=MOOD_COL[mood]||MOOD_COL.neutral,tm=MOOD_COL[targetMood]||MOOD_COL.neutral,t=moodLerp;
  const fr=lerp(cm[0],tm[0],t),fg=lerp(cm[1],tm[1],t),fb=lerp(cm[2],tm[2],t);
  const br=lerp(cm[3],tm[3],t),bgc=lerp(cm[4],tm[4],t),bb=lerp(cm[5],tm[5],t);
  ctx.fillStyle=`rgb(${br|0},${bgc|0},${bb|0})`;ctx.fillRect(0,0,canvas.width,canvas.height);
  const fogMult=mood==='tense'?2.5:(mood==='uncanny'?0.6:(mood==='revelation'?0.3:1));
  for(const p of fogParts){
    p.x+=p.vx;p.y+=p.vy;p.ph+=.004;
    if(p.x<-p.r)p.x=canvas.width+p.r;if(p.x>canvas.width+p.r)p.x=-p.r;
    if(p.y<-p.r)p.y=canvas.height+p.r;if(p.y>canvas.height+p.r)p.y=-p.r;
    const op=(p.base+Math.sin(p.ph)*.012)*fogMult;
    const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g2.addColorStop(0,`rgba(${fr|0},${fg|0},${fb|0},${op.toFixed(3)})`);
    g2.addColorStop(1,`rgba(${fr|0},${fg|0},${fb|0},0)`);
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  let li=.09+Math.sin(T*.4)*.008;
  if(mood==='tense')li+=Math.sin(T*4.5)*.03;
  if(mood==='revelation')li=.28;if(mood==='uncanny')li=.04;
  const lx=canvas.width*.12,ly=canvas.height*.08;
  const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,Math.min(canvas.width,canvas.height)*.28);
  lg.addColorStop(0,`rgba(176,120,40,${li.toFixed(3)})`);lg.addColorStop(1,`rgba(176,120,40,0)`);
  ctx.fillStyle=lg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawPorthole();requestAnimationFrame(drawAtmos);
}
function drawPorthole(){
  const{x,y,r}=porthole();
  ctx.strokeStyle='#1c2830';ctx.lineWidth=r*.18;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#243038';
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(a)*(r+r*.1),y+Math.sin(a)*(r+r*.1),r*.045,0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.beginPath();ctx.arc(x,y,r*.87,0,Math.PI*2);ctx.clip();
  const sc=mood==='uncanny'?'#060e18':mood==='revelation'?'#202810':'#0e1820';
  const sg=ctx.createLinearGradient(x,y-r,x,y+r);sg.addColorStop(0,sc);sg.addColorStop(1,'#182430');
  ctx.fillStyle=sg;ctx.fillRect(x-r,y-r,r*2,r*2);
  ctx.strokeStyle=`rgba(60,100,130,${mood==='uncanny'?0.5:0.25})`;ctx.lineWidth=.8;
  for(let i=0;i<6;i++){const wy=y+r*.2+i*r*.12+Math.sin(T*.6+i*1.2)*2;ctx.beginPath();ctx.moveTo(x-r,wy);ctx.quadraticCurveTo(x,wy+Math.sin(T+i)*3,x+r,wy);ctx.stroke();}
  if(mood!=='uncanny'&&mood!=='revelation'){
    ctx.strokeStyle=`rgba(100,150,180,${mood==='tense'?0.35:0.18})`;ctx.lineWidth=.6;
    for(const d of rainDrops){d.y+=d.spd;if(d.y>y+r){d.y=y-r;d.x=x+(Math.random()-.5)*r*2;}ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-1,d.y+d.len);ctx.stroke();}
  }
  if(mood==='uncanny'){const cg=ctx.createRadialGradient(x,y-r*.3,0,x,y,r);cg.addColorStop(0,'rgba(60,140,180,0.08)');cg.addColorStop(1,'rgba(60,140,180,0)');ctx.fillStyle=cg;ctx.fillRect(x-r,y-r,r*2,r*2);}
  if(mood==='revelation'){const rg=ctx.createRadialGradient(x,y,0,x,y,r);rg.addColorStop(0,'rgba(200,190,100,0.12)');rg.addColorStop(1,'rgba(200,190,100,0)');ctx.fillStyle=rg;ctx.fillRect(x-r,y-r,r*2,r*2);}
  ctx.restore();
  ctx.strokeStyle='#2a3c48';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,r*.87,0,Math.PI*2);ctx.stroke();
}
drawAtmos();

const SAVE_KEY='spasibo_save',PLAY_KEY='spasibo_plays',FLAGS_KEY='spasibo_past_flags';

let G={
  phase:'title',mode:'attended',
  stats:{vigilance:0,composure:0,communion:0,doubt:0},
  charisms:[],
  soundings:{available:[],taken:[],settled:[]},
  soundingPending:null,
  cover:{posting:null,background:null,denomination:null,connection:null,left:null},
  notes:[],flags:new Set(),
  scene:'chapel_waking',panelOpen:null,confirmRestart:false,
  playCount:parseInt(localStorage.getItem(PLAY_KEY)||'0'),
  pastFlags:JSON.parse(localStorage.getItem(FLAGS_KEY)||'[]'),
};

function iconWord(){return G.playCount>=4?'\u0418\u043a\u043e\u043d':G.playCount>=2?'ikon':'icon';}

// ── THE BREVIARY (Soundings) ──────────────────────────────────────
// Renamed from Thought Cabinet. 4 slots. Must be manually taken.
// Ticks only on genuinely NEW scene visits. 8 ticks to settle.
const MAX_SOUNDINGS=4,SOUNDING_THRESHOLD=8;

const SOUNDINGS={
  gnoti_seauton:{name:'Gn\u014dthi Seaut\u00f3n',fragment:'\u03b3\u03bd\u1ff6\u03b8\u03b9 \u03c3\u03b5\u03b1\u03c5\u03c4\u03cc\u03bd',origin:'Delphic oracle.',taking:'The question turns over. You keep arriving at the same absence.',settled:'Know thyself. The absence has a shape now. You begin to recognise it.',effect:{doubt:1},effect_desc:'Deepens introspective options when trying to remember your arrival.'},
  in_principio:{name:'In Principio',fragment:'In principio erat Verbum',origin:'John 1:1. Vulgate Latin.',taking:'Before language. Before the word. What was before the word?',settled:'The script on the {ICON} uses a different alphabet. You are beginning to think you know what kind.',effect:{vigilance:1},effect_desc:'Heightens perception of written things in strange scripts.'},
  kenosis_thought:{name:'Ken\u014dsis',fragment:'\u03ba\u03ad\u03bd\u03c9\u03c3\u03b9\u03c2',origin:'Philippians 2:7. The self-emptying of Christ.',taking:'What you give up to make room. What arrives in the room you make.',settled:'To empty yourself so something else can fill you. Pavel understands this. You are starting to.',effect:{communion:1},effect_desc:'Enhances Communion when you hold back in conversation.'},
  agape:{name:'Ag\u0101p\u0113',fragment:'\u1f00\u03b3\u03ac\u03c0\u03b7',origin:'New Testament Greek.',taking:'Love that does not require return. You are trying to feel the edges of it.',settled:'She loves you this way. You begin to understand what that might mean for what you were sent to do.',effect:{communion:1},effect_desc:'Unlocks deeper questions with Pavel about the nature of the mission.'},
  null_set:{name:'The Empty Set',fragment:'\u2205',origin:'Set theory. Cantor, Zermelo-Fraenkel.',taking:'What remains when everything is removed. The structure of reaching.',settled:'Not-knowing has a form. You can work with a form.',effect:{doubt:1},effect_desc:'Allows apophatic moves in conversations \u2014 defining by what something is not.'},

function soundingAvailable(id){return G.soundings.available.includes(id);}
function soundingTaken(id){return G.soundings.taken.some(t=>t.id===id);}
function soundingSettled(id){return G.soundings.settled.includes(id);}
function soundingKnown(id){return soundingAvailable(id)||soundingTaken(id)||soundingSettled(id);}

function offerSounding(id){
  if(!id||!SOUNDINGS[id]||soundingKnown(id))return;
  G.soundings.available.push(id);
  showToast('Sounding: '+SOUNDINGS[id].name,'sounding');
}

function takeSounding(id){
  if(soundingTaken(id)||soundingSettled(id))return;
  if(G.soundings.taken.length>=MAX_SOUNDINGS){
    G.soundingPending=id;G.panelOpen='breviary';render();return;
  }
  G.soundings.available=G.soundings.available.filter(x=>x!==id);
  G.soundings.taken.push({id,progress:0});
  G.soundingPending=null;
  showToast(SOUNDINGS[id].name+': taking the sounding.','sounding');render();
}

function releaseSounding(id){
  G.soundings.taken=G.soundings.taken.filter(t=>t.id!==id);
  const pending=G.soundingPending;G.soundingPending=null;
  if(pending){setTimeout(()=>takeSounding(pending),50);}else render();
}

function tickSoundings(){
  // FIX: only called on genuinely new scene visits (see navigate())
  const settled=[];
  G.soundings.taken=G.soundings.taken.map(t=>{
    const p=t.progress+1;
    if(p>=SOUNDING_THRESHOLD){settled.push(t.id);return null;}
    return{id:t.id,progress:p};
  }).filter(Boolean);
  settled.forEach(id=>{
    G.soundings.settled.push(id);
    const s=SOUNDINGS[id];if(s&&s.effect)applyEffect(s.effect);
    showToast(s.name+': settled.','sounding');
  });
}

function soundingBar(p,max){const f=Math.round((p/max)*8);return'\u2588'.repeat(f)+'\u2591'.repeat(8-f);}

n Deck — Bow","mood":"uncanny","art":"haircut","on_enter":{"note":"saw_haircut","flag":"saw_haircut"},"text":["She is large. Long-haired, black the way the space between things is black.","Her purr reaches you. A low rasp that sounds like it has been through a great deal.","She lifts one paw. Holds it — the gesture slightly beside itself. Sets it down.","She looks at you. Recognition older than this crossing. Patient. Complete.","Then she is not on the railing. You did not see her leave."],"choices":[{"text":"Go below. To cargo.","next":"cargo_approach"},{"text":"Go to the mess.","next":"mess_approach"},{"text":"Approach the wheelhouse.","next":"wheelhouse_exterior"},{"text":"Return to the deck.","next":"main_deck","style":"return"}]},"deck_haircut":{"location":"Main Deck — Port Railing","mood":"uncanny","art":"haircut","on_enter":{"note":"saw_haircut","flag":"saw_haircut"},"text":["You approach. She is large, long-haired, black the way a filing error is black.","Her purr begins: a low rasp that sounds like it has been through a great deal.","She lifts one paw. Holds it. The gesture slightly beside itself.","Her eyes: recognition older than this crossing. She has assessed you.","Then she is not on the railing. The answer, you will learn, was yes."],"choices":[{"text":"Go below.","next":"cargo_approach"},{"text":"Go to the mess.","next":"mess_approach"},{"text":"Approach the wheelhouse.","next":"wheelhouse_exterior"},{"text":"Return to the deck.","next":"main_deck","style":"return"}]},"wheelhouse_exterior":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["The wheelhouse is glassed in, elevated. Through the salt-hazed windows: the helm, the instruments.","A man leans against the exterior rail, looking at the water. He has the quality of someone who is very good at not doing anything — as if the not-doing is itself a practice.","He has not looked at you. You have the impression he registered your arrival some time ago."],"choices":[{"text":"Approach him.","next":"vance_meet","requires_stat":["composure",2]},{"text":"Stay back. Watch first.","next":"vance_watch","effect":{"vigilance":1}}]},"vance_watch":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","on_enter":{"flag":"saw_vance"},"return_to":"main_deck","return_label":"Return to the main deck.","text":["He is tall. Work-worn in a way that is different from the other crew.","A black cat — Haircut — appears and sits near his feet. He does not look down at her. She does not look up at him. They occupy the space with the ease of long practice.","He knows the cat's name. The cat knows his. You have not heard anyone tell either of them."],"choices":[{"text":"Approach him now.","next":"vance_meet","requires_stat":["composure",2]},{"text":"Leave them to it. Go inside.","next":"corridor_first"}]},"vance_meet":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","on_enter":{"note":"met_vance","flag":"met_vance"},"text":["He turns to look at you before you reach him. Not startled — simply done waiting.","'Chaplain,' he says. Not a greeting and not a question.","'Vance Landstorm,' he says after a pause. 'I have been on this vessel since before you were ordained.'","Haircut sits at his feet, conducting her own assessment of the horizon.","'She has been asking about you,' he says. He does not specify who he means."],"choices":[{"text":"'She? Who do you mean?'","next":"vance_she","effect":{"vigilance":1}},{"text":"'How long have you been on this route?'","next":"vance_route","effect":{"communion":1}},{"text":"Say nothing. Let him continue.","next":"vance_silence","effect":{"composure":1}}]},"vance_she":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return.","text":["He looks at Haircut. Then back at the water.","'The cat,' he says.","A pause. He means this and does not mean this.","'She assesses everyone who boards. She has been watching you since before you noticed her. The previous chaplain did not notice her.'","He stops talking."],"choices":[{"text":"'What happened to the previous chaplain?'","next":"vance_previous","effect":{"vigilance":1}},{"text":"Leave him to the water.","next":"corridor_first"}]},"vance_route":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return.","text":["'Long enough that I have stopped counting,' he says.","'The ship changes on every crossing. Not the hull. The ship.'","'This crossing is different,' he says. Not as observation. As information."],"choices":[{"text":"'Different how?'","next":"vance_different","effect":{"doubt":1}},{"text":"Leave him to the water.","next":"corridor_first"}]},"vance_silence":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return.","text":["He waits. Then he continues.","'There is a passenger in the forward section who has been trying to access the wheelhouse. Says he is a lawyer.'","'The cargo manifest has an entry that should not be there. I have seen it before.' He stops.","'Before what?' you ask.","He does not answer. He turns back to the water."],"choices":[{"text":"Go find the passenger.","next":"passenger_corridor","effect":{"vigilance":1}},{"text":"Go find the manifest. Cargo.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"Leave him to it.","next":"corridor_first"}]},"vance_previous":{"location":"Main Deck — Wheelhouse Approach","mood":"tense","return_to":"main_deck","return_label":"Return.","text":["He is quiet for long enough that you wonder if he heard you.","'Left the ship,' he says finally. 'Partway through a crossing.'","'This was some time ago. A different kind of crossing than this one. Though I was not sure I understood that at the time.'","Haircut presses her side against his leg briefly. He does not look down."],"choices":[{"text":"Leave him to the water.","next":"corridor_first"}]},"vance_different":{"location":"Main Deck — Wheelhouse Approach","mood":"uncanny","return_to":"main_deck","return_label":"Return.","text":["'The cargo,' he says. 'Usually I know what we are carrying by weight and feel. This crossing I do not. Something in the lower hold accounts for itself differently.'","'And the passenger in the forward section. He has been on this ship before. I know his hands. He does not know I know.'","He turns and looks at you directly for the first time.","'And you,' he says. 'You are not what the last chaplain was.' He holds your gaze. Then he is done. Back to the water."],"choices":[{"text":"Go to the passenger section.","next":"passenger_corridor","effect":{"vigilance":1}},{"text":"Go to cargo.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"Return to the main deck.","next":"main_deck","style":"return"}]},"mess_approach":{"location":"Crew Mess","mood":"neutral","text":["Warmth, and the smell of something cooked many times in the same pot.","A crew member — fifties, weathered — sits with a mug. Two others at the far end whose conversation stops when you appear.","The crew knows what a ship's chaplain is for. They are uncertain whether they want it."],"choices":[{"text":"Pour yourself something and sit near the first mate.","next":"merky_meet","effect":{"communion":1}},{"text":"Introduce yourself to the table.","next":"merky_meet"},{"text":"Find a corner. Wait for them to come to you.","next":"merky_observe","effect":{"vigilance":1}},{"text":"This can wait. Go below.","next":"cargo_approach"},{"text":"Continue to the passenger section.","next":"passenger_corridor"},{"text":"Go back to the corridor.","next":"corridor_first","style":"return"}]},"merky_meet":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["'Merky Crabbit,' they say, without looking up from the mug. 'First mate.'","A pause. They let the title settle. Then they look at you.","'Chaplain. Right. What do you need?'"],"choices":[{"text":"'How long have you been on this route?'","next":"merky_route","effect":{"communion":1}},{"text":"'What should I know about this ship?'","next":"merky_ship","effect":{"vigilance":1}},{"text":"Say nothing. Let them decide what comes next.","next":"merky_silence"}]},"merky_observe":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["You find a corner. The two at the far end resume — something about the cargo manifest, a discrepancy in the count.","Eventually the one with the mug comes over.","'Merky Crabbit. First mate. You have been sitting there like you are waiting for something.'"],"choices":[{"text":"'I was. Now I am here.'","next":"merky_meet_cont","effect":{"composure":1}},{"text":"'I heard something about a discrepancy.'","next":"merky_discrepancy_open","effect":{"vigilance":1}}]},"merky_meet_cont":{"location":"Crew Mess","mood":"neutral","text":["'Huh,' Merky says. This appears to conclude something.","'Merky Crabbit. First mate. What do you need, Chaplain?'"],"choices":[{"text":"'How long have you been on this route?'","next":"merky_route","effect":{"communion":1}},{"text":"'What should I know about this ship?'","next":"merky_ship","effect":{"vigilance":1}},{"text":"Nothing for now. Go.","next":"corridor_first"}]},"merky_discrepancy_open":{"location":"Crew Mess","mood":"tense","text":["'You have good ears for someone who just arrived,' Merky says, sitting down.","'A count in the lower hold. One entry in the manifest that does not match what is physically there. Which means either the manifest is wrong or something is there that should not be.' A pause. 'Or both.'","'We are not alarmed,' they say, in a tone that suggests some degree of alarm."],"choices":[{"text":"'Have you reported it?'","next":"merky_ship","effect":{"vigilance":1}},{"text":"'I will have a reason to go below, then.'","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"knows_manifest_issue"}]},"merky_route":{"location":"Crew Mess","mood":"neutral","text":["'Long enough,' Merky says. 'Long enough that I have stopped counting crossings and started counting something else. Have not found the right unit yet.'","A pause. They set down the mug.","'And you? First time on a working vessel? You do not look like cargo.'"],"choices":[{"text":"'I requested this posting. I had my reasons.'","next":"merky_route_b","effect":{"vigilance":1},"cover_set":{"key":"posting","value":"posting_requested"},"set_note":"cover_posting_requested","hide_if":"cover_posting_set"},{"text":"'I was assigned. No one asked me.'","next":"merky_route_b","effect":{"composure":1},"cover_set":{"key":"posting","value":"posting_assigned"},"set_note":"cover_posting_assigned","hide_if":"cover_posting_set"},{"text":"'I needed to be somewhere else.'","next":"merky_route_b","effect":{"doubt":1},"cover_set":{"key":"posting","value":"posting_escape"},"set_note":"cover_posting_escape","hide_if":"cover_posting_set"},{"text":"'Someone asked for me specifically. I still do not know who.'","next":"merky_route_b","effect":{"communion":1},"cover_set":{"key":"posting","value":"posting_summoned"},"set_note":"cover_posting_summoned","hide_if":"cover_posting_set"},{"text":"[Same answer as before.]","next":"merky_route_b","effect":{"composure":1},"show_if":"cover_posting_set"}]},"merky_route_b":{"location":"Crew Mess","mood":"neutral","text":["Merky nods. Accepts this or files it.","'Before the collar. What were you?'"],"choices":[{"text":"'A teacher.'","next":"merky_cargo_warning","effect":{"communion":1},"cover_set":{"key":"background","value":"bg_teacher"},"set_note":"cover_bg_teacher","hide_if":"cover_background_set"},{"text":"'Medical work.'","next":"merky_cargo_warning","effect":{"vigilance":1},"cover_set":{"key":"background","value":"bg_medical"},"set_note":"cover_bg_medical","hide_if":"cover_background_set"},{"text":"'Civil service. Minor.'","next":"merky_cargo_warning","effect":{"composure":1},"cover_set":{"key":"background","value":"bg_functionary"},"set_note":"cover_bg_functionary","hide_if":"cover_background_set"},{"text":"'A student. For a very long time.'","next":"merky_cargo_warning","effect":{"doubt":1},"cover_set":{"key":"background","value":"bg_scholar"},"set_note":"cover_bg_scholar","hide_if":"cover_background_set"},{"text":"[Same answer as before.]","next":"merky_cargo_warning","effect":{"composure":1},"show_if":"cover_background_set"}]},"merky_cargo_warning":{"location":"Crew Mess","mood":"tense","on_enter":{"note":"merky_warned_cargo"},"text":["Merky nods. Stands.","'Stay out of cargo,' they say. Not quite a warning. 'There is a passenger down there who should not be. Keeps saying he is lost. He talks about God. Thought that might be your department.'","'Also: the forward section has someone who keeps trying to reach the wheelhouse. Maritime lawyer, he says.' A pause. 'He is not.'"],"choices":[{"text":"Go to cargo now.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"Go to the passenger section first.","next":"passenger_corridor","effect":{"vigilance":1}},{"text":"'What tradition did you declare the ship maintains?'","next":"merky_tradition"},{"text":"'Thank you.' Go to the deck.","next":"main_deck"}]},"merky_tradition":{"location":"Crew Mess","mood":"neutral","text":["'We maintain whatever the company told us to. Which is none.' A pause. 'What tradition are you?'"],"choices":[{"text":"'Orthodox.'","next":"cargo_approach","cover_set":{"key":"denomination","value":"denom_orthodox"},"set_note":"cover_denom_orthodox","hide_if":"cover_denomination_set"},{"text":"'Protestant.'","next":"cargo_approach","effect":{"composure":1},"cover_set":{"key":"denomination","value":"denom_protestant"},"set_note":"cover_denom_protestant","hide_if":"cover_denomination_set"},{"text":"'Ecumenical.'","next":"cargo_approach","effect":{"doubt":1},"cover_set":{"key":"denomination","value":"denom_ecumenical"},"set_note":"cover_denom_ecumenical","hide_if":"cover_denomination_set"},{"text":"'Catholic.'","next":"cargo_approach","cover_set":{"key":"denomination","value":"denom_catholic"},"set_note":"cover_denom_catholic","hide_if":"cover_denomination_set"},{"text":"[Same answer as before.]","next":"cargo_approach","effect":{"composure":1},"show_if":"cover_denomination_set"}]},"merky_ship":{"location":"Crew Mess","mood":"neutral","text":["'She is older than she looks. Or looks older than she is.' A drink. 'Crew is solid. Cargo is none of your business. Crossing takes as long as it takes.'","A pause. 'There is a passenger in the forward section who has been asking questions he does not have the background for. About the manifest. About the route.'"],"choices":[{"text":"'What kind of questions?'","next":"merky_cargo_warning","effect":{"vigilance":1}},{"text":"'Sounds like chaplain work.'","next":"merky_route","effect":{"communion":1}}]},"merky_silence":{"location":"Crew Mess","mood":"neutral","text":["Merky looks at you for a long moment. You look back.","'Huh,' they say eventually.","'Do not go below without a reason you would say out loud,' they say, walking away.","You are alone with old coffee and the sense of having passed a test."],"choices":[{"text":"Go below to cargo.","next":"cargo_approach","effect":{"composure":1}},{"text":"Go to the main deck.","next":"main_deck"},{"text":"Go to the passenger section.","next":"passenger_corridor"}]},"passenger_corridor":{"location":"Passenger Corridor — Forward Section","mood":"neutral","hub":true,"text":["A narrower corridor. Wood panelling over iron. A strip of carpet that has absorbed decades of salt water.","Three cabin doors. A common area at the end — a table, two chairs, a lamp built for a different ship.","From the common area: the sound of papers being moved."],"choices":[{"text":"Go to the common area.","next":"passenger_common"},{"text":"Listen at the cabin doors.","next":"passenger_cabins","effect":{"vigilance":1}},{"text":"Try Cabin 2.","next":"cabin_2_approach","show_if":"act2_unlocked","requires_stat":["vigilance",2]},{"text":"Go back to the crew section.","next":"corridor_first","style":"return"}]},"passenger_cabins":{"location":"Passenger Corridor — Forward Section","mood":"neutral","return_to":"passenger_corridor","return_label":"Return to the corridor.","text":["Cabin 1: nothing. Or the controlled silence of someone who knows they might be listened to.","Cabin 2: movement. Something being shifted. A muttering — not distressed. Computational.","Cabin 3: nothing at all. A quality of nothing-at-all that is different from emptiness.","You note all three."],"choices":[{"text":"Go to the common area.","next":"passenger_common","effect":{"vigilance":1}},{"text":"Return to the corridor.","next":"passenger_corridor","style":"return"}]},"passenger_common":{"location":"Passenger Common Area","mood":"neutral","hub":true,"text":["At the table: a man in his fifties with a briefcase open in front of him. Papers arranged in a pattern that is either methodical or chaotic. He has two pairs of glasses and is wearing one of each type simultaneously.","He looks up. He has the face of someone who has been waiting to be interrupted by exactly you."],"choices":[{"text":"Introduce yourself.","next":"butterantonio_meet"},{"text":"Ask what he is working on.","next":"butterantonio_papers","effect":{"vigilance":1}},{"text":"Look at the notice board on the wall.","next":"passenger_notice","once":true}]},"passenger_notice":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["A notice board. Ship regulations, an outdated schedule, a hand-drawn map.","Someone has added annotations in pencil — small, careful. Not in English. Not in any language you can immediately place.","Some annotations mark rooms that do not appear on the printed layout."],"choices":[{"text":"Make a mental note.","next":"passenger_common","effect":{"vigilance":1},"set_flag":"saw_notice_map"},{"text":"Leave it.","next":"passenger_common","style":"return"}]},"butterantonio_meet":{"location":"Passenger Common Area","mood":"neutral","on_enter":{"note":"met_butterantonio","flag":"met_butterantonio"},"text":["'Chaplain!' he says, with the relief of someone who has been waiting for the right professional. 'Excellent. I am Craigslist Butterantonio, maritime law, semi-retired but not in any way that affects my standing.'","He gestures at the other chair. You sit.","'I have been attempting to access the ship's official documentation for three days,' he says, 'and I want to be honest about that, because I think honesty is going to be important in whatever this is.'","His two pairs of glasses catch the lamplight."],"choices":[{"text":"'What documentation?'","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"'Whatever what is?'","next":"butterantonio_whatever","effect":{"doubt":1}},{"text":"'Are you all right? You seem agitated.'","next":"butterantonio_state","effect":{"communion":1}}]},"butterantonio_papers":{"location":"Passenger Common Area","mood":"neutral","on_enter":{"note":"met_butterantonio","flag":"met_butterantonio"},"text":["He looks up before you have spoken. The cargo manifest, he says. An anomaly. He has been cross-referencing it with the ship's registry and what he believes to be a secondary manifest that someone went to some trouble to obscure.","'I am Craigslist Butterantonio. Maritime law. Two pairs of glasses. You are the chaplain. Good. I was hoping there would be a chaplain.'"],"choices":[{"text":"'What anomaly?'","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"'Why were you hoping for a chaplain?'","next":"butterantonio_whatever","effect":{"doubt":1}},{"text":"'What secondary manifest?'","next":"butterantonio_docs","effect":{"vigilance":2}}]},"butterantonio_docs":{"location":"Passenger Common Area","mood":"tense","return_to":"passenger_common","return_label":"Return to the common area.","text":["'The manifest lists a sealed container as: archival material, academic, declared value nominal. That phrase — declared value nominal — is a legal flag.' He adjusts his reading glasses. 'It means the shipper has declared the value low. But the insurance documentation lists a much higher figure. Under a category I have only seen used twice in forty years.'","'What category?' you ask.","'Culturally significant material, provenance disputed.' He lets that settle. 'Someone is moving something that belongs, arguably, to someone else. Possibly a nation-state.'","'I am not here to stop it,' he says carefully. 'I am here to understand it. The law has nuances.'"],"choices":[{"text":"'Who hired you?'","next":"butterantonio_client","effect":{"vigilance":1}},{"text":"'What do you think it is?'","next":"butterantonio_guess","effect":{"doubt":1}},{"text":"Leave him. Go to cargo.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"butterantonio_whatever":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return.","text":["'I have been on a number of ships and I have never been on one that felt like this one. The same answer keeps arriving: this ship is paying attention.'","'Ships do not pay attention,' you say.","'No,' he agrees. 'They do not. And yet.' He polishes a lens. 'And then there is the manifest question. And the fact that someone was in my cabin last night. Nothing taken. Nothing moved. But someone was there.'"],"choices":[{"text":"'What is in the manifest?'","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"'Did you see who it was?'","next":"butterantonio_visitor","effect":{"vigilance":1}},{"text":"Let him sit with that.","next":"passenger_common","style":"return"}]},"butterantonio_state":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return.","text":["'Yes,' he says. 'Somewhat.' He takes both pairs of glasses off. Without them he looks older and more certain of something.","'I have seen things moved across water that should not have been moved. This crossing feels like one of those. I would like to be wrong.'","He picks up a paper and puts it down again.","'I would like to be wrong,' he repeats, 'but I am not often wrong.'"],"choices":[{"text":"'Tell me about the manifest.'","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"'You will not be alone in whatever this is.'","next":"butterantonio_reassure","effect":{"communion":1}},{"text":"Leave him to it.","next":"passenger_common","style":"return"}]},"butterantonio_client":{"location":"Passenger Common Area","mood":"tense","return_to":"passenger_common","return_label":"Return.","text":["'I cannot tell you that. Privilege.' A pause. 'My client is not on this ship. My client's interests and this ship's current manifest are in direct opposition.'","'Why does the chaplain change things?' you ask.","'Because the chaplain is the only person on this vessel who might understand what is actually at stake. Not legally. Theologically.'"],"choices":[{"text":"'What is at stake, theologically?'","next":"butterantonio_stakes","effect":{"doubt":1}},{"text":"Go to cargo. Find out yourself.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"butterantonio_guess":{"location":"Passenger Common Area","mood":"uncanny","return_to":"passenger_common","return_label":"Return.","text":["'Something that was taken during a period when taking was easy. An object of resonance — not monetary. The other kind.'","'An object that means something to a great many people who are not currently in a position to say so. History is unstable. What was taken may become returnable.'","'There is a thought I have been sitting with for three days. About what things are worth and who gets to decide.'"],"choices":[{"text":"'Let me hear it.'","next":"butterantonio_thought","effect":{"doubt":1},"thought":"sobornost"},{"text":"Go to cargo.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"butterantonio_thought":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return.","text":["'There are objects that accumulate the belief of generations. Not necessarily relics in the religious sense — though sometimes. Objects around which a collective understanding has crystallised. They hold what the group knows about itself.'","'When those objects are removed, the group loses not just the thing. Something in the structure of collective knowing. And when they are returned —' He stops. 'That is what I do not know.'","'I suspect you might know. Or be on the way to knowing.'"],"choices":[{"text":"Go to cargo.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"},{"text":"Return to the common area.","next":"passenger_common","style":"return"}]},"butterantonio_visitor":{"location":"Passenger Common Area","mood":"uncanny","return_to":"passenger_common","return_label":"Return.","text":["'I did not see anyone,' he says. 'I heard the door. The quality of the air change. I got up. No one there.'","'But there was a cat sitting in the middle of the floor. A large black cat with long hair. She looked at me for thirty seconds and then left through a door that was not open.'","'She was assessing something,' he says. 'I have been trying to decide what to do with that information.'"],"choices":[{"text":"'That is Haircut,' you say. 'She does that.'","next":"butterantonio_haircut","requires_flag":"saw_haircut","effect":{"communion":1}},{"text":"Say nothing. Return.","next":"passenger_common","style":"return"}]},"butterantonio_haircut":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return.","text":["He stares at you. 'You know the cat,' he says.","'She was assessing you,' you say. 'She does that with everyone.'","'And?' he says. 'What is the verdict?'","'She has never been wrong,' you say. You are not certain how you know this. But you know it.","He considers this for a long time. Then he opens his briefcase.","'All right,' he says. 'Sit down. Let me tell you everything.'"],"choices":[{"text":"Sit down. Let him tell you everything.","next":"butterantonio_docs","effect":{"vigilance":1,"communion":1}}]},"butterantonio_reassure":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return.","text":["'That is a very chaplain thing to say,' he says. 'I mean that as a compliment.'","'I do not need reassurance. I need someone to know what I know. In case something happens to the knowing.'","He spreads his papers on the table. Let me show you the manifest, he says."],"choices":[{"text":"Let him show you.","next":"butterantonio_docs","effect":{"vigilance":1}}]},"butterantonio_stakes":{"location":"Passenger Common Area","mood":"tense","return_to":"passenger_common","return_label":"Return.","text":["'The question of what things belong to. Theologically: the question of what can be owned. Whether things that carry the weight of a people's self-understanding can be transferred. Whether that transfer is valid in a sense that is not legal.'","'There is an object in the lower hold that belongs — in some sense prior to law — to a great many people who no longer have a state. Or had one, briefly, and then lost it. And who have been — I think the word is waiting.'","'You are the chaplain,' he says. 'You understand waiting.'"],"choices":[{"text":"'Tell me everything you know.'","next":"butterantonio_docs","effect":{"doubt":1,"vigilance":1}},{"text":"Go to cargo.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"sick_bay":{"location":"Sick Bay","mood":"neutral","return_to":"corridor_first","return_label":"Return to the corridor.","text":["A small room off the main corridor. Medical supplies, a bunk, a smell of antiseptic and something older.","A woman in her forties is writing at a small desk. When she looks up, her expression is the professional neutral of someone who has learned to control her first reactions.","'Chaplain,' she says. Not warmly. Not coldly. Professionally."],"choices":[{"text":"Introduce yourself properly.","next":"eider_meet"},{"text":"'I understand you have been treating Tim Ezterhazh.'","next":"eider_tim","requires_flag":"met_tim","effect":{"vigilance":1}},{"text":"'The container in the lower hold. Has anyone come to you about it?'","next":"eider_container","requires_flag":"found_container"},{"text":"Leave her to her work.","next":"corridor_first","style":"return"}]},"eider_meet":{"location":"Sick Bay","mood":"neutral","on_enter":{"note":"met_eider","flag":"met_eider"},"text":["'Eider Swagstom,' she says. 'Ship's doctor.' A pause. 'I know who you are. There is a chaplain on this crossing. Someone decided that was necessary.'","She closes her notebook.","'I will tell you what I can and what I cannot. I have professional obligations. I have also been on this ship for four years and I know when a crossing is different.'"],"choices":[{"text":"'Different how?'","next":"eider_different","effect":{"doubt":1}},{"text":"'Someone requested a chaplain specifically?'","next":"eider_summoned","effect":{"vigilance":1}},{"text":"Leave her to her work.","next":"corridor_first","style":"return"}]},"eider_different":{"location":"Sick Bay","mood":"neutral","return_to":"sick_bay","return_label":"Return to the sick bay.","text":["'I have treated two crew members for stress responses in the first three days of this crossing. That is unusual. Neither will tell me the cause.'","'I have also been asked about the cargo manifest by three separate people, none of whom had any professional reason to ask me.'","She does not elaborate."],"choices":[{"text":"'Who are the crew members?'","next":"eider_tim_hint","effect":{"vigilance":1}},{"text":"Thank her. Return.","next":"sick_bay","style":"return"}]},"eider_summoned":{"location":"Sick Bay","mood":"neutral","return_to":"sick_bay","return_label":"Return.","text":["'The request came through the shipping company. Non-standard. Specifically: a chaplain with experience in Orthodox liturgy and a background in' — she pauses — 'what the paperwork called heritage authentication.'","She looks at you steadily.","'I did not know what that meant when I saw it. I am beginning to think I do now.'"],"choices":[{"text":"'Heritage authentication.'","next":"eider_container","requires_flag":"found_container"},{"text":"Thank her. Return.","next":"sick_bay","style":"return"}]},"eider_tim_hint":{"location":"Sick Bay","mood":"neutral","return_to":"sick_bay","return_label":"Return.","text":["'I will not name patients.' A pause. 'One of them works in the lower sections of the ship. He came to me with burns on his hands that had partially healed — but healed incorrectly. Faster than burns heal. In a configuration I have not seen before.'","'He would not tell me what caused them. He seemed frightened of his own hands.'"],"choices":[{"text":"Go find him. Engine room.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"looking_for_tim"},{"text":"Thank her. Return.","next":"sick_bay","style":"return"}]},"eider_container":{"location":"Sick Bay","mood":"tense","return_to":"sick_bay","return_label":"Return.","text":["She is quiet for a moment.","'I treated someone for burns after they made contact with the container. The burns were unusual. Thermal in origin but not consistent with any heat source in that hold. The healing was accelerated in a way I cannot account for medically.'","'I am a doctor,' she says. 'I deal in material causation. But I have been in that hold and I felt something near that container.' She pauses. 'I would rather not say what I felt. It would not be professional.'","'The crew member who was burned — he is in the engine room. He asked me not to send anyone to him. I am telling you anyway because I think he needs the kind of help I cannot provide.'"],"choices":[{"text":"Go to the engine room. Find him.","next":"engine_room","set_flag":"eider_sent_you"}]},"eider_tim":{"location":"Sick Bay","mood":"neutral","return_to":"sick_bay","return_label":"Return.","text":["She looks at you carefully. 'You have spoken with him,' she says.","'I have professional obligations,' she says. 'But I will tell you this: whatever happened to him in that hold, the physical manifestation was the least of it. He came to me scared in a way I have not seen in a crew member before.'","'He needs the kind of help I cannot provide. I am glad you have found him.'"],"choices":[{"text":"Thank her. Return.","next":"sick_bay","style":"return"}]},"cabin_2_approach":{"location":"Passenger Corridor — Cabin 2","mood":"neutral","return_to":"passenger_corridor","return_label":"Return to the corridor.","text":["You knock. A long pause. The muttering stops.","'One moment,' says a precise voice.","Another pause. Then the door opens partway.","A person of indeterminate age, wire-framed glasses, sleeves rolled up. Their eyes go to your collar, then to your face, then to your hands.","'Chaplain,' they say, with the tone of someone who has been expecting this and had hoped to delay it."],"choices":[{"text":"Introduce yourself.","next":"sinhola_meet"},{"text":"'I am not here to interfere with your work.'","next":"sinhola_meet_soft","effect":{"communion":1}}]},"sinhola_meet":{"location":"Passenger Cabin 2","mood":"neutral","on_enter":{"note":"met_sinhola","flag":"met_sinhola"},"text":["'Sinhola Shinola,' they say. 'Linguist. Specifically: dead languages and provenance documentation.' They open the door wider. 'Come in, then. I was expecting someone.'","The cabin is covered in papers. On the desk: a copy of the manifest, photographic prints, a document in a language you cannot read.","'I annotated the map in the common area,' they say, preempting the question. 'I needed to understand the ship's layout. The lower sections do not match the schematic I was given.'"],"choices":[{"text":"'What are you working on?'","next":"sinhola_work","effect":{"vigilance":1}},{"text":"'What language is that document?'","next":"sinhola_language","effect":{"doubt":1}},{"text":"'Who sent you?'","next":"sinhola_sent","effect":{"vigilance":1}}]},"sinhola_meet_soft":{"location":"Passenger Cabin 2","mood":"neutral","on_enter":{"note":"met_sinhola","flag":"met_sinhola"},"text":["They consider this.","'That is either very perceptive or a strategy,' they say. 'Either way, come in.'","The cabin is covered in papers. 'Sinhola Shinola. Linguist. Provenance documentation.' They look at you. 'I have been waiting for someone to come and ask me what I know. You are the first person who has done so without a threatening subtext.'"],"choices":[{"text":"'What do you know?'","next":"sinhola_work","effect":{"vigilance":1}},{"text":"'What language is that document?'","next":"sinhola_language","effect":{"doubt":1}}]},"sinhola_work":{"location":"Passenger Cabin 2","mood":"tense","return_to":"passenger_corridor","return_label":"Return to the corridor.","text":["'The container in the lower hold is documented in three languages. Two are standard shipping documentation — French and commercial Russian. The third is Church Slavonic, which is not used in shipping documentation. Ever.'","'The Church Slavonic portion is the provenance record. It names the object's origin, its history, and the community to which it belongs. It was written approximately three hundred years ago and updated several times since.'","'The most recent update is in a different hand. It says: to be returned.'"],"choices":[{"text":"'What is the object?'","next":"sinhola_object","effect":{"doubt":1}},{"text":"'Who wrote the most recent update?'","next":"sinhola_update","effect":{"vigilance":1}}]},"sinhola_language":{"location":"Passenger Cabin 2","mood":"neutral","return_to":"passenger_corridor","return_label":"Return.","text":["'Church Slavonic,' they say. 'Liturgical language. Used in Orthodox services, in provenance documentation for sacred objects.'","They show you the document. The script is the same as the one on the back of your {ICON}.","They watch your face carefully.","'You have seen this script before,' they say. Not a question."],"choices":[{"text":"'On the {ICON} in my cabin.'","next":"sinhola_icon_connection","effect":{"doubt":2}},{"text":"Say nothing.","next":"sinhola_work"}]},"sinhola_icon_connection":{"location":"Passenger Cabin 2","mood":"uncanny","return_to":"passenger_corridor","return_label":"Return.","on_enter":{"flag":"understood_connection"},"text":["They are still for a moment.","'The {ICON} in your cabin was placed there,' they say carefully. 'It is not yours. It was placed there as part of the documentation of the transfer.'","'The {ICON} in the container and the {ICON} in your cabin are from the same original community. They were separated during the dispersals of the early Soviet period. The container holds one. Your cabin holds the authentication key for the other.'","'You were sent as the chaplain because the transfer requires authentication by a person with appropriate credentials. That is you. You are the notary.'","They look at you steadily. 'Except now you know.'"],"choices":[{"text":"Go to the chapel. Look at the {ICON} again.","next":"chapel_icon_act2","set_flag":"found_container_interior"}]},"sinhola_object":{"location":"Passenger Cabin 2","mood":"uncanny","return_to":"passenger_corridor","return_label":"Return.","text":["'An icon,' they say. 'Very old. Face worn to near-nothing. The community that made it no longer exists as a community — dispersed. The icon passed through several hands during the early Soviet period, then was sold to a private collector, then re-sold, and is now being moved West again.'","'The provenance document specifies the conditions under which the icon can be transferred. Those conditions require authentication by a person of the relevant liturgical tradition.' A pause. 'Which is why there is a chaplain on this crossing.'","They look at you.","'That is you,' they say. 'You are the authentication. Except no one told you that.'"],"choices":[{"text":"Go to the chapel. Look at the {ICON} again.","next":"chapel_icon_act2","set_flag":"found_container_interior"},{"text":"'Who knows this?'","next":"sinhola_update"}]},"sinhola_update":{"location":"Passenger Cabin 2","mood":"neutral","return_to":"passenger_corridor","return_label":"Return.","text":["'The most recent update to the provenance record was written by a member of the dispersed community. Approximately fifteen years ago.' They pause. 'It reads: to be returned to the people, not to the buyers. To be returned when someone with eyes open is present.'","'Eyes open,' you repeat.","'Their phrase, not mine,' they say. 'I am a linguist. I translate. I do not interpret.' A pause. 'Although in this case I think the interpretation is not complicated.'"],"choices":[{"text":"Go to the chapel.","next":"chapel_icon_act2","set_flag":"found_container_interior"},{"text":"Go to cargo. Find the container.","next":"cargo_approach","set_flag":"found_container_interior"}]},"sinhola_sent":{"location":"Passenger Cabin 2","mood":"neutral","return_to":"passenger_corridor","return_label":"Return.","text":["'By the community,' they say simply. 'The people who wrote the provenance document. They cannot be here themselves — there is no longer a themselves in that sense. But they had representatives who could commission someone.'","'They asked for a linguist who could read Church Slavonic, who had no financial interest in the outcome, and who had a high tolerance for moral complexity.' A pause. 'I had reasonable ratings on all three criteria.'"],"choices":[{"text":"'What do you need from me?'","next":"sinhola_work"},{"text":"Go to cargo.","next":"cargo_approach"}]},"engine_room":{"location":"Engine Room","mood":"tense","return_to":"cargo_approach","return_label":"Return to the hold.","text":["You access the engine room from the lower level of the hold. Heat. The sound here is deafening and constant, a sound you have to move through.","A crew member is doing maintenance at the far side with the focused attention of someone who very much wants to be occupied.","He looks up when he sees you. His hands are wrapped — not bandaged, wrapped, in the way of someone who has done it themselves and does not want anyone to ask."],"choices":[{"text":"Approach him.","next":"tim_meet"},{"text":"Watch from a distance.","next":"tim_watch","effect":{"vigilance":1}}]},"tim_watch":{"location":"Engine Room","mood":"tense","return_to":"cargo_approach","return_label":"Return to the hold.","text":["He is working carefully with his wrapped hands. He keeps his right hand below his left when he can.","At one point he stops. Looks at his hands. There is something in his expression that is not pain and not exactly fear. More like confusion about what he has become adjacent to.","He looks up and sees you watching. He does not flinch."],"choices":[{"text":"Approach him.","next":"tim_meet","effect":{"communion":1}}]},"tim_meet":{"location":"Engine Room","mood":"tense","on_enter":{"note":"met_tim","flag":"met_tim"},"text":["'Tim Ezterhazh,' he says. 'I loaded the cargo.' A pause. 'I know why you are here. The doctor sent you.'","He is in his thirties. Strong in the way of people who do physical work without thinking about it. The wrapped hands are the only indication that something is wrong.","'I do not need a chaplain,' he says. 'I need someone to tell me what happened to my hands was normal.' A pause. 'Is it normal?'"],"choices":[{"text":"'Tell me what happened.'","next":"tim_story","effect":{"communion":1}},{"text":"'I cannot tell you it was normal until I know what happened.'","next":"tim_story","effect":{"composure":1}},{"text":"'What did your hands touch?'","next":"tim_container","effect":{"vigilance":1}}]},"tim_story":{"location":"Engine Room","mood":"tense","return_to":"engine_room","return_label":"Stay in the engine room.","text":["'I loaded it three days before departure. Standard procedure. But this container was — it was warm. Not from the sun. The hold was cold and the container was warm from the inside.'","'I ran my hands along the seal to check the integrity. Both hands, standard procedure.' He looks at his hands. 'It was like touching something that did not want to be touched but did not hurt you for it. Just — registered that you had touched it.'","'My hands burned afterward. They healed in two days, which is fast for burns.' A pause. 'Too fast.'","'My hands are different now. They know something they did not know before. I cannot explain that better than that.'"],"choices":[{"text":"'I believe you. What your hands know is real.'","next":"tim_absolution","effect":{"communion":1}},{"text":"'Can you show me where the release mechanism is on the container?'","next":"tim_release","effect":{"vigilance":1}},{"text":"Return to the hold.","next":"cargo_approach","style":"return"}]},"tim_container":{"location":"Engine Room","mood":"tense","return_to":"engine_room","return_label":"Stay.","text":["'The container,' he says, flatly. 'I knew you were going to ask about the container.'","'I loaded it. I touched the seal. It was warm and it — registered me.' He pauses. 'I do not know another word for that.'","'My hands burned. They healed wrong — too fast. Now they know something.' He holds up his wrapped hands. 'I have been down here away from cargo ever since.'"],"choices":[{"text":"'What does it feel like, what they know?'","next":"tim_story"},{"text":"'Can you tell me where the release mechanism is?'","next":"tim_release","effect":{"vigilance":1}}]},"tim_absolution":{"location":"Engine Room","mood":"neutral","return_to":"engine_room","return_label":"Stay.","on_enter":{"flag":"tim_trusts"},"text":["He is very still for a moment.","'The priest on shore said I was hysterical,' he says. 'He did not say that, but he meant it.'","He unwraps his right hand slowly. The skin there is not burned. It is — different. A texture like old wood. Like something that has been used for a very long time.","'It does not hurt,' he says. 'It just knows.'","He rewraps it.","'If you want to understand what is in that container,' he says, 'I can show you the release. But I am not going near it again.'"],"choices":[{"text":"'Yes. Show me the release.'","next":"tim_release"}]},"tim_release":{"location":"Engine Room","mood":"neutral","return_to":"cargo_approach","return_label":"Return to the hold.","on_enter":{"flag":"knows_release","note":"container_release_known"},"text":["'The lock is standard on the outside. But there is a secondary mechanism inside the lock housing — a rotation, then a press. It should not be there. It was added after manufacture.'","He describes it precisely. The rotation sequence. The amount of pressure. The direction.","'I memorised it when I loaded it,' he says. 'Force of habit. I did not expect to need it.'","A pause.","'Be careful what you touch,' he says. 'Not all of it will stay outside you.'"],"choices":[{"text":"Go to the container.","next":"cargo_approach","set_flag":"found_container_interior"},{"text":"Return to the hold.","next":"cargo_approach","style":"return"}]},"cargo_approach":{"location":"Forward Hold — Access","mood":"neutral","hub":true,"text":["The ladder down. Engine noise closer. Water against the hull.","Work lights — islands of yellow in the larger dark. Crates lashed with care.","Toward the far wall, a figure crouched near crates. Below, in the lower level, a flash of calico colour.","And to the far side: a sealed container, different from the others. The manifest number stencilled on its side does not match the numbers around it."],"choices":[{"text":"Approach the figure.","next":"pavel_direct","show_if":"cover_posting_set"},{"text":"Announce yourself.","next":"pavel_announce","show_if":"cover_posting_set","effect":{"communion":1}},{"text":"Observe the figure from the ladder base.","next":"pavel_observe","show_if":"cover_posting_set","effect":{"vigilance":1}},{"text":"There is someone in the hold. You are not ready to speak to him yet.","next":"cargo_not_ready","hide_if":"cover_posting_set"},{"text":"Go to the cat in the lower level.","next":"cargo_freezer_beef","once":true},{"text":"Examine the sealed container.","next":"cargo_container","requires_stat":["vigilance",2]},{"text":"Go to the engine room.","next":"engine_room","show_if":"act2_unlocked"},{"text":"Go back up.","next":"corridor_first","style":"return"}]},"cargo_not_ready":{"location":"Forward Hold — Access","mood":"neutral","return_to":"cargo_approach","return_label":"Return to the hold.","text":["You stand at the base of the ladder.","There is a man in the wrong part of the hold who is clearly waiting for you. You are not ready for him yet. You have not understood enough of the ship.","The container hums faintly at the far side. Or you imagine it does."],"choices":[{"text":"Go to the mess. Talk to Merky.","next":"mess_approach"},{"text":"Go to the deck.","next":"main_deck"},{"text":"Go to the passenger section.","next":"passenger_corridor"}]},"cargo_container":{"location":"Forward Hold — Lower Aft","mood":"tense","return_to":"cargo_approach","return_label":"Return to the main hold.","text":["You approach the container.","It is sealed with a lock that is not a shipping lock — older than the container. The stencilling lists a manifest number, an origin code, and a description in three languages.","Two you recognise: French and Russian. The third is the same script as the writing on the back of your {ICON}.","The Russian reads, loosely: archival material, institutional collection, transfer authorised.","The container is warm. Warmer than the hold. This has no obvious explanation.","A thought surfaces. Something about the word transfer and what it means for things that should not be transferable."],"choices":[{"text":"Note it and return.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"found_container","set_note":"container_found","style":"return"},{"text":"Use the release mechanism Tim described.","next":"cargo_container_open","requires_flag":"knows_release"},{"text":"Sit with the thought about transfer and ownership.","next":"cargo_approach","thought":"sobornost","effect":{"doubt":1},"style":"return"}]},"cargo_container_open":{"location":"Forward Hold — Lower Aft","mood":"revelation","return_to":"cargo_approach","return_label":"Return to the main hold.","on_enter":{"flag":"found_container_interior","note":"container_opened"},"text":["The mechanism works as Tim described. The seal yields.","You do not open it fully. You open it enough to see inside.","Inside, secured in padding that has been there a long time: an icon.","Very old. The face worn to near-nothing. Two dark places for eyes, a darker place for a mouth. Traces of gold. A halo that has almost entirely given itself back.","On the back, a script you know now. The same writing. The same hand, or a hand that knew the same tradition.","You stand very still.","The {ICON} in your cabin and the {ICON} in this container are from the same community. The same lost pair.","You close the container. Your hands are not burned. But they know something now."],"choices":[{"text":"Go to the chapel.","next":"chapel_icon_act2"}]},"cargo_freezer_beef":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up to the main hold.","on_enter":{"note":"met_freezer_beef"},"text":["You climb down.","On a crate, a small calico cat is asleep with the comprehensive contentment of a creature who has found the optimal arrangement of the world and entered it fully.","She does not stir. She is extremely warm in a way you can tell from a distance."],"choices":[{"text":"Reach out and pet her.","next":"freezer_beef_contact","effect":{"composure":1}},{"text":"Do not disturb her. Just sit nearby.","next":"freezer_beef_nearby","effect":{"composure":1}}]},"freezer_beef_contact":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up.","text":["Without waking, without opening her eyes, she repositions so that more of her is in contact with your hand. Then more.","She is extremely warm.","Something in your chest that has been braced releases by a degree. Not all the way. A degree.","That degree is enough."],"choices":[{"text":"Stay a while.","next":"freezer_beef_stay","effect":{"composure":1}},{"text":"Climb back up.","next":"cargo_approach","style":"return"}]},"freezer_beef_nearby":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up.","text":["You sit on an adjacent crate.","The calico breathes. Asleep, comprehensively content. Her assessment extends to you. You are adequate. That is sufficient.","Something eases. Just given a moment to be what it is."],"choices":[{"text":"Climb back up.","next":"cargo_approach","style":"return"}]},"freezer_beef_stay":{"location":"Forward Hold — Lower Level","mood":"neutral","text":["You stay.","She is asleep on you with the complete confidence of a creature who has assessed the situation and found it safe.","Somewhere above, a man in a too-large coat is in the wrong place for reasons he cannot fully explain.","The container hums, faintly, at the far end of the hold.","For now: this."],"choices":[{"text":"Climb back up. Find Pavel.","next":"cargo_approach","style":"return"}]},"pavel_observe":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["A man — forties, or older. A coat slightly too large. He talks to himself with the tone of someone confirming a proof.","You catch: '— she said it would be this crossing, and this is this crossing, so —'","He stops. Looks up. He has known you were there.","'Oh. Good. You are the chaplain, yes? I was in the wrong place. Are you the chaplain?'"],"choices":[{"text":"'Yes. And you are?'","next":"pavel_intro"},{"text":"'Who told you there was a chaplain?'","next":"pavel_who","effect":{"vigilance":1}}]},"pavel_direct":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["He looks up with the face of someone who expected to be found.","'Ah. There you are.' As if you had an appointment here.","He folds a small piece of paper into his pocket before you can see it.","'I keep ending up in the wrong places,' he says, warmly. 'Are you the chaplain?'"],"choices":[{"text":"'Yes. And you are?'","next":"pavel_intro"},{"text":"'What does the chaplain being here mean to you?'","next":"pavel_meaning","effect":{"doubt":1}},{"text":"'What are you doing in cargo?'","next":"pavel_hold","effect":{"composure":1}}]},"pavel_announce":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["'Oh! Yes! Sorry.' He stands, nearly knocking something over. 'I know. Wrong place.'","He seems very pleased to see you.","'You are the chaplain,' he says. Not a question."],"choices":[{"text":"'Yes. And you?'","next":"pavel_intro"},{"text":"'How did you know?'","next":"pavel_how","effect":{"vigilance":1}}]},"pavel_intro":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["'Pavel,' he says. 'Just Pavel. Last names are very Roman. Very empire. Paul had one and then he did not, and I think that is interesting.'","'I am a passenger,' he adds, as if this clarifies the cargo hold."],"choices":[{"text":"'What brings you to this ship? To this crossing?'","next":"pavel_why"},{"text":"'How did you end up in cargo specifically?'","next":"pavel_hold"},{"text":"'What do you need from a chaplain?'","next":"pavel_need","effect":{"communion":1}}]},"pavel_why":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["He looks at the crates for a moment, as if deciding how much to say.","'She told me to be here. She said this crossing matters. I could not tell you why in a way that would satisfy most frameworks for satisfying reasons.' He pauses. 'She told me. God told me. These are the same sentence.'","He says it without performance. The way someone says it is cold.","'I was a very normal person for a long time,' he adds. 'I am less normal now. I find that mostly fine.'"],"choices":[{"text":"'Who is she?'","next":"pavel_she","effect":{"vigilance":1}},{"text":"'What does matters mean here?'","next":"pavel_matters","effect":{"doubt":1}},{"text":"'I understand the sentence.'","next":"pavel_understands","effect":{"communion":1},"thought":"agape"}]},"pavel_who":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["'A woman. On the deck. She said: there is a chaplain, and the chaplain is what is interesting about this crossing.'","'My name is Pavel. No last name.'"],"choices":[{"text":"'What did she look like?'","next":"pavel_woman","effect":{"vigilance":2}},{"text":"'She said I was interesting.'","next":"pavel_why","effect":{"doubt":1}},{"text":"'What do you need, Pavel?'","next":"pavel_need","effect":{"communion":1}}]},"pavel_meaning":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["'That is a better question than I was expecting.' He sits on a crate.","'My name is Pavel. I am here because I was told to be — not told-told. The way you know something. Do you know the feeling?' He looks steadily. 'I think you might.'"],"choices":[{"text":"'I might. Say more.'","next":"pavel_why","effect":{"doubt":1,"communion":1}},{"text":"'What were you told?'","next":"pavel_why","effect":{"vigilance":1}}]},"pavel_hold":{"location":"Forward Hold","mood":"neutral","text":["'I was looking for a room where things work differently. I was told it might be near cargo. I was wrong.'","'Pavel. Passenger. Cargo hold tourist.'"],"choices":[{"text":"'What room?'","next":"pavel_room","effect":{"vigilance":1}},{"text":"'I am the chaplain.' Go from there.","next":"pavel_need","effect":{"communion":1}}]},"pavel_how":{"location":"Forward Hold","mood":"neutral","text":["'The collar. And the way you came down the ladder — coming somewhere rather than going somewhere. Pavel. Sorry about the hold.'"],"choices":[{"text":"'What do you notice about this ship?'","next":"pavel_why","effect":{"doubt":1}},{"text":"'What brought you here?'","next":"pavel_why"}]},"pavel_woman":{"location":"Forward Hold","mood":"uncanny","text":["'On deck. A dark coat. She looked at me for a long time and said what she said. And then she was not there.'","'I thought it was a cat, at first.'"],"choices":[{"text":"'There is a cat.'","next":"pavel_why","set_flag":"told_pavel_haircut","effect":{"vigilance":1}},{"text":"'Tell me more about what she said.'","next":"pavel_why","effect":{"doubt":1}}]},"pavel_room":{"location":"Forward Hold","mood":"neutral","text":["'A room where the usual rules are more suggestions. I was told it exists here. She is not always literal.'"],"choices":[{"text":"'Who is she?'","next":"pavel_she"},{"text":"'Tell me about this crossing.'","next":"pavel_why"}]},"pavel_need":{"location":"Forward Hold","mood":"neutral","text":["'I need someone to tell what I think is happening, so I can hear it back and find out if it holds together.'","'Also I am quite cold. Is there coffee somewhere?'"],"choices":[{"text":"'There is coffee in the mess. Come on.'","next":"pavel_act2_bridge","effect":{"communion":1}},{"text":"'Tell me what you think is happening.'","next":"pavel_why","effect":{"doubt":1}}]},"pavel_she":{"location":"Forward Hold","mood":"neutral","text":["'She is the one I mean when I say God and want to be accurate. Generous. Patient. Not what anyone expects.'","'She said some things about the chaplain. I will hold onto those until I understand them better.'"],"choices":[{"text":"'What things?'","next":"pavel_about_you","effect":{"doubt":2}},{"text":"'What does she want with this crossing?'","next":"pavel_matters","effect":{"vigilance":1}},{"text":"Let that be. Ask about his life.","next":"pavel_life","effect":{"communion":1}}]},"pavel_about_you":{"locati
