<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>СПАСИБО — v0.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080c;--text:#a8bcc8;--text-dim:#526070;--text-bright:#d4e4f0;
  --amber:#b08030;--amber-dim:#5a4018;--cold:#5aa0b8;--cold-dim:#1a3040;
  --rust:#8a3828;--border:#182028;--border-mid:#283848;--border-bright:#3a5060;
  --choice-bg:rgba(10,14,20,0.72);--choice-hover:rgba(18,26,34,0.92);
  --thought:#7a6898;--thought-dim:#2a2038;
}
body{background:var(--bg);color:var(--text);font-family:"Courier Prime","Courier New",monospace;min-height:100vh;overflow-x:hidden}
#atmos{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
#root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse-cold{0%,100%{color:var(--cold)}50%{color:var(--cold-dim)}}
@keyframes flicker{0%,100%{opacity:1}45%{opacity:.88}46%{opacity:1}80%{opacity:.95}}
@keyframes slide-r{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slide-l{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes toast-in{from{opacity:0;transform:translateY(.5rem)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateY(-.5rem)}}
@keyframes save-flash{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}

.title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;animation:fi 3s ease-in}
.title-cyrillic{font-family:"Special Elite",serif;font-size:clamp(2.8rem,8vw,5rem);color:var(--text-bright);letter-spacing:.35em;margin-bottom:.4rem;text-shadow:0 0 40px rgba(90,160,184,0.12)}
.title-romanised{font-size:.72rem;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;margin-bottom:.2rem}
.title-translation{font-size:.68rem;color:var(--amber-dim);letter-spacing:.18em;font-style:italic;margin-bottom:3.5rem}
.title-ship{font-family:"Courier Prime",monospace;font-size:.62rem;color:var(--border-mid);white-space:pre;line-height:1.3;margin-bottom:3rem;animation:flicker 8s ease-in-out infinite}
.title-sub{font-size:.78rem;color:var(--text-dim);letter-spacing:.12em;font-style:italic;margin-bottom:2rem}
.title-sub.replay{color:var(--cold-dim);animation:pulse-cold 4s ease-in-out infinite}
.title-btns{display:flex;flex-direction:column;gap:.6rem;align-items:center}

.btn{background:transparent;border:1px solid var(--border-mid);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.84rem;padding:.6rem 1.8rem;cursor:pointer;letter-spacing:.12em;transition:all .2s}
.btn:hover{border-color:var(--amber);color:var(--text-bright)}
.btn:disabled{opacity:.3;cursor:default}
.btn-sm{font-size:.72rem;padding:.45rem 1.2rem;border-color:var(--border);color:var(--text-dim)}
.btn-sm:hover{border-color:var(--border-mid);color:var(--text)}
.btn-cold{border-color:var(--cold-dim);color:var(--cold)}
.btn-cold:hover{border-color:var(--cold);color:var(--text-bright)}

.sel-screen{max-width:620px;width:100%;padding:3rem 1.5rem 4rem;animation:fi .8s ease-in}
.sel-h{font-family:"Special Elite",serif;font-size:1.1rem;color:var(--text-bright);letter-spacing:.18em;margin-bottom:.4rem;text-align:center}
.sel-sub{font-size:.78rem;color:var(--text-dim);margin-bottom:2rem;text-align:center;font-style:italic;line-height:1.7}
.sel-grid{display:flex;flex-direction:column;gap:.9rem;margin-bottom:2rem}
.sel-opt{border:1px solid var(--border);padding:1.1rem 1.3rem;cursor:pointer;transition:all .2s;background:var(--choice-bg)}
.sel-opt:hover{border-color:var(--border-bright);background:var(--choice-hover)}
.sel-opt.chosen{border-color:var(--amber)}
.sel-opt.chosen-cold{border-color:var(--cold)}
.sel-name{font-family:"Special Elite",serif;font-size:1rem;color:var(--amber);letter-spacing:.1em;margin-bottom:.35rem}
.sel-name-cold{color:var(--cold)}
.sel-desc{font-size:.78rem;color:var(--text-dim);line-height:1.65}
.sel-section{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin:.9rem 0 .4rem}
.sel-section-cold{color:var(--cold-dim)}

.game{width:100%;max-width:720px;padding:0 1.5rem 5rem;animation:fi .6s ease-in}
.game-header{position:sticky;top:0;z-index:50;background:rgba(6,8,12,0.97);backdrop-filter:blur(3px);padding:.75rem 0 .55rem;border-bottom:1px solid var(--border);margin-bottom:1.2rem}
.save-indicator{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--border-bright);text-align:right;display:none;animation:save-flash 2.2s ease forwards}
.location-bar{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:.5rem}
.location-bar.uncanny{color:var(--cold);animation:pulse-cold 3s ease-in-out infinite}
.sbar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.4rem}
.stat{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.stat-val{color:var(--amber)}
.cbar{display:flex;flex-wrap:wrap;gap:.35rem}
.ctag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--cold-dim);color:var(--cold);text-transform:uppercase}
.cover-tag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--amber-dim);color:var(--amber-dim);text-transform:uppercase}
.thought-tag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--thought-dim);color:var(--thought);text-transform:uppercase}

.art-block{font-family:"Courier Prime",monospace;font-size:.64rem;color:var(--amber-dim);white-space:pre;line-height:1.35;margin:1rem 0;overflow-x:auto}
.stxt{margin-bottom:1.2rem}
.sp{font-size:.93rem;line-height:1.95;color:var(--text);margin-bottom:.9rem}
.sp-cold{color:var(--cold)}
.sp-dim{color:var(--text-dim);font-style:italic}
.sp-anamnesis{color:var(--cold);border-left:1px solid var(--cold-dim);padding-left:.8rem;margin-left:.3rem;font-style:italic;animation:pulse-cold 5s ease-in-out infinite}
.choices{display:flex;flex-direction:column;gap:.5rem;margin-top:1.4rem}
.choice{background:var(--choice-bg);border:1px solid var(--border);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.85rem;padding:.65rem .95rem;text-align:left;cursor:pointer;transition:all .18s;line-height:1.5;width:100%}
.choice:hover{border-color:var(--amber);color:var(--text-bright);background:var(--choice-hover)}
.choice-locked{color:var(--border-mid);border-color:var(--border);cursor:not-allowed;opacity:.5}
.choice-cold{border-color:var(--cold-dim);color:var(--cold)}
.choice-cold:hover{border-color:var(--cold);color:var(--text-bright)}
.choice-cover{border-color:var(--amber-dim)}
.choice-visited{color:var(--text-dim);border-color:var(--border);font-style:italic;font-size:.82rem}
.choice-visited:hover{color:var(--text);border-color:var(--border-mid)}
.choice-return{color:var(--text-dim);border-color:var(--border);font-size:.8rem}
.choice-return:hover{color:var(--text);border-color:var(--border-mid)}
.choice-vespers{border-color:#4a5838;color:#8aab68}
.choice-vespers:hover{border-color:#7a9858;color:var(--text-bright)}
.cover-label{font-size:.62rem;color:var(--amber-dim);display:block;margin-bottom:.12rem;letter-spacing:.06em;text-transform:uppercase}
.obs-section{margin-top:2rem;border-top:1px solid var(--border);padding-top:.8rem}
.obs-title{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:.4rem}
.obs-item{font-size:.75rem;color:var(--text-dim);font-style:italic;line-height:1.65;margin-bottom:.18rem;padding-left:.6rem;border-left:1px solid var(--border-mid)}

.notes-btn,.status-btn,.thoughts-btn{position:fixed;background:var(--choice-bg);border:1px solid var(--border);font-family:"Courier Prime",monospace;font-size:.68rem;letter-spacing:.1em;padding:.42rem .78rem;cursor:pointer;z-index:100;color:var(--text-dim)}
.notes-btn{bottom:1.2rem;right:1.2rem}
.status-btn{bottom:1.2rem;left:1.2rem}
.thoughts-btn{bottom:1.2rem;left:50%;transform:translateX(-50%);color:var(--thought);border-color:var(--thought-dim)}
.notes-btn:hover{border-color:var(--amber-dim);color:var(--amber)}
.status-btn:hover{border-color:var(--cold-dim);color:var(--cold)}
.thoughts-btn:hover{border-color:var(--thought);color:var(--text-bright)}

.side-panel{position:fixed;top:0;height:100vh;width:min(340px,92vw);background:rgba(4,6,10,0.97);padding:1.5rem;overflow-y:auto;z-index:200}
.side-panel-l{left:0;border-right:1px solid var(--border);animation:slide-l .2s ease}
.side-panel-r{right:0;border-left:1px solid var(--border);animation:slide-r .2s ease}
.side-panel-c{left:50%;transform:translateX(-50%);width:min(500px,96vw);border:1px solid var(--thought-dim);animation:fi .2s ease}
.side-panel h3{font-family:"Special Elite",serif;font-size:.88rem;letter-spacing:.16em;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.panel-close{float:right;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem}
.panel-close:hover{color:var(--amber)}
.panel-item{font-size:.76rem;color:var(--text-dim);font-style:italic;line-height:1.7;margin-bottom:.3rem;padding-left:.6rem;border-left:1px solid var(--border-mid)}
.panel-empty{font-size:.76rem;color:var(--border-mid);font-style:italic}
.panel-sec{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin:.8rem 0 .4rem}
.stat-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem;padding:.15rem 0;border-bottom:1px solid var(--border)}
.overlay-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:150}

.thought-card{border:1px solid var(--thought-dim);padding:.9rem 1rem;margin-bottom:.9rem;background:rgba(20,14,32,0.6)}
.thought-name{font-family:"Special Elite",serif;font-size:.95rem;color:var(--thought);letter-spacing:.08em;margin-bottom:.25rem}
.thought-fragment{font-size:1.1rem;color:var(--text-dim);font-style:italic;margin-bottom:.15rem;letter-spacing:.04em}
.thought-origin{font-size:.62rem;color:var(--border-bright);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.45rem}
.thought-desc{font-size:.78rem;color:var(--text-dim);line-height:1.65;margin-bottom:.3rem}
.thought-effect{font-size:.7rem;color:var(--thought);font-style:italic;border-left:1px solid var(--thought-dim);padding-left:.6rem}

.restart-bar{margin-top:2.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.restart-btn{font-size:.66rem;color:var(--border-mid);border-color:var(--border);letter-spacing:.08em}
.restart-btn:hover{color:var(--rust);border-color:var(--rust)}
.confirm-msg{font-size:.7rem;color:var(--rust);font-style:italic}
.confirm-yes{font-size:.7rem;color:var(--rust);border-color:var(--rust)}
.confirm-no{font-size:.7rem;color:var(--border-bright);border-color:var(--border-mid)}
.confirm-no:hover{color:var(--text);border-color:var(--border-bright)}

.note-toast{position:fixed;bottom:4.5rem;right:1.2rem;background:var(--choice-bg);border:1px solid var(--amber-dim);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.7rem;padding:.38rem .78rem;z-index:300;pointer-events:none;animation:toast-in .3s ease,toast-out .4s ease 2.6s forwards}
.thought-toast{border-color:var(--thought-dim);color:var(--thought)}
</style>
</head>
<body>
<canvas id="atmos"></canvas>
<div id="root"></div>
<script>
// СПАСИБО v0.4 — all critical bugs fixed
// Fix 1: mood==='uncanny'?.5:.25 → mood==='uncanny' ? 0.5 : 0.25  (invalid optional chaining on number literal)
// Fix 2: root.innerHTML += destroyed event listeners → createElement for panel buttons
// Fix 3: saveGame() no longer calls render() (was the stack overflow in v0.2)

const canvas=document.getElementById('atmos');
const ctx=canvas.getContext('2d');
let mood='neutral',targetMood='neutral',moodLerp=1,fogParts=[],rainDrops=[],T=0;

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;initRain();}
resize();window.addEventListener('resize',resize);

function initFog(){fogParts=[];for(let i=0;i<22;i++)fogParts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:80+Math.random()*140,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.08,ph:Math.random()*Math.PI*2,base:.025+Math.random()*.05});}
initFog();

function initRain(){const p=porthole();rainDrops=[];for(let i=0;i<24;i++)rainDrops.push({x:p.x+(Math.random()-.5)*p.r*2,y:p.y+(Math.random()-.5)*p.r*2,len:5+Math.random()*9,spd:1.2+Math.random()*2});}

function porthole(){const r=Math.min(canvas.width,canvas.height)*.085;return{x:canvas.width-r-28,y:r+28,r};}

const MOOD_COL={neutral:[130,170,190,6,8,12],tense:[140,90,70,10,6,4],uncanny:[60,130,170,4,8,14],revelation:[180,180,160,10,12,16]};
function lerp(a,b,t){return a+(b-a)*t;}
function setMood(m){if(!m||m===targetMood)return;targetMood=m;moodLerp=0;}

function drawAtmos(){
  T+=.008;
  if(moodLerp<1){moodLerp=Math.min(1,moodLerp+.008);if(moodLerp>=1)mood=targetMood;}
  const cm=MOOD_COL[mood]||MOOD_COL.neutral,tm=MOOD_COL[targetMood]||MOOD_COL.neutral,t=moodLerp;
  const fr=lerp(cm[0],tm[0],t),fg=lerp(cm[1],tm[1],t),fb=lerp(cm[2],tm[2],t);
  const br=lerp(cm[3],tm[3],t),bg=lerp(cm[4],tm[4],t),bb=lerp(cm[5],tm[5],t);
  ctx.fillStyle=`rgb(${br|0},${bg|0},${bb|0})`;ctx.fillRect(0,0,canvas.width,canvas.height);
  // FIX: explicit decimals — no ?.X optional chaining on number literals
  const fogMult=mood==='tense'?2.5:(mood==='uncanny'?0.6:1);
  for(const p of fogParts){
    p.x+=p.vx;p.y+=p.vy;p.ph+=.004;
    if(p.x<-p.r)p.x=canvas.width+p.r;if(p.x>canvas.width+p.r)p.x=-p.r;
    if(p.y<-p.r)p.y=canvas.height+p.r;if(p.y>canvas.height+p.r)p.y=-p.r;
    const op=(p.base+Math.sin(p.ph)*.012)*fogMult;
    const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g2.addColorStop(0,`rgba(${fr|0},${fg|0},${fb|0},${op.toFixed(3)})`);
    g2.addColorStop(1,`rgba(${fr|0},${fg|0},${fb|0},0)`);
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  let li=.09+Math.sin(T*.4)*.008;
  if(mood==='tense')li+=Math.sin(T*4.5)*.03;
  if(mood==='revelation')li=.22;
  if(mood==='uncanny')li=.04;
  const lx=canvas.width*.12,ly=canvas.height*.08;
  const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,Math.min(canvas.width,canvas.height)*.28);
  lg.addColorStop(0,`rgba(176,120,40,${li.toFixed(3)})`);lg.addColorStop(1,`rgba(176,120,40,0)`);
  ctx.fillStyle=lg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawPorthole();requestAnimationFrame(drawAtmos);
}

function drawPorthole(){
  const{x,y,r}=porthole();
  ctx.strokeStyle='#1c2830';ctx.lineWidth=r*.18;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#243038';
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(a)*(r+r*.1),y+Math.sin(a)*(r+r*.1),r*.045,0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.beginPath();ctx.arc(x,y,r*.87,0,Math.PI*2);ctx.clip();
  const sc=mood==='uncanny'?'#060e18':mood==='revelation'?'#182030':'#0e1820';
  const sg=ctx.createLinearGradient(x,y-r,x,y+r);sg.addColorStop(0,sc);sg.addColorStop(1,'#182430');
  ctx.fillStyle=sg;ctx.fillRect(x-r,y-r,r*2,r*2);
  // FIX: was mood==='uncanny'?.5:.25 — invalid optional chaining
  ctx.strokeStyle=`rgba(60,100,130,${mood==='uncanny'?0.5:0.25})`;ctx.lineWidth=.8;
  for(let i=0;i<6;i++){const wy=y+r*.2+i*r*.12+Math.sin(T*.6+i*1.2)*2;ctx.beginPath();ctx.moveTo(x-r,wy);ctx.quadraticCurveTo(x,wy+Math.sin(T+i)*3,x+r,wy);ctx.stroke();}
  if(mood!=='uncanny'&&mood!=='revelation'){
    // FIX: was mood==='tense'?.35:.18
    ctx.strokeStyle=`rgba(100,150,180,${mood==='tense'?0.35:0.18})`;ctx.lineWidth=.6;
    for(const d of rainDrops){d.y+=d.spd;if(d.y>y+r){d.y=y-r;d.x=x+(Math.random()-.5)*r*2;}ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-1,d.y+d.len);ctx.stroke();}
  }
  if(mood==='uncanny'){const cg=ctx.createRadialGradient(x,y-r*.3,0,x,y,r);cg.addColorStop(0,'rgba(60,140,180,0.08)');cg.addColorStop(1,'rgba(60,140,180,0)');ctx.fillStyle=cg;ctx.fillRect(x-r,y-r,r*2,r*2);}
  ctx.restore();
  ctx.strokeStyle='#2a3c48';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,r*.87,0,Math.PI*2);ctx.stroke();
}
drawAtmos();
const SAVE_KEY='spasibo_save',PLAY_KEY='spasibo_plays',FLAGS_KEY='spasibo_past_flags';
let G={phase:'title',mode:'attended',stats:{vigilance:0,composure:0,communion:0,doubt:0},charisms:[],thoughts:[],cover:{posting:null,background:null,denomination:null,connection:null,left:null},notes:[],flags:new Set(),scene:'chapel_waking',panelOpen:null,confirmRestart:false,playCount:parseInt(localStorage.getItem(PLAY_KEY)||'0'),pastFlags:JSON.parse(localStorage.getItem(FLAGS_KEY)||'[]')};

function iconWord(){return G.playCount>=4?'Икон':G.playCount>=2?'ikon':'icon';}

const THOUGHTS={
  gnoti_seauton:{name:'Gnōthi Seauton',fragment:'γνῶθι σεαυτόν',origin:'Delphic oracle. Inscribed at Apollo\'s sanctuary at Delphi.',desc:'Know thyself. The instruction that haunts every crossing. You have been trying to answer it since before you knew the question was being asked.',effect:'Unlocks deeper introspective options when you try to remember your arrival.'},
  in_principio:{name:'In Principio',fragment:'In principio erat Verbum',origin:'John 1:1. Vulgate Latin. Jerome, 4th century.',desc:'In the beginning was the Word. Before language, the word. Before the word, the silence that shaped it. The icon has writing on its back you cannot name. The two may be related.',effect:'Heightens perception of written things you should not be able to read.'},
  kenosis_thought:{name:'Kenōsis',fragment:'κένωσις',origin:'Philippians 2:7. Paul. Christ empties himself of divinity to become human.',desc:'Self-emptying. To make space for what cannot arrive otherwise. Pavel understands this even if he cannot say it in these words. The crossing may require it of you.',effect:'Enhances Communion when you hold back rather than fill the silence.'},
  agape:{name:'Agapē',fragment:'ἀγάπη',origin:'New Testament Greek. Distinct from eros and philia.',desc:'Unconditional love. Love that does not require return. She loves you this way, Pavel implies. You are beginning to understand what that might mean for what you were sent to do.',effect:'Unlocks certain questions with Pavel about the nature of the mission.'},
  null_set:{name:'The Empty Set',fragment:'∅',origin:'Set theory. Cantor, Zermelo-Fraenkel. The foundation upon which mathematics builds everything else.',desc:'What remains when everything is removed. You reach into the harbour-memory and find only the structure of reaching. This is not failure. This is also a kind of knowledge.',effect:'Allows apophatic moves in theological conversations — defining by negation.'},
  sobornost:{name:'Sobornost',fragment:'Соборность',origin:'Russian Orthodox theology. Khomiakov, 19th century. The church as living communion of persons, not institution.',desc:'Togetherness. Conciliarity. The collective as spiritual reality. The word the Soviet project inherited without knowing it had. The comrade in everyone, waiting to be recognised.',effect:'Deepens your understanding of what the mission may actually be.'},
  via_negativa:{name:'Via Negativa',fragment:'ἀπόφασις',origin:'Pseudo-Dionysius the Areopagite. 5th–6th century. Mystic theology of unknowing.',desc:'The way of negation. You cannot say what God is. You can say what God is not. In the residue: something. Haircut knows this method. She applies it to you.',effect:'Reduces Doubt in situations where certainty is structurally unavailable.'},
  magnificat:{name:'The Magnificat',fragment:'Magnificat anima mea Dominum',origin:'Luke 1:46–55. Mary\'s song. The hungry filled with good things, the rich sent away empty.',desc:'The revolutionary embedded in the liturgy. You chose how to use it — or you will. The crew below decks will hear it differently from the officers above.',effect:'Shapes how the crew responds to your ministry depending on your Vespers choices.'},
};

function discoverThought(id){if(!id||G.thoughts.includes(id))return;G.thoughts.push(id);const t=THOUGHTS[id];if(t)showToast('Thought: '+t.name,'thought');}

const NOTES={
  cover_posting_requested:'You told Merky you requested this posting yourself.',
  cover_posting_assigned:'You told Merky you were assigned — didn\'t ask.',
  cover_posting_escape:'You told Merky you needed to leave where you were.',
  cover_posting_summoned:'You told Merky someone asked for you specifically.',
  cover_bg_teacher:'You\'ve said you were a teacher before ordination.',
  cover_bg_medical:'You\'ve said you worked in medicine before ordination.',

const SCENES={"chapel_waking":{"location":"The Ship's Chapel","mood":"neutral","hub":true,"text":["The light is the wrong kind for morning and the wrong kind for evening. The light is ship light: yellow, from overhead, not quite enough.","A small room. Iron walls painted grey over grey. A narrow bunk. A table: Bible, prayer book, and — noticed the way you notice things you may have placed there yourself — a small {ICON}. The face worn to near-nothing.","A porthole, round and framed in iron. Beyond it: the North Atlantic. Grey. Moving. Doing what it does.","This is the ship's chapel. You sleep here because the ship's chaplain sleeps in the chapel. You are the ship's chaplain.","You have been at sea for some time. You do not know, with precision, how long."],"anamnesis":{"after":1,"text":"The {ICON} is facing the wrong direction. You are certain it was not, before.","note":"icon_wrong_direction"},"choices":[{"text":"Examine the {ICON}.","next":"chapel_icon","once":true},{"text":"Look out the porthole.","next":"chapel_porthole"},{"text":"Try to remember how long you've been aboard.","next":"chapel_memory","effect":{"doubt":1},"thought":"gnoti_seauton"},{"text":"Hold vespers. The crew should have a service.","next":"vespers_approach","show_if":"met_pavel_flag","style":"vespers"},{"text":"Go out to the corridor.","next":"corridor_first"}]},"chapel_icon":{"location":"The Ship's Chapel","mood":"uncanny","return_to":"chapel_waking","return_label":"Return to the chapel.","on_enter":{"note":"icon_examined","thought":"in_principio"},"text":["You lift it. It is old — older than this ship by a long way. The wood has the warmth of something held by many people over a very long time.","The face worn to a suggestion: two dark places for eyes, a darker place for a mouth. Traces of gold. A halo that has almost entirely given itself back.","You turn it over. On the back, something written in a script you cannot name. Not Cyrillic. Older, or different. No alphabet you can locate with certainty.","You are a chaplain. You know {ICON}s. You do not know this one.","You set it back down carefully, facing the direction it was facing."],"choices":[{"text":"Make a note of the writing. This matters.","next":"chapel_waking","effect":{"vigilance":1}},{"text":"Leave it. Some things you look at once.","next":"chapel_waking"}]},"chapel_porthole":{"location":"The Ship's Chapel","mood":"neutral","return_to":"chapel_waking","return_label":"Step back. Return to the chapel.","text":["You press close enough to feel the cold through the glass.","The North Atlantic does not perform. It is simply there, grey and immense, doing what it has done for longer than anything watching it has existed.","The line between water and sky is not clean. Fog, or the beginning of fog. Things do not stop cleanly out here."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"chapel_memory":{"location":"The Ship's Chapel","mood":"tense","return_to":"chapel_waking","return_label":"Stop trying. Return to the chapel.","on_enter":{"note":"crossing_noted","thought":"null_set"},"text":["You try.","There is a harbour — the most recent clear thing. A grey morning, diesel and fish, someone at a desk checking your papers without looking up. A stamp. The gangway.","Before that: a room with someone in it. A conversation. The shape of what was said is present. The words are not.","Before that, the harbour frays. You were walking toward it from somewhere, but the somewhere does not resolve.","You stop trying. The effort produces something that feels less like remembering and more like reaching into dark water and finding it deeper than expected."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"vespers_approach":{"location":"The Ship's Chapel","mood":"neutral","on_enter":{"thought":"magnificat"},"text":["You prepare the space. Move the bunk's blanket over the chair. Set the Bible where it can be read from. The {ICON} watches from its corner.","Word travels through ships the way it travels through small communities — without appearing to travel. By evening, several people have found their way to the chapel. Merky Crabbit stands in the doorway with the posture of someone who is not attending, but is present. Two crew from below decks sit on the floor. Pavel has arrived early and is sitting in the wrong place again, but warmly.","You have a reading prepared. Now you must decide what you are doing here."],"choices":[{"text":"Read from the Psalms of lament. The tradition of honest suffering.","next":"vespers_traditional","effect":{"composure":1},"set_note":"vespers_traditional","set_flag":"vespers_done"},{"text":"Read from the Magnificat. The hungry filled, the rich sent away empty.","next":"vespers_liberationist","effect":{"communion":1},"set_note":"vespers_liberationist","set_flag":"vespers_done","set_flag2":"vespers_liberation"},{"text":"Read from both. Let the congregation locate themselves.","next":"vespers_ambiguous","effect":{"doubt":1},"set_note":"vespers_ambiguous","set_flag":"vespers_done"}]},"vespers_traditional":{"location":"The Ship's Chapel","mood":"neutral","return_to":"chapel_waking","return_label":"Return to the chapel.","text":["You read the psalm of lament. The ancient complaint: how long, O Lord. The voice from the pit. The question without a clean answer.","The crew below decks listen with the patience of people who know this feeling personally. Merky Crabbit, in the doorway, relaxes by a fraction.","Pavel looks at you with an expression that is not quite disagreement. He is computing something.","\"Good service,\" Merky says, lingering after. This is high praise. It means: you did not say anything that will cause problems.","You are not sure \"not causing problems\" is what you were ordained for. But it is a start."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"vespers_liberationist":{"location":"The Ship's Chapel","mood":"tense","return_to":"chapel_waking","return_label":"Return to the chapel.","text":["You read the Magnificat. Mary's song. The proud scattered in the imagination of their hearts. The mighty put down from their seats. The hungry filled with good things.","The crew below decks look up — some of them — with the careful attention of people who did not expect to hear this here. One of them nods, once, very slightly.","Merky Crabbit, in the doorway, is still. Very still. The kind of stillness that is also a form of attention.","Pavel has tears on his face, which he does not appear to notice.","After the service, the doorway is empty. Merky did not say good evening."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"vespers_ambiguous":{"location":"The Ship's Chapel","mood":"neutral","return_to":"chapel_waking","return_label":"Return to the chapel.","text":["You read both. Lament and proclamation. The ancient cry from the pit, and then the radical promise embedded in the liturgy like a message written in a different ink.","The congregation hears what it comes to hear. Merky nods, once. The crew below decks are quiet in a way that might be reflection or might be calculation.","\"That was careful,\" Pavel says, afterward. He means it as neither praise nor criticism. He means: that was a decision. He noticed the decision.","You are not sure whether you withheld or whether you offered everything and let them take what they could carry."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"corridor_first":{"location":"Crew Corridor — Aft Section","mood":"neutral","hub":true,"text":["The corridor is narrow, as all corridors on working ships are narrow. Iron, painted many times. Overhead pipes. The engines — not loud, but constant, structural.","Forward: voices, the mess hall. A ladder down leads to cargo. A ladder up leads to the main deck.","There is a small window at the corridor's end. Through it, a slice of deck and the grey."],"choices":[{"text":"Go forward toward the mess.","next":"mess_approach"},{"text":"Go up to the main deck.","next":"main_deck"},{"text":"Go down toward cargo.","next":"cargo_approach"},{"text":"Look through the corridor window.","next":"corridor_window","once":true}]},"corridor_window":{"location":"Crew Corridor — Aft Section","mood":"uncanny","return_to":"corridor_first","return_label":"Step back. Return to the corridor.","on_enter":{"flag":"saw_window"},"text":["A narrow view: rear deck, part of the railing, the sea beyond.","A black cat is sitting on the railing.","This is improbable given the weather and the motion. She is long-haired, dark as a filing error, sitting with the focused patience of someone conducting an evaluation. Through the glass you cannot see her eyes clearly, but you have the strong sense they are on you.","She holds one paw up, briefly. The gesture unhurried. Then she is not on the railing. You did not see her leave."],"choices":[{"text":"Go to the main deck. Look for her.","next":"main_deck","set_note":"saw_haircut_window","effect":{"vigilance":1}},{"text":"Go to the mess. Leave the cat to the deck.","next":"mess_approach","set_note":"saw_haircut_window"},{"text":"Go below to cargo.","next":"cargo_approach","set_note":"saw_haircut_window"}]},"main_deck":{"location":"Main Deck","mood":"neutral","hub":true,"text":["Cold. More cold than you prepared for.","Iron deck, slightly wet. The railing solid. The sea in all directions with the same grey patience.","A working vessel — not a passenger ship. Equipment lashed, things secured. Hatches. A lifeboat station to port.","The air smells of salt, something mechanical, and — very faintly, without source — incense."],"choices":[{"text":"Walk toward the bow.","next":"deck_bow"},{"text":"Look along the port railing.","next":"deck_haircut","once":true,"hide_if":"saw_haircut"},{"text":"The railing is empty.","next":"corridor_first","show_if":"saw_haircut","style":"return"},{"text":"Go back inside.","next":"corridor_first"}]},"deck_bow":{"location":"Main Deck — Bow","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["The bow cuts the water. Grey to the horizon; the horizon lost in grey a few miles out.","The wind asks nothing of you.","Peripherally: a cat on the port railing. Not near it — on it. Long-haired, black, with the equanimity of something that does not understand why a ship's railing in this weather would present a problem."],"choices":[{"text":"Go to the cat.","next":"deck_haircut","hide_if":"saw_haircut"},{"text":"Watch her from here.","next":"deck_haircut_watch","hide_if":"saw_haircut","effect":{"vigilance":1}},{"text":"Give her privacy. Go inside.","next":"corridor_first"},{"text":"The railing is empty.","next":"main_deck","show_if":"saw_haircut","style":"return"}]},"deck_haircut_watch":{"location":"Main Deck — Bow","mood":"uncanny","art":"haircut","on_enter":{"note":"saw_haircut","flag":"saw_haircut"},"text":["You watch.","She is large for a cat. Long-haired, black the way the space between things is black — absorbing context rather than reflecting it. She sits on the railing with the bearing of someone who has held this position for longer than the ship.","Her purr reaches you even at this distance. A low rasp that sounds like it has been through a great deal.","She lifts one paw. Holds it — the gesture slightly beside itself, as if performed from memory of itself rather than the thing itself. Then sets it down.","She turns and looks at you. The quality of recognition in her eyes is older than this crossing. Patient. Complete.","Then she is not on the railing. You did not see her leave."],"choices":[{"text":"Go below. To cargo.","next":"cargo_approach"},{"text":"Go to the mess.","next":"mess_approach"},{"text":"Return to the deck.","next":"main_deck","style":"return"}]},"deck_haircut":{"location":"Main Deck — Port Railing","mood":"uncanny","art":"haircut","on_enter":{"note":"saw_haircut","flag":"saw_haircut"},"text":["You approach. She is large, long-haired, black the way a filing error is black — present without explanation.","She watches you come with the focused patience of someone conducting an evaluation. Her purr begins: a low rasp that sounds like it has been through a great deal.","When you are close enough, she lifts one paw. Holds it — unhurried, the gesture slightly beside itself, performed from memory of itself rather than the thing itself.","Her eyes: the quality of recognition that is older than this crossing. Patient. Complete. She has assessed you.","Then she is not on the railing. You did not see her leave. The answer, you will learn, was yes."],"choices":[{"text":"Stand at the railing a moment. Then go below.","next":"cargo_approach"},{"text":"Go to the mess.","next":"mess_approach"},{"text":"Return to the deck.","next":"main_deck","style":"return"}]},"mess_approach":{"location":"Crew Mess","mood":"neutral","text":["Warmth, and the smell of something cooked many times in the same pot.","A crew member — fifties, weathered — sits with a mug and does not look up. Two others at the far end whose conversation stops, not quite naturally, when you appear.","The crew knows what a ship's chaplain is for. Their body language says they are uncertain whether they want it."],"choices":[{"text":"Pour yourself something. Let the room adjust.","next":"mess_drink","effect":{"communion":1}},{"text":"Introduce yourself to the table.","next":"mess_intro"},{"text":"Find a corner. Watch first.","next":"mess_observe","effect":{"vigilance":1}},{"text":"This can wait. Go below.","next":"cargo_approach"},{"text":"Go back to the corridor.","next":"corridor_first","style":"return"}]},"mess_drink":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["The coffee is thick, nearly finished, strong enough to have opinions. You find a place at the end of the table.","The crew member with the mug glances at you. Then away. Then at you again.","\"Chaplain,\" they say. Not entirely a greeting. Perhaps a question about whether you are what you appear to be.","\"Yes,\" you say.","\"Merky Crabbit,\" they say. \"First mate. In approximately that order.\""],"choices":[{"text":"\"How long have you been on this route?\"","next":"merky_route","effect":{"communion":1}},{"text":"\"What should I know about this ship?\"","next":"merky_ship","effect":{"vigilance":1}},{"text":"Say nothing. Let them decide what comes next.","next":"merky_silence"}]},"mess_intro":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["You introduce yourself. The table accepts this with the mild wariness of people introduced to many things.","\"Merky Crabbit. First mate.\" A pause. \"You're the first chaplain who introduced themselves to a table.\""],"choices":[{"text":"\"Is that a problem?\"","next":"merky_ship","effect":{"composure":1}},{"text":"\"I find tables often know more than they let on.\"","next":"merky_route","effect":{"communion":1}}]},"mess_observe":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["You find a corner. The two at the far end resume — something about the cargo manifest, a discrepancy. The one with the mug watches you watching.","\"Merky Crabbit,\" they say, coming over eventually. \"First mate. You've been sitting there like you're waiting for something.\""],"choices":[{"text":"\"I was. Now I'm here.\"","next":"merky_ship","effect":{"composure":1}},{"text":"\"I find it useful to understand a room before entering it.\"","next":"merky_ship","effect":{"vigilance":1}}]},"merky_route":{"location":"Crew Mess","mood":"neutral","text":["\"Long enough,\" Merky says. \"Long enough that I've stopped counting crossings and started counting something else. Haven't found the right unit yet.\"","\"And you?\" A pause. \"First time on a working vessel? You don't look like cargo.\"","The question is casual. It is not casual."],"choices":[{"text":"\"I requested this posting. I had my reasons.\"","next":"merky_route_b","effect":{"vigilance":1},"cover_set":{"key":"posting","value":"posting_requested"},"set_note":"cover_posting_requested","hide_if":"cover_posting_set"},{"text":"\"I was assigned. No one asked me.\"","next":"merky_route_b","effect":{"composure":1},"cover_set":{"key":"posting","value":"posting_assigned"},"set_note":"cover_posting_assigned","hide_if":"cover_posting_set"},{"text":"\"I needed to be somewhere else.\"","next":"merky_route_b","effect":{"doubt":1},"cover_set":{"key":"posting","value":"posting_escape"},"set_note":"cover_posting_escape","hide_if":"cover_posting_set"},{"text":"\"Someone asked for me specifically. I still don't know who.\"","next":"merky_route_b","effect":{"communion":1},"cover_set":{"key":"posting","value":"posting_summoned"},"set_note":"cover_posting_summoned","hide_if":"cover_posting_set"},{"text":"[Repeat what you said before.]","next":"merky_route_b","effect":{"composure":1},"show_if":"cover_posting_set"}]},"merky_route_b":{"location":"Crew Mess","mood":"neutral","text":["Merky nods. Accepts this or files it.","\"Before the collar,\" they say. \"What were you?\""],"choices":[{"text":"\"A teacher.\"","next":"merky_cargo_warning","effect":{"communion":1},"cover_set":{"key":"background","value":"bg_teacher"},"set_note":"cover_bg_teacher","hide_if":"cover_background_set"},{"text":"\"Medical work.\"","next":"merky_cargo_warning","effect":{"vigilance":1},"cover_set":{"key":"background","value":"bg_medical"},"set_note":"cover_bg_medical","hide_if":"cover_background_set"},{"text":"\"Civil service. Minor.\"","next":"merky_cargo_warning","effect":{"composure":1},"cover_set":{"key":"background","value":"bg_functionary"},"set_note":"cover_bg_functionary","hide_if":"cover_background_set"},{"text":"\"A student. For a very long time.\"","next":"merky_cargo_warning","effect":{"doubt":1},"cover_set":{"key":"background","value":"bg_scholar"},"set_note":"cover_bg_scholar","hide_if":"cover_background_set"},{"text":"[The same answer as before.]","next":"merky_cargo_warning","effect":{"composure":1},"show_if":"cover_background_set"}]},"merky_cargo_warning":{"location":"Crew Mess","mood":"tense","on_enter":{"note":"merky_warned_cargo"},"text":["Merky nods. Stands.","\"Stay out of cargo,\" they say, moving toward the counter. Not quite a warning — something that wanted to be helpful and chose warning's clothing by accident. \"There's a passenger down there who shouldn't be. Can't remove him — nothing's locked. But he keeps saying he's lost.\"","\"Is he?\" you ask.","\"That's the question. He talks about God. Thought that might be your department.\""],"choices":[{"text":"Go to cargo now.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"\"What tradition did you declare the ship maintains?\"","next":"merky_tradition"},{"text":"\"Thank you.\" Go to the deck.","next":"main_deck"}]},"merky_tradition":{"location":"Crew Mess","mood":"neutral","text":["\"We maintain whatever the company told us to. Which is none,\" Merky says, turning. \"What tradition are you?\""],"choices":[{"text":"\"Orthodox.\"","next":"cargo_approach","cover_set":{"key":"denomination","value":"denom_orthodox"},"set_note":"cover_denom_orthodox","hide_if":"cover_denomination_set"},{"text":"\"Protestant.\"","next":"cargo_approach","effect":{"composure":1},"cover_set":{"key":"denomination","value":"denom_protestant"},"set_note":"cover_denom_protestant","hide_if":"cover_denomination_set"},{"text":"\"Ecumenical.\"","next":"cargo_approach","effect":{"doubt":1},"cover_set":{"key":"denomination","value":"denom_ecumenical"},"set_note":"cover_denom_ecumenical","hide_if":"cover_denomination_set"},{"text":"\"Catholic.\"","next":"cargo_approach","cover_set":{"key":"denomination","value":"denom_catholic"},"set_note":"cover_denom_catholic","hide_if":"cover_denomination_set"},{"text":"[What you said before.]","next":"cargo_approach","effect":{"composure":1},"show_if":"cover_denomination_set"}]},"merky_ship":{"location":"Crew Mess","mood":"neutral","text":["\"She's older than she looks. Or looks older than she is. I've never settled which.\" A drink. \"Crew's solid. Cargo is none of your business. Crossing takes as long as it takes.\"","\"And the passengers?\" \"A few. One has been asking questions he doesn't have the background for — about the manifest, the route.\""],"choices":[{"text":"\"What kind of person asks those questions?\"","next":"merky_cargo_warning","effect":{"vigilance":1}},{"text":"\"Sounds like chaplain work.\"","next":"merky_route","effect":{"communion":1}}]},"merky_silence":{"location":"Crew Mess","mood":"neutral","text":["Merky looks at you for a long moment. You look back.","\"Huh,\" they say eventually. This appears to conclude something.","\"Don't go below without a reason you'd say out loud,\" they say, walking away.","You are alone with old coffee and the sense of having passed a test whose criteria you don't know."],"choices":[{"text":"Go below to cargo.","next":"cargo_approach","effect":{"composure":1}},{"text":"Go to the main deck.","next":"main_deck"}]},"cargo_approach":{"location":"Forward Hold — Access","mood":"neutral","text":["The ladder down. Sounds change: engine noise closer, and beneath it, the sound of water against the hull.","Work lights — islands of yellow in the larger dark. Crates lashed with the care of people who know what happens to unsecured objects at sea.","Toward the far wall, a figure crouched near a stack of crates, examining something with the concentration of someone who has been in the wrong place long enough to find something to concentrate on.","Below, in the lower level, a flash of colour on a crate. Calico. A small cat, asleep."],"choices":[{"text":"Approach the figure.","next":"pavel_direct"},{"text":"Pause and observe first.","next":"pavel_observe","effect":{"vigilance":1}},{"text":"\"Hello?\"","next":"pavel_announce","effect":{"communion":1}},{"text":"Go to the cat in the lower level first.","next":"cargo_freezer_beef","once":true}]},"cargo_freezer_beef":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up to the main hold.","on_enter":{"note":"met_freezer_beef","thought":"sobornost"},"text":["You climb down.","On a crate, a small calico cat is asleep with the comprehensive contentment of a creature who has found the optimal arrangement of the world and entered it fully.","She does not stir as you approach. She is extremely warm in a way you can tell from a distance."],"choices":[{"text":"Reach out and pet her.","next":"freezer_beef_contact","effect":{"composure":1}},{"text":"Don't disturb her. Just sit nearby.","next":"freezer_beef_nearby","effect":{"composure":1}}]},"freezer_beef_contact":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up.","text":["Without waking, without opening her eyes, she repositions so that more of her is in contact with your hand. Then more. She arranges herself around your presence with the confident logistics of someone who has done extensive advance planning for this moment.","She is extremely warm.","Something in your chest that has been braced since you woke up not knowing how long you'd been here releases by a degree. Not all the way. A degree.","That degree is enough."],"choices":[{"text":"Stay here a while.","next":"freezer_beef_stay","effect":{"composure":1}},{"text":"Climb back up.","next":"cargo_approach","style":"return"}]},"freezer_beef_nearby":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up.","text":["You sit on an adjacent crate. The lower level is quieter — the engine sound more bass than texture.","The calico breathes. Asleep, comprehensively content, finding the situation adequate. Her assessment extends to you. You are adequate. That is sufficient.","Something eases. Not resolved. Just given a moment to be what it is."],"choices":[{"text":"Climb back up.","next":"cargo_approach","style":"return"}]},"freezer_beef_stay":{"location":"Forward Hold — Lower Level","mood":"neutral","text":["You stay.","She does not wake. She is asleep on you with the complete confidence of a creature who has assessed the situation and found it safe. The assessment extends to you. You are safe. You are held.","Somewhere above, a man in a too-large coat is in the wrong place for reasons he cannot fully explain. You will talk to him soon.","For now: this."],"choices":[{"text":"Climb back up. Find Pavel.","next":"cargo_approach","style":"return"}]},"pavel_observe":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["A man — forties, or older, difficult to tell. A coat slightly too large. He talks quietly to himself with the tone of someone confirming a proof, his hand periodically checking his pocket.","You catch: \"— she said it would be this crossing, and this is this crossing, so —\"","He stops. Looks up. He has known you were there.","\"Oh. Good. You're the chaplain, yes? I was in the wrong place. Are you the chaplain?\""],"choices":[{"text":"\"Yes. And you are?\"","next":"pavel_intro"},{"text":"\"Who told you there was a chaplain?\"","next":"pavel_who","effect":{"vigilance":1}}]},"pavel_direct":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["He looks up as you approach with the face of someone who expected to be found.","\"Ah. There you are.\" As if you had an appointment here. He folds a small piece of paper into his pocket before you can see it.","\"I keep ending up in the wrong places,\" he says, warmly. \"Are you the chaplain?\""],"choices":[{"text":"\"Yes. And you are?\"","next":"pavel_intro"},{"text":"\"What does the chaplain being here mean to you?\"","next":"pavel_meaning","effect":{"doubt":1}},{"text":"\"What are you doing in cargo?\"","next":"pavel_hold","effect":{"composure":1}}]},"pavel_announce":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["\"Oh! Yes! Sorry.\" He stands — nearly knocking something over. \"I know. Wrong place.\"","He seems very pleased to see you.","\"You're the chaplain,\" he says. Not a question."],"choices":[{"text":"\"Yes. And you?\"","next":"pavel_intro"},{"text":"\"How did you know?\"","next":"pavel_how","effect":{"vigilance":1}}]},"pavel_intro":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["\"Pavel,\" he says. \"Just Pavel. Last names are — I've been thinking about last names. They're very Roman. Very empire. Paul had one and then he didn't, and I think that's interesting.\"","\"I'm a passenger,\" he adds, as if this clarifies the cargo hold."],"choices":[{"text":"\"Because of the crossing.\"","next":"pavel_crossing","effect":{"doubt":1}},{"text":"\"How did you end up in cargo?\"","next":"pavel_hold"},{"text":"\"What do you need?\"","next":"pavel_need","effect":{"communion":1}}]},"pavel_who":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["\"A woman. On the deck. She said 'there's a chaplain, and the chaplain is what's interesting about this crossing.'\"","He waits as if this explains the hold. \"My name is Pavel. No last name.\""],"choices":[{"text":"\"What did she look like?\"","next":"pavel_woman","effect":{"vigilance":2}},{"text":"\"She said I was interesting.\"","next":"pavel_crossing","effect":{"doubt":1}},{"text":"\"What do you need, Pavel?\"","next":"pavel_need","effect":{"communion":1}}]},"pavel_meaning":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["\"That's a better question than I was expecting.\" He sits on a crate.","\"My name is Pavel. I'm here because I was told to be — not told-told. The way you know something.\" He looks steadily. \"I think you might know the feeling.\""],"choices":[{"text":"\"I might. Say more.\"","next":"pavel_crossing","effect":{"doubt":1,"communion":1}},{"text":"\"What were you told?\"","next":"pavel_crossing","effect":{"vigilance":1}}]},"pavel_hold":{"location":"Forward Hold","mood":"neutral","text":["\"The cargo hold,\" he says. \"I was looking for a room where things work differently. I was told it might be near cargo. I was wrong.\"","He extends his hand. \"Pavel. Passenger. Cargo hold tourist.\""],"choices":[{"text":"\"What room?\"","next":"pavel_room","effect":{"vigilance":1}},{"text":"\"I'm the chaplain.\" Go from there.","next":"pavel_need","effect":{"communion":1}}]},"pavel_how":{"location":"Forward Hold","mood":"neutral","text":["\"The collar. And the way you came down the ladder — coming somewhere rather than going somewhere.\" A pause. \"Pavel. Sorry about the hold.\""],"choices":[{"text":"\"What do you notice about this ship?\"","next":"pavel_crossing","effect":{"doubt":1}},{"text":"\"What brought you here?\"","next":"pavel_crossing"}]},"pavel_woman":{"location":"Forward Hold","mood":"uncanny","text":["\"On deck. A dark coat. She looked at me for a long time and said what she said. And then she wasn't there.\"","\"I thought it was a cat, at first. I think there might be a cat on this ship.\""],"choices":[{"text":"\"There is a cat.\"","next":"pavel_crossing","set_flag":"told_pavel_haircut","effect":{"vigilance":1}},{"text":"\"Tell me more about what she said.\"","next":"pavel_crossing","effect":{"doubt":1}}]},"pavel_room":{"location":"Forward Hold","mood":"neutral","text":["\"A room where the usual rules are more suggestions,\" he says. \"I was told it exists here. She's not always literal.\""],"choices":[{"text":"\"Who is 'she'?\"","next":"pavel_she"},{"text":"\"Tell me about this crossing.\"","next":"pavel_crossing"}]},"pavel_need":{"location":"Forward Hold","mood":"neutral","text":["He considers. \"What I need and what the chaplain is for might be the same thing. I need someone to tell what I think is happening, so I can hear it back.\"","\"Also I'm quite cold. Is there coffee somewhere?\""],"choices":[{"text":"\"There's coffee in the mess. Come on.\"","next":"v01_end","effect":{"communion":1}},{"text":"\"Tell me what you think is happening.\"","next":"pavel_crossing","effect":{"doubt":1}}]},"pavel_crossing":{"location":"Forward Hold","mood":"neutral","text":["\"Some crossings matter. This one matters. I can't tell you why in a way that satisfies most frameworks. But I know it the way I know other things. She told me. God told me. These are the same sentence.\"","He says it without performance. The way someone says it's cold."],"choices":[{"text":"\"Who is 'she'?\"","next":"pavel_she","effect":{"vigilance":1}},{"text":"\"What does 'matters' mean here?\"","next":"pavel_matters","effect":{"doubt":1}},{"text":"\"I understand the sentence.\"","next":"pavel_understands","effect":{"communion":1},"thought":"agape"}]},"pavel_she":{"location":"Forward Hold","mood":"neutral","text":["\"She is the one I mean when I say God and want to be accurate.\" He touches his pocket. \"She's generous, patient, and not what anyone expects, including me.\"","He looks at you sidelong. \"She said some things about the chaplain. I'll hold onto those until I understand them better.\""],"choices":[{"text":"\"What things?\"","next":"pavel_about_you","effect":{"doubt":2}},{"text":"\"What does she want with this crossing?\"","next":"pavel_matters","effect":{"vigilance":1}},{"text":"Let that be. Ask about his life.","next":"pavel_life","effect":{"communion":1}}]},"pavel_about_you":{"location":"Forward Hold","mood":"tense","art":"pavel","on_enter":{"note":"pavel_she_said","thought":"kenosis_thought"},"text":["Pavel looks at you for a long moment.","\"She said you're asleep,\" he says. \"Not as an insult. She says it warmly — like someone watching a person sleep who's glad they're resting but knows it's nearly time.\"","He adjusts his coat.","\"She isn't wrong about you, you know,\" he says. And then: \"Sorry. I say things like that. It happens. Are you hungry? I'm always hungry on ships.\""],"choices":[{"text":"\"What does 'nearly time' mean?\"","next":"v01_end","effect":{"doubt":1}},{"text":"\"Are you always like this?\"","next":"v01_end","effect":{"communion":1}},{"text":"Walk away. You need to think.","next":"v01_end_walk"}]},"pavel_matters":{"location":"Forward Hold","mood":"neutral","text":["\"Something is going to be decided on this ship, and the deciding will have consequences beyond the crossing.\" He touches his coat pocket. \"That's as specific as I can be. She doesn't send memos.\""],"choices":[{"text":"\"What's your role in what's being decided?\"","next":"pavel_about_you","effect":{"doubt":1}},{"text":"\"What's mine?\"","next":"pavel_about_you","effect":{"communion":1}}]},"pavel_understands":{"location":"Forward Hold","mood":"neutral","text":["He stops. Takes inventory.","\"Good. Then we can skip several conversations I was prepared to have.\"","He sits properly on the crate. \"Tell me what you know about this crossing.\""],"choices":[{"text":"\"Less than you, I think.\"","next":"pavel_about_you","effect":{"communion":1}},{"text":"\"I know I'm the chaplain and I don't fully know why.\"","next":"pavel_about_you","effect":{"doubt":1}}]},"pavel_life":{"location":"Forward Hold","mood":"neutral","text":["He was a postal worker, then a teacher of postal workers, then something in civic administration, then nothing for a while, then this. He describes the transition without apology.","\"She didn't ask if I was convenient for it. She asked if I was available. I said yes before I knew what I was saying yes to. That seemed to be the right answer.\""],"choices":[{"text":"\"What did you say yes to?\"","next":"pavel_about_you","effect":{"doubt":1}},{"text":"\"That's how it tends to work.\"","next":"pavel_about_you","effect":{"communion":1}}]},"v01_end":{"location":"Forward Hold","mood":"neutral","text":["You stay in the hold with Pavel for a while. The engines move through the floor. He talks — what he knows, what he thinks he knows, what she has told him in forms he can't yet use. You listen.","You are good at listening. You may have always been good at it.","\"She isn't wrong about you, you know,\" he says at some point. He has said this before. He doesn't know he has said it before.","\"The next crossing will be different. For both of us, I think.\"","You do not yet know what you are for. But something is for you. Something is waiting for you to wake up enough to receive it.","Спасибо.","───────────────────────────────────────────","The crossing continues."],"choices":[{"text":"[ Begin the next crossing ]","next":"__new_play__","style":"cold"}]},"v01_end_walk":{"location":"Crew Corridor — Aft Section","mood":"neutral","text":["You climb the ladder. The corridor. The ship's sounds — constant, structural, not for you.","You think about what Pavel said. About the cat on the railing and what her eyes held. About the {ICON} and the writing on its back.","You are the ship's chaplain. You are on a crossing. You do not know what you are carrying.","Спасибо.","───────────────────────────────────────────","The crossing continues."],"choices":[{"text":"[ Begin the next crossing ]","next":"__new_play__","style":"cold"}]}};
function hasFlag(f){return G.flags.has(f);}
function addNote(key){if(!key||G.notes.includes(key))return;G.notes.push(key);const l=noteLabel(key);showToast(l.length>52?l.slice(0,52)+'…':l,'note');}
function setFlag(f){if(f)G.flags.add(f);}
function applyEffect(e){if(!e)return;for(const[k,v]of Object.entries(e))if(G.stats[k]!==undefined)G.stats[k]=Math.max(0,G.stats[k]+v);}
function setCover(key,value){G.cover[key]=value;setFlag('cover_'+key+'_set');}
function showToast(msg,type){const old=document.querySelector('.note-toast');if(old)old.remove();const t=document.createElement('div');t.className='note-toast'+(type==='thought'?' thought-toast':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},3200);}

function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({stats:G.stats,charisms:G.charisms,thoughts:G.thoughts,cover:G.cover,notes:G.notes,flags:[...G.flags],scene:G.scene,mode:G.mode}));
    // Flash save indicator without calling render()
    const el=document.querySelector('.save-indicator');
    if(el){el.style.display='block';el.style.animation='none';void el.offsetWidth;el.style.animation='save-flash 2.2s ease forwards';setTimeout(()=>{if(el)el.style.display='none';},2300);}
  }catch(e){console.warn('Save failed:',e);}
}
function loadGame(){
  try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;const s=JSON.parse(raw);G.stats=s.stats||G.stats;G.charisms=s.charisms||[];G.thoughts=s.thoughts||[];G.cover=s.cover||G.cover;G.notes=s.notes||[];G.flags=new Set(s.flags||[]);G.scene=s.scene||'chapel_waking';G.mode=s.mode||'attended';G.phase='game';return true;}catch(e){console.warn('Load failed:',e);return false;}
}
function commitPlay(){G.playCount++;try{localStorage.setItem(PLAY_KEY,G.playCount.toString());const m=[...new Set([...G.pastFlags,...G.flags])];localStorage.setItem(FLAGS_KEY,JSON.stringify(m));G.pastFlags=m;}catch(e){console.warn('commitPlay:',e);}}
function newPlay(){commitPlay();G.stats={vigilance:0,composure:0,communion:0,doubt:0};G.charisms=[];G.thoughts=[];G.cover={posting:null,background:null,denomination:null,connection:null,left:null};G.notes=[];G.flags=new Set();G.scene='chapel_waking';G.phase='charism';G.panelOpen=null;G.confirmRestart=false;render();}

function render(){const root=document.getElementById('root');root.innerHTML='';if(G.phase==='title')renderTitle(root);else if(G.phase==='mode')renderMode(root);else if(G.phase==='charism')renderCharism(root);else if(G.phase==='game')renderGame(root);}

function renderTitle(root){
  setMood('neutral');
  const replay=G.playCount>0,hasSave=!!localStorage.getItem(SAVE_KEY);
  root.innerHTML=`<div class="title-screen"><div class="title-cyrillic">СПАСИБО</div><div class="title-romanised">Spasibo</div><div class="title-translation">Thank You</div><pre class="title-ship">
            ___
       ____/ | \\____
  ~~~~|______________|~~~~
    ~~~~~~~~~~~~~~~~~~~~~~~~~~</pre><div class="title-sub${replay?' replay':''}"> ${replay?'another crossing.':'a crossing.'}</div><div class="title-btns">${hasSave?'<button class="btn" onclick="continueGame()">Continue crossing</button><button class="btn btn-sm" onclick="G.phase=\'mode\';render()">New crossing</button>':'<button class="btn" onclick="G.phase=\'mode\';render()">Begin the crossing</button>'}</div>${replay?`<div style="margin-top:.8rem;font-size:.66rem;color:var(--text-dim);letter-spacing:.1em">crossing ${G.playCount+1}</div>`:''}</div>`;
}
function continueGame(){if(loadGame())render();else{G.phase='mode';render();}}

function renderMode(root){
  root.innerHTML=`<div class="sel-screen"><div class="sel-h">How will you cross?</div><div class="sel-sub">Can be changed on a new crossing.</div><div class="sel-grid"><div class="sel-opt${G.mode==='attended'?' chosen':''}" onclick="G.mode='attended';render()"><div class="sel-name">First Crossing</div><div class="sel-desc">Mechanics visible. The game tells you what it\'s asking and why.</div></div><div class="sel-opt${G.mode==='open'?' chosen':''}" onclick="G.mode='open';render()"><div class="sel-name">Open Water</div><div class="sel-desc">Less held. The game trusts you. Some things are not explained.</div></div></div><button class="btn" onclick="G.phase='charism';render()">Continue</button></div>`;
}

function renderCharism(root){
  const showWaking=G.playCount>=2;
  const div=document.createElement('div');div.className='sel-screen';
  let html=`<div class="sel-h">A charism.</div><div class="sel-sub">Not a skill. Something given — though it needs to be used to mean anything.${showWaking?'<br><span style="color:var(--cold);font-size:.76rem">Something new is available to those who have crossed before.</span>':''}</div><div class="sel-section">Sleeping</div>`;
  CHARISMS.sleeping.forEach(c=>{html+=`<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')"><div class="sel-name sel-name-cold">${c.name}</div><div class="sel-desc">${c.desc}</div></div>`;});
  if(showWaking){html+=`<div class="sel-section sel-section-cold">Waking</div>`;CHARISMS.waking.forEach(c=>{html+=`<div class="sel-opt${G.charisms.includes(c.id)?' chosen-cold':''}" onclick="selCharism('${c.id}')"><div class="sel-name sel-name-cold">${c.name}</div><div class="sel-desc">${c.desc}</div></div>`;});}
  html+=`<button class="btn btn-cold" style="margin-top:1.5rem" ${G.charisms.length===0?'disabled':''} onclick="beginGame()">Board the ship</button>`;
  div.innerHTML=html;root.appendChild(div);
}
function selCharism(id){G.charisms=G.charisms.includes(id)?[]:[id];render();}
function beginGame(){if(!G.charisms.length)return;G.charisms.forEach(id=>addNote('charism_'+id));if(G.charisms.includes('kenosis'))discoverThought('kenosis_thought');if(G.charisms.includes('apophasis'))discoverThought('via_negativa');G.phase='game';G.scene='chapel_waking';render();}

function renderGame(root){
  const scene=SCENES[G.scene];
  if(!scene){root.innerHTML=`<p style="padding:2rem;color:var(--rust)">Scene not found: ${G.scene}</p>`;return;}
  setMood(scene.mood||'neutral');
  saveGame(); // NO render() inside here
  const visitKey='visited_'+G.scene;
  if(!hasFlag(visitKey)){setFlag(visitKey);if(scene.on_enter){if(scene.on_enter.note)addNote(scene.on_enter.note);if(scene.on_enter.flag)setFlag(scene.on_enter.flag);if(scene.on_enter.thought)discoverThought(scene.on_enter.thought);}}
  const wrap=document.createElement('div');wrap.className='game';
  // STICKY HEADER
  const hdr=document.createElement('div');hdr.className='game-header';
  const si=document.createElement('div');si.className='save-indicator';si.textContent='◦ autosaved';si.style.display='none';hdr.appendChild(si);
  const lb=document.createElement('div');lb.className='location-bar'+(scene.mood==='uncanny'?' uncanny':'');lb.textContent=scene.location;hdr.appendChild(lb);
  const sb=document.createElement('div');sb.className='sbar';
  Object.entries(G.stats).forEach(([k,v])=>{const d=document.createElement('div');d.className='stat';d.innerHTML=k+' <span class="stat-val">'+v+'</span>';sb.appendChild(d);});
  hdr.appendChild(sb);
  const tags=[];
  G.charisms.forEach(id=>{const c=findCharism(id);if(c)tags.push('<span class="ctag">'+c.name+'</span>');});
  const cc=Object.values(G.cover).filter(Boolean).length;if(cc>0)tags.push('<span class="cover-tag">cover '+cc+'/5</span>');
  if(G.thoughts.length>0)tags.push('<span class="thought-tag">⊕ '+G.thoughts.length+'</span>');
  if(tags.length){const cb=document.createElement('div');cb.className='cbar';cb.innerHTML=tags.join('');hdr.appendChild(cb);}
  wrap.appendChild(hdr);
  // BODY
  const body=document.createElement('div');body.className='game-body';
  if(scene.art&&ART[scene.art]){const art=document.createElement('pre');art.className='art-block';art.textContent=ART[scene.art];body.appendChild(art);}
  const stxt=document.createElement('div');stxt.className='stxt';
  const showAnam=G.playCount>0&&scene.anamnesis;
  scene.text.forEach((raw,idx)=>{
    const p=document.createElement('p');p.className='sp';p.innerHTML=processText(raw);stxt.appendChild(p);
    if(showAnam&&scene.anamnesis.after===idx){const ap=document.createElement('p');ap.className='sp sp-anamnesis';ap.innerHTML=processText(scene.anamnesis.text);stxt.appendChild(ap);if(scene.anamnesis.note)addNote(scene.anamnesis.note);}
  });
  body.appendChild(stxt);
  const cd=document.createElement('div');cd.className='choices';
  if(scene.return_to){const rb=document.createElement('button');rb.className='choice choice-return';rb.textContent=scene.return_label||'Return.';rb.onclick=()=>navigate(scene.return_to);cd.appendChild(rb);}
  scene.choices.forEach(ch=>{
    if(ch.hide_if&&hasFlag(ch.hide_if))return;
    if(ch.show_if&&!hasFlag(ch.show_if))return;
    if(ch.once&&ch.next&&hasFlag('visited_'+ch.next))return;
    const btn=document.createElement('button');
    let locked=false;
    if(ch.requires_flag&&!hasFlag(ch.requires_flag))locked=true;
    if(ch.requires_stat){const[s,m]=ch.requires_stat;if((G.stats[s]||0)<m)locked=true;}
    if(locked){btn.className='choice choice-locked';btn.disabled=true;btn.textContent=processText(ch.text);}
    else{
      const tv=ch.next&&hasFlag('visited_'+ch.next)&&scene.hub;
      let cls='choice';
      if(ch.style==='cold')cls+=' choice-cold';
      if(ch.style==='return')cls+=' choice-return';
      if(ch.style==='vespers')cls+=' choice-vespers';
      if(ch.cover_set)cls+=' choice-cover';
      if(tv)cls+=' choice-visited';
      btn.className=cls;
      btn.innerHTML=(tv?'◦ ':'')+processText(ch.text);
      if(ch.cover_set&&!hasFlag('cover_'+ch.cover_set.key+'_set')){const lbl=document.createElement('span');lbl.className='cover-label';lbl.textContent='⬥ establishing cover';btn.appendChild(lbl);}
      btn.onclick=()=>applyChoice(ch);
    }
    cd.appendChild(btn);
  });
  body.appendChild(cd);
  if(G.notes.length){const od=document.createElement('div');od.className='obs-section';const ot=document.createElement('div');ot.className='obs-title';ot.textContent='observations';od.appendChild(ot);G.notes.slice(-4).forEach(k=>{const d=document.createElement('div');d.className='obs-item';d.textContent=noteLabel(k);od.appendChild(d);});body.appendChild(od);}
  const rb2=document.createElement('div');rb2.className='restart-bar';
  if(G.confirmRestart){const msg=document.createElement('span');msg.className='confirm-msg';msg.textContent='End this crossing?';rb2.appendChild(msg);const yes=document.createElement('button');yes.className='btn confirm-yes';yes.textContent='Yes — return to shore';yes.onclick=doRestart;rb2.appendChild(yes);const no=document.createElement('button');no.className='btn confirm-no';no.textContent='No — continue';no.onclick=()=>{G.confirmRestart=false;render();};rb2.appendChild(no);}
  else{const rbt=document.createElement('button');rbt.className='btn restart-btn';rbt.textContent='abandon crossing';rbt.onclick=()=>{G.confirmRestart=true;render();};rb2.appendChild(rbt);}
  body.appendChild(rb2);
  wrap.appendChild(body);
  root.appendChild(wrap);
  // FIX: createElement for buttons — innerHTML+= would nuke all event listeners on wrap
  const nb=document.createElement('button');nb.className='notes-btn';nb.textContent='observations';nb.onclick=()=>openPanel('notes');root.appendChild(nb);
  const sb2=document.createElement('button');sb2.className='status-btn';sb2.textContent='status';sb2.onclick=()=>openPanel('status');root.appendChild(sb2);
  const tb=document.createElement('button');tb.className='thoughts-btn';tb.textContent='thoughts';tb.onclick=()=>openPanel('thoughts');root.appendChild(tb);
  if(G.panelOpen==='notes')renderNotesPanel(root);
  if(G.panelOpen==='status')renderStatusPanel(root);
  if(G.panelOpen==='thoughts')renderThoughtsPanel(root);
}

function navigate(id){G.scene=id;window.scrollTo(0,0);render();}
function applyChoice(ch){
  applyEffect(ch.effect);
  if(ch.set_flag)setFlag(ch.set_flag);
  if(ch.set_flag2)setFlag(ch.set_flag2);
  if(ch.set_note)addNote(ch.set_note);
  if(ch.cover_set)setCover(ch.cover_set.key,ch.cover_set.value);
  if(ch.thought)discoverThought(ch.thought);
  if(ch.next==='__new_play__'){newPlay();return;}
  if(ch.next&&ch.next.startsWith('pavel_'))setFlag('met_pavel_flag');
  navigate(ch.next);
}

function openPanel(w){G.panelOpen=G.panelOpen===w?null:w;render();}
function mkOverlay(handler){const ov=document.createElement('div');ov.className='overlay-bg';ov.onclick=handler;return ov;}

function renderNotesPanel(root){
  const p=document.createElement('div');p.className='side-panel side-panel-r';
  const h=document.createElement('h3');h.style.color='var(--amber)';h.innerHTML='<button class="panel-close" onclick="openPanel(\'notes\')">✕</button>Observations';p.appendChild(h);
  if(!G.notes.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='Nothing noted yet.';p.appendChild(d);}
  else[...G.notes].reverse().forEach(k=>{const d=document.createElement('div');d.className='panel-item';d.textContent=noteLabel(k);p.appendChild(d);});
  root.appendChild(mkOverlay(()=>openPanel('notes')));root.appendChild(p);
}
function renderStatusPanel(root){
  const cl={posting:'Reason here',background:'Prior work',denomination:'Declared tradition',connection:'Claims to know',left:'Left behind'};
  const p=document.createElement('div');p.className='side-panel side-panel-l';
  const h=document.createElement('h3');h.style.color='var(--cold)';h.innerHTML='<button class="panel-close" onclick="openPanel(\'status\')">✕</button>Status';p.appendChild(h);
  const addSec=(t)=>{const s=document.createElement('div');s.className='panel-sec';s.textContent=t;p.appendChild(s);};
  const addRow=(a,b,bc)=>{const r=document.createElement('div');r.className='stat-row';r.innerHTML=`<span style="color:var(--text-dim)">${a}</span><span style="color:${bc||'var(--text-bright)'};font-weight:bold;font-size:.78rem">${b}</span>`;p.appendChild(r);};
  addSec('Stats');Object.entries(G.stats).forEach(([k,v])=>addRow(k,v));
  addSec('Charisms');if(!G.charisms.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='None.';p.appendChild(d);}else G.charisms.forEach(id=>{const c=findCharism(id);if(!c)return;const d=document.createElement('div');d.className='panel-item';d.innerHTML=`<strong>${c.name}</strong> — ${c.desc}`;p.appendChild(d);});
  addSec('Cover');Object.entries(G.cover).forEach(([k,v])=>addRow(cl[k]||k,v?v.replace(/_/g,' '):'—',v?'var(--amber)':'var(--border-mid)'));
  addSec('Crossing');addRow('number',G.playCount+1);
  root.appendChild(mkOverlay(()=>openPanel('status')));root.appendChild(p);
}
function renderThoughtsPanel(root){
  const p=document.createElement('div');p.className='side-panel side-panel-c';
  const h=document.createElement('h3');h.style.color='var(--thought)';h.innerHTML='<button class="panel-close" onclick="openPanel(\'thoughts\')">✕</button>Thought Cabinet';p.appendChild(h);
  if(!G.thoughts.length){const d=document.createElement('div');d.className='panel-empty';d.textContent='No thoughts collected yet. They surface as you explore.';p.appendChild(d);}
  else G.thoughts.forEach(id=>{const t=THOUGHTS[id];if(!t)return;const c=document.createElement('div');c.className='thought-card';c.innerHTML=`<div class="thought-name">${t.name}</div><div class="thought-fragment">${t.fragment}</div><div class="thought-origin">${t.origin}</div><div class="thought-desc">${t.desc}</div><div class="thought-effect">${t.effect}</div>`;p.appendChild(c);});
  root.appendChild(mkOverlay(()=>openPanel('thoughts')));root.appendChild(p);
}

function doRestart(){commitPlay();try{localStorage.removeItem(SAVE_KEY);}catch(e){}G.phase='title';G.flags=new Set();G.notes=[];G.stats={vigilance:0,composure:0,communion:0,doubt:0};G.charisms=[];G.thoughts=[];G.cover={posting:null,background:null,denomination:null,connection:null,left:null};G.panelOpen=null;G.confirmRestart=false;G.scene='chapel_waking';render();}

render();
</script>
</body>
</html>
