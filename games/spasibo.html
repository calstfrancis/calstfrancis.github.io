<!DOCTYPE html>
<html lang="en">
<head>

<title>СПАСИБО — v0.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080c;--text:#a8bcc8;--text-dim:#526070;--text-bright:#d4e4f0;
  --amber:#b08030;--amber-dim:#5a4018;--cold:#5aa0b8;--cold-dim:#1a3040;
  --rust:#8a3828;--border:#182028;--border-mid:#283848;--border-bright:#3a5060;
  --choice-bg:rgba(10,14,20,0.72);--choice-hover:rgba(18,26,34,0.92);
  --thought:#7a6898;--thought-dim:#2a2038;
}
body{background:var(--bg);color:var(--text);font-family:"Courier Prime","Courier New",monospace;min-height:100vh;overflow-x:hidden}
#atmos{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
#root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse-cold{0%,100%{color:var(--cold)}50%{color:var(--cold-dim)}}
@keyframes flicker{0%,100%{opacity:1}45%{opacity:.88}46%{opacity:1}80%{opacity:.95}}
@keyframes slide-r{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slide-l{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes toast-in{from{opacity:0;transform:translateY(.5rem)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateY(-.5rem)}}
@keyframes save-flash{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;animation:fi 3s ease-in}
.title-cyrillic{font-family:"Special Elite",serif;font-size:clamp(2.8rem,8vw,5rem);color:var(--text-bright);letter-spacing:.35em;margin-bottom:.4rem;text-shadow:0 0 40px rgba(90,160,184,0.12)}
.title-romanised{font-size:.72rem;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;margin-bottom:.2rem}
.title-translation{font-size:.68rem;color:var(--amber-dim);letter-spacing:.18em;font-style:italic;margin-bottom:3.5rem}
.title-ship{font-family:"Courier Prime",monospace;font-size:.62rem;color:var(--border-mid);white-space:pre;line-height:1.3;margin-bottom:3rem;animation:flicker 8s ease-in-out infinite}
.title-sub{font-size:.78rem;color:var(--text-dim);letter-spacing:.12em;font-style:italic;margin-bottom:2rem}
.title-sub.replay{color:var(--cold-dim);animation:pulse-cold 4s ease-in-out infinite}
.title-btns{display:flex;flex-direction:column;gap:.6rem;align-items:center}
.btn{background:transparent;border:1px solid var(--border-mid);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.84rem;padding:.6rem 1.8rem;cursor:pointer;letter-spacing:.12em;transition:all .2s}
.btn:hover{border-color:var(--amber);color:var(--text-bright)}
.btn:disabled{opacity:.3;cursor:default}
.btn-sm{font-size:.72rem;padding:.45rem 1.2rem;border-color:var(--border);color:var(--text-dim)}
.btn-sm:hover{border-color:var(--border-mid);color:var(--text)}
.btn-cold{border-color:var(--cold-dim);color:var(--cold)}
.btn-cold:hover{border-color:var(--cold);color:var(--text-bright)}
.sel-screen{max-width:620px;width:100%;padding:3rem 1.5rem 4rem;animation:fi .8s ease-in}
.sel-h{font-family:"Special Elite",serif;font-size:1.1rem;color:var(--text-bright);letter-spacing:.18em;margin-bottom:.4rem;text-align:center}
.sel-sub{font-size:.78rem;color:var(--text-dim);margin-bottom:2rem;text-align:center;font-style:italic;line-height:1.7}
.sel-grid{display:flex;flex-direction:column;gap:.9rem;margin-bottom:2rem}
.sel-opt{border:1px solid var(--border);padding:1.1rem 1.3rem;cursor:pointer;transition:all .2s;background:var(--choice-bg)}
.sel-opt:hover{border-color:var(--border-bright);background:var(--choice-hover)}
.sel-opt.chosen{border-color:var(--amber)}.sel-opt.chosen-cold{border-color:var(--cold)}
.sel-name{font-family:"Special Elite",serif;font-size:1rem;color:var(--amber);letter-spacing:.1em;margin-bottom:.35rem}
.sel-name-cold{color:var(--cold)}.sel-desc{font-size:.78rem;color:var(--text-dim);line-height:1.65}
.sel-section{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin:.9rem 0 .4rem}
.sel-section-cold{color:var(--cold-dim)}
.game{width:100%;max-width:720px;padding:0 1.5rem 5rem;animation:fi .6s ease-in}
.game-header{position:sticky;top:0;z-index:50;background:rgba(6,8,12,0.97);backdrop-filter:blur(3px);padding:.75rem 0 .55rem;border-bottom:1px solid var(--border);margin-bottom:1.2rem}
.save-indicator{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--border-bright);text-align:right;display:none;animation:save-flash 2.2s ease forwards}
.location-bar{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:.5rem}
.location-bar.uncanny{color:var(--cold);animation:pulse-cold 3s ease-in-out infinite}
.sbar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.4rem}
.stat{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.stat-val{color:var(--amber)}
.cbar{display:flex;flex-wrap:wrap;gap:.35rem}
.ctag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--cold-dim);color:var(--cold);text-transform:uppercase}
.cover-tag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--amber-dim);color:var(--amber-dim);text-transform:uppercase}
.thought-tag{font-size:.58rem;letter-spacing:.07em;padding:.1rem .45rem;border:1px solid var(--thought-dim);color:var(--thought);text-transform:uppercase}
.art-block{font-family:"Courier Prime",monospace;font-size:.64rem;color:var(--amber-dim);white-space:pre;line-height:1.35;margin:1rem 0;overflow-x:auto}
.stxt{margin-bottom:1.2rem}
.sp{font-size:.93rem;line-height:1.95;color:var(--text);margin-bottom:.9rem}
.sp-cold{color:var(--cold)}.sp-dim{color:var(--text-dim);font-style:italic}
.sp-anamnesis{color:var(--cold);border-left:1px solid var(--cold-dim);padding-left:.8rem;margin-left:.3rem;font-style:italic;animation:pulse-cold 5s ease-in-out infinite}
.choices{display:flex;flex-direction:column;gap:.5rem;margin-top:1.4rem}
.choice{background:var(--choice-bg);border:1px solid var(--border);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.85rem;padding:.65rem .95rem;text-align:left;cursor:pointer;transition:all .18s;line-height:1.5;width:100%}
.choice:hover{border-color:var(--amber);color:var(--text-bright);background:var(--choice-hover)}
.choice-locked{color:var(--border-mid);border-color:var(--border);cursor:not-allowed;opacity:.5}
.choice-cold{border-color:var(--cold-dim);color:var(--cold)}.choice-cold:hover{border-color:var(--cold);color:var(--text-bright)}
.choice-cover{border-color:var(--amber-dim)}
.choice-visited{color:var(--text-dim);border-color:var(--border);font-style:italic;font-size:.82rem}
.choice-visited:hover{color:var(--text);border-color:var(--border-mid)}
.choice-return{color:var(--text-dim);border-color:var(--border);font-size:.8rem}
.choice-return:hover{color:var(--text);border-color:var(--border-mid)}
.choice-vespers{border-color:#4a5838;color:#8aab68}.choice-vespers:hover{border-color:#7a9858;color:var(--text-bright)}
.cover-label{font-size:.62rem;color:var(--amber-dim);display:block;margin-bottom:.12rem;letter-spacing:.06em;text-transform:uppercase}
.obs-section{margin-top:2rem;border-top:1px solid var(--border);padding-top:.8rem}
.obs-title{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:.4rem}
.obs-item{font-size:.75rem;color:var(--text-dim);font-style:italic;line-height:1.65;margin-bottom:.18rem;padding-left:.6rem;border-left:1px solid var(--border-mid)}
.notes-btn,.status-btn,.thoughts-btn{position:fixed;background:var(--choice-bg);border:1px solid var(--border);font-family:"Courier Prime",monospace;font-size:.68rem;letter-spacing:.1em;padding:.42rem .78rem;cursor:pointer;z-index:100;color:var(--text-dim)}
.notes-btn{bottom:1.2rem;right:1.2rem}.notes-btn:hover{border-color:var(--amber-dim);color:var(--amber)}
.status-btn{bottom:1.2rem;left:1.2rem}.status-btn:hover{border-color:var(--cold-dim);color:var(--cold)}
.thoughts-btn{bottom:1.2rem;left:50%;transform:translateX(-50%);color:var(--thought);border-color:var(--thought-dim)}
.thoughts-btn:hover{border-color:var(--thought);color:var(--text-bright)}
.side-panel{position:fixed;top:0;height:100vh;width:min(340px,92vw);background:rgba(4,6,10,0.97);padding:1.5rem;overflow-y:auto;z-index:200}
.side-panel-l{left:0;border-right:1px solid var(--border);animation:slide-l .2s ease}
.side-panel-r{right:0;border-left:1px solid var(--border);animation:slide-r .2s ease}
.side-panel-c{left:50%;transform:translateX(-50%);width:min(500px,96vw);border:1px solid var(--thought-dim);animation:fi .2s ease}
.side-panel h3{font-family:"Special Elite",serif;font-size:.88rem;letter-spacing:.16em;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.panel-close{float:right;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem}
.panel-close:hover{color:var(--amber)}
.panel-item{font-size:.76rem;color:var(--text-dim);font-style:italic;line-height:1.7;margin-bottom:.3rem;padding-left:.6rem;border-left:1px solid var(--border-mid)}
.panel-empty{font-size:.76rem;color:var(--border-mid);font-style:italic}
.panel-sec{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber-dim);margin:.8rem 0 .4rem}
.stat-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem;padding:.15rem 0;border-bottom:1px solid var(--border)}
.overlay-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:150}
.thought-card{border:1px solid var(--thought-dim);padding:.9rem 1rem;margin-bottom:.9rem;background:rgba(20,14,32,0.6)}
.thought-name{font-family:"Special Elite",serif;font-size:.95rem;color:var(--thought);letter-spacing:.08em;margin-bottom:.25rem}
.thought-fragment{font-size:1.1rem;color:var(--text-dim);font-style:italic;margin-bottom:.15rem;letter-spacing:.04em}
.thought-origin{font-size:.62rem;color:var(--border-bright);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.45rem}
.thought-body{font-size:.78rem;color:var(--text-dim);line-height:1.65;margin-bottom:.3rem}
.thought-effect{font-size:.7rem;color:var(--thought);font-style:italic;border-left:1px solid var(--thought-dim);padding-left:.6rem}
.thought-progress{font-family:monospace;font-size:.72rem;color:var(--thought-dim);margin:.2rem 0}
.thought-btn{margin-top:.5rem;background:transparent;font-family:"Courier Prime",monospace;font-size:.72rem;padding:.3rem .7rem;cursor:pointer}
.thought-btn-seat{border:1px solid var(--thought-dim);color:var(--thought)}
.thought-btn-seat:hover{border-color:var(--thought)}
.thought-btn-release{border:1px solid var(--rust);color:var(--rust)}
.thought-btn-release:hover{border-color:#c05040;color:#c05040}
.thought-settled{border-color:var(--cold-dim)}
.thought-settled .thought-name{color:var(--cold)}
.restart-bar{margin-top:2.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.restart-btn{font-size:.66rem;color:var(--border-mid);border-color:var(--border);letter-spacing:.08em}
.restart-btn:hover{color:var(--rust);border-color:var(--rust)}
.confirm-msg{font-size:.7rem;color:var(--rust);font-style:italic}
.confirm-yes{font-size:.7rem;color:var(--rust);border-color:var(--rust)}
.confirm-no{font-size:.7rem;color:var(--border-bright);border-color:var(--border-mid)}
.confirm-no:hover{color:var(--text);border-color:var(--border-bright)}
.note-toast{position:fixed;bottom:4.5rem;right:1.2rem;background:var(--choice-bg);border:1px solid var(--amber-dim);color:var(--amber);font-family:"Courier Prime",monospace;font-size:.7rem;padding:.38rem .78rem;z-index:300;pointer-events:none;animation:toast-in .3s ease,toast-out .4s ease 2.6s forwards}
.thought-toast{border-color:var(--thought-dim);color:var(--thought)}
</style>

<body>
<canvas id="atmos"></canvas>
<div id="root"></div>
<script>
// СПАСИБО v0.5

// ── ATMOSPHERE ──────────────────────────────────────────────
const canvas=document.getElementById('atmos');
const ctx=canvas.getContext('2d');
let mood='neutral',targetMood='neutral',moodLerp=1,fogParts=[],rainDrops=[],T=0;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;initRain();}
resize();window.addEventListener('resize',resize);
function initFog(){fogParts=[];for(let i=0;i<22;i++)fogParts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:80+Math.random()*140,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.08,ph:Math.random()*Math.PI*2,base:.025+Math.random()*.05});}
initFog();
function initRain(){const p=porthole();rainDrops=[];for(let i=0;i<24;i++)rainDrops.push({x:p.x+(Math.random()-.5)*p.r*2,y:p.y+(Math.random()-.5)*p.r*2,len:5+Math.random()*9,spd:1.2+Math.random()*2});}
function porthole(){const r=Math.min(canvas.width,canvas.height)*.085;return{x:canvas.width-r-28,y:r+28,r};}
const MOOD_COL={neutral:[130,170,190,6,8,12],tense:[140,90,70,10,6,4],uncanny:[60,130,170,4,8,14],revelation:[180,180,160,10,12,16]};
function lerp(a,b,t){return a+(b-a)*t;}
function setMood(m){if(!m||m===targetMood)return;targetMood=m;moodLerp=0;}
function drawAtmos(){
  T+=.008;
  if(moodLerp<1){moodLerp=Math.min(1,moodLerp+.008);if(moodLerp>=1)mood=targetMood;}
  const cm=MOOD_COL[mood]||MOOD_COL.neutral,tm=MOOD_COL[targetMood]||MOOD_COL.neutral,t=moodLerp;
  const fr=lerp(cm[0],tm[0],t),fg=lerp(cm[1],tm[1],t),fb=lerp(cm[2],tm[2],t);
  const br=lerp(cm[3],tm[3],t),bgc=lerp(cm[4],tm[4],t),bb=lerp(cm[5],tm[5],t);
  ctx.fillStyle=`rgb(${br|0},${bgc|0},${bb|0})`;ctx.fillRect(0,0,canvas.width,canvas.height);
  const fogMult=mood==='tense'?2.5:(mood==='uncanny'?0.6:1);
  for(const p of fogParts){
    p.x+=p.vx;p.y+=p.vy;p.ph+=.004;
    if(p.x<-p.r)p.x=canvas.width+p.r;if(p.x>canvas.width+p.r)p.x=-p.r;
    if(p.y<-p.r)p.y=canvas.height+p.r;if(p.y>canvas.height+p.r)p.y=-p.r;
    const op=(p.base+Math.sin(p.ph)*.012)*fogMult;
    const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g2.addColorStop(0,`rgba(${fr|0},${fg|0},${fb|0},${op.toFixed(3)})`);
    g2.addColorStop(1,`rgba(${fr|0},${fg|0},${fb|0},0)`);
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  let li=.09+Math.sin(T*.4)*.008;
  if(mood==='tense')li+=Math.sin(T*4.5)*.03;if(mood==='revelation')li=.22;if(mood==='uncanny')li=.04;
  const lx=canvas.width*.12,ly=canvas.height*.08;
  const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,Math.min(canvas.width,canvas.height)*.28);
  lg.addColorStop(0,`rgba(176,120,40,${li.toFixed(3)})`);lg.addColorStop(1,`rgba(176,120,40,0)`);
  ctx.fillStyle=lg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawPorthole();requestAnimationFrame(drawAtmos);
}
function drawPorthole(){
  const{x,y,r}=porthole();
  ctx.strokeStyle='#1c2830';ctx.lineWidth=r*.18;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#243038';
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(a)*(r+r*.1),y+Math.sin(a)*(r+r*.1),r*.045,0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.beginPath();ctx.arc(x,y,r*.87,0,Math.PI*2);ctx.clip();
  const sc=mood==='uncanny'?'#060e18':mood==='revelation'?'#182030':'#0e1820';
  const sg=ctx.createLinearGradient(x,y-r,x,y+r);sg.addColorStop(0,sc);sg.addColorStop(1,'#182430');
  ctx.fillStyle=sg;ctx.fillRect(x-r,y-r,r*2,r*2);
  ctx.strokeStyle=`rgba(60,100,130,${mood==='uncanny'?0.5:0.25})`;ctx.lineWidth=.8;
  for(let i=0;i<6;i++){const wy=y+r*.2+i*r*.12+Math.sin(T*.6+i*1.2)*2;ctx.beginPath();ctx.moveTo(x-r,wy);ctx.quadraticCurveTo(x,wy+Math.sin(T+i)*3,x+r,wy);ctx.stroke();}
  if(mood!=='uncanny'&&mood!=='revelation'){
    ctx.strokeStyle=`rgba(100,150,180,${mood==='tense'?0.35:0.18})`;ctx.lineWidth=.6;
    for(const d of rainDrops){d.y+=d.spd;if(d.y>y+r){d.y=y-r;d.x=x+(Math.random()-.5)*r*2;}ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-1,d.y+d.len);ctx.stroke();}
  }
  if(mood==='uncanny'){const cg=ctx.createRadialGradient(x,y-r*.3,0,x,y,r);cg.addColorStop(0,'rgba(60,140,180,0.08)');cg.addColorStop(1,'rgba(60,140,180,0)');ctx.fillStyle=cg;ctx.fillRect(x-r,y-r,r*2,r*2);}
  ctx.restore();
  ctx.strokeStyle='#2a3c48';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,r*.87,0,Math.PI*2);ctx.stroke();
}
drawAtmos();
const SAVE_KEY='spasibo_save',PLAY_KEY='spasibo_plays',FLAGS_KEY='spasibo_past_flags';
let G={phase:'title',mode:'attended',stats:{vigilance:0,composure:0,communion:0,doubt:0},charisms:[],thoughts:{available:[],cabinet:[],settled:[]},thoughtPendingSeat:null,cover:{posting:null,background:null,denomination:null,connection:null,left:null},notes:[],flags:new Set(),scene:'chapel_waking',panelOpen:null,confirmRestart:false,playCount:parseInt(localStorage.getItem(PLAY_KEY)||'0'),pastFlags:JSON.parse(localStorage.getItem(FLAGS_KEY)||'[]')};
function iconWord(){return G.playCount>=4?'\u0418\u043a\u043e\u043d':G.playCount>=2?'ikon':'icon';}

const MAX_THOUGHT_SLOTS=4,THOUGHT_THRESHOLD=8;
const THOUGHTS={
  gnoti_seauton:{name:'Gnōthi Seautón',fragment:'γνῶθι σεαυτόν',origin:"Delphic oracle. Inscribed at Apollo's sanctuary.",sitting:'The question turns over. You keep arriving at the same absence.',settled:'Know thyself. The absence has a shape now. You begin to recognise it.',effect:{doubt:1},effect_desc:'Unlocks deeper memory options in the chapel.'},
  in_principio:{name:'In Principio',fragment:'In principio erat Verbum',origin:'John 1:1. Vulgate Latin. Jerome, 4th century.',sitting:'Before language. Before the word. What was before the word?',settled:'In the beginning was the Word. The script on the icon uses a different alphabet. You are beginning to think you know what kind.',effect:{vigilance:1},effect_desc:'Heightens perception of written things in strange scripts.'},
  kenosis_thought:{name:'Kenōsis',fragment:'κένωσις',origin:'Philippians 2:7. The self-emptying of Christ.',sitting:'What you give up to make room. What arrives in the room you make.',settled:'To empty yourself so something else can fill you. Pavel understands this. You are starting to.',effect:{communion:1},effect_desc:'Enhances Communion when you hold back in conversation.'},
  agape:{name:'Agāpē',fragment:'ἀγάπη',origin:'New Testament Greek. Distinct from eros and philia.',sitting:'Love that does not require return. You are trying to feel the edges of it.',settled:'She loves you this way. You begin to understand what that might mean for the mission.',effect:{communion:1},effect_desc:'Unlocks certain questions with Pavel about what you were sent to do.'},
  null_set:{name:'The Empty Set',fragment:'∅',origin:'Set theory. Cantor, Zermelo-Fraenkel.',sitting:'What remains when everything is removed. The structure of reaching.',settled:'Not-knowing has a form. You can work with a form.',effect:{doubt:1},effect_desc:'Allows apophatic moves in conversations — defining by what something is not.'},
  sobornost:{name:'Sobornost',fragment:'Соборность',origin:'Russian Orthodox theology. Khomiakov, 19th century.',sitting:'The collective as spiritual reality. The comrade in everyone. You keep returning to it.',settled:'The word the Soviet project inherited without knowing it had. Something in the cargo hold knows this word too.',effect:{communion:1},effect_desc:'Deepens your understanding of what the container may carry and why it matters.'},
  via_negativa:{name:'Via Negativa',fragment:'ἀπόφασις',origin:'Pseudo-Dionysius the Areopagite. 5th–6th century.',sitting:'You cannot say what it is. You can say what it is not.',settled:'In the residue: something. Haircut knows this method. She applied it to you.',effect:{doubt:1},effect_desc:'Reduces uncertainty in situations where certainty is structurally unavailable.'},
  magnificat:{name:'The Magnificat',fragment:'Magnificat anima mea Dominum',origin:"Luke 1:46–55. Mary's song.",sitting:'The hungry filled. The rich sent away empty. You are still deciding if you read this right.',settled:'The revolutionary embedded in the liturgy. The crew below decks heard what they needed. Which may be the same thing.',effect:{communion:1},effect_desc:'Changes how the crew below decks respond to you throughout the crossing.'},
};
function thoughtAvailable(id){return G.thoughts.available.includes(id);}
function thoughtInCabinet(id){return G.thoughts.cabinet.some(t=>t.id===id);}
function thoughtSettled(id){return G.thoughts.settled.includes(id);}
function thoughtKnown(id){return thoughtAvailable(id)||thoughtInCabinet(id)||thoughtSettled(id);}
function offerThought(id){if(!id||!THOUGHTS[id]||thoughtKnown(id))return;G.thoughts.available.push(id);showToast('New thought: '+THOUGHTS[id].name,'thought');}
function seatThought(id){
  if(thoughtInCabinet(id)||thoughtSettled(id))return;
  if(G.thoughts.cabinet.length>=MAX_THOUGHT_SLOTS){G.thoughtPendingSeat=id;G.panelOpen='thoughts';render();return;}
  G.thoughts.available=G.thoughts.available.filter(x=>x!==id);
  G.thoughts.cabinet.push({id,progress:0});G.thoughtPendingSeat=null;
  showToast(THOUGHTS[id].name+': sitting with it.','thought');render();
}
function releaseThought(id){
  G.thoughts.cabinet=G.thoughts.cabinet.filter(t=>t.id!==id);
  const pending=G.thoughtPendingSeat;G.thoughtPendingSeat=null;
  if(pending){setTimeout(()=>seatThought(pending),50);}else render();
}
function tickThoughts(){
  const settled=[];
  G.thoughts.cabinet=G.thoughts.cabinet.map(t=>{const p=t.progress+1;if(p>=THOUGHT_THRESHOLD){settled.push(t.id);return null;}return{id:t.id,progress:p};}).filter(Boolean);
  settled.forEach(id=>{G.thoughts.settled.push(id);const t=THOUGHTS[id];if(t&&t.effect)applyEffect(t.effect);showToast(t.name+': settled.','thought');});
}
function progressBar(p,max){const f=Math.round((p/max)*8);return'█'.repeat(f)+'░'.repeat(8-f);}

const SCENES={"chapel_waking":{"location":"The Ship's Chapel","mood":"neutral","hub":true,"text":["The light is the wrong kind for morning and the wrong kind for evening. Ship light: yellow, from overhead, not quite enough.","A small room. Iron walls painted grey over grey. A narrow bunk. A table: Bible, prayer book, and a small {ICON}. The face worn to near-nothing.","A porthole, round and framed in iron. Beyond it: the North Atlantic. Grey. Moving. Doing what it does.","This is the ship's chapel. You sleep here because the ship's chaplain sleeps in the chapel. You are the ship's chaplain.","You have been at sea for some time. You do not know, with precision, how long."],"anamnesis":{"after":1,"text":"The {ICON} is facing the wrong direction. You are certain it was not, before.","note":"icon_wrong_direction"},"choices":[{"text":"Examine the {ICON}.","next":"chapel_icon","once":true},{"text":"Look out the porthole.","next":"chapel_porthole"},{"text":"Try to remember how long you've been aboard.","next":"chapel_memory","effect":{"doubt":1},"thought":"gnoti_seauton"},{"text":"Hold vespers. The crew should have a service.","next":"vespers_approach","show_if":"met_pavel_flag","style":"vespers"},{"text":"Go out to the corridor.","next":"corridor_first"}]},"chapel_icon":{"location":"The Ship's Chapel","mood":"uncanny","return_to":"chapel_waking","return_label":"Return to the chapel.","on_enter":{"note":"icon_examined","thought":"in_principio"},"text":["You lift it. Old — older than this ship by a long way. The wood warm with handling.","The face worn to a suggestion: two dark places for eyes, a darker place for a mouth. Traces of gold. A halo that has almost entirely given itself back.","You turn it over. On the back: a script you cannot name. Not Cyrillic. Older, or different. No alphabet you can locate with certainty.","You are a chaplain. You know {ICON}s. You do not know this one.","You set it back down carefully."],"choices":[{"text":"Make a note of the writing. This matters.","next":"chapel_waking","effect":{"vigilance":1}},{"text":"Leave it. Some things you look at once.","next":"chapel_waking"}]},"chapel_porthole":{"location":"The Ship's Chapel","mood":"neutral","return_to":"chapel_waking","return_label":"Step back.","text":["You press close enough to feel the cold through the glass.","The North Atlantic does not perform. It is simply there, grey and immense.","The line between water and sky is not clean. Fog, or the beginning of fog. Things do not stop cleanly out here."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"chapel_memory":{"location":"The Ship's Chapel","mood":"tense","return_to":"chapel_waking","return_label":"Stop trying.","on_enter":{"note":"crossing_noted"},"text":["You try.","There is a harbour — the most recent clear thing. A grey morning. Diesel and fish. Someone checking your papers without looking up.","Before that: a room with someone in it. The shape of what was said is present. The words are not.","Before that the harbour frays. You cannot locate where you were walking from.","You stop. The effort feels less like remembering and more like reaching into dark water and finding it deeper than expected.","A thought surfaces. Something about the structure of not-knowing."],"choices":[{"text":"Sit with that thought. It might matter.","next":"chapel_waking","thought":"null_set","effect":{"doubt":1}},{"text":"Let it go. Return to the chapel.","next":"chapel_waking","style":"return"}]},"vespers_approach":{"location":"The Ship's Chapel","mood":"neutral","text":["You prepare the space. By evening, several people have found their way here. Merky Crabbit stands in the doorway — present, not attending. Two crew from below decks on the floor. Pavel in the wrong seat, warmly.","You have a reading prepared. Now you must decide what you are doing here.","Merky is watching you. The crew below decks are watching you. Pavel has already decided he approves, whatever you choose."],"choices":[{"text":"Read from the Psalms of lament. Patience in suffering.","next":"vespers_traditional","effect":{"composure":1},"set_note":"vespers_traditional","set_flag":"vespers_done"},{"text":"Read from the Magnificat. The hungry filled, the rich sent away empty.","next":"vespers_liberationist","effect":{"communion":1},"set_note":"vespers_liberationist","set_flag":"vespers_done","set_flag2":"vespers_liberation"},{"text":"Read from both. Let the congregation locate themselves.","next":"vespers_ambiguous","effect":{"doubt":1},"set_note":"vespers_ambiguous","set_flag":"vespers_done"}]},"vespers_traditional":{"location":"The Ship's Chapel","mood":"neutral","return_to":"chapel_waking","return_label":"Return to the chapel.","text":["You read the psalm of lament. How long, O Lord. The voice from the pit.","Merky relaxes by a fraction. The crew listen with the patience of people who know this feeling personally.","Pavel is computing something.","\"Good service,\" Merky says, lingering. It means: you did not say anything that will cause problems.","You are not sure that is what you were ordained for."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"vespers_liberationist":{"location":"The Ship's Chapel","mood":"tense","return_to":"chapel_waking","return_label":"Return to the chapel.","text":["You read the Magnificat. The proud scattered. The mighty put down from their seats. The hungry filled.","The crew below decks look up with the attention of people who did not expect to hear this here.","Merky is very still. The kind of stillness that is a form of attention.","Pavel has tears on his face, which he does not appear to notice.","After the service, the doorway is empty. Merky did not say good evening.","Something has shifted. You are not certain in which direction."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"},{"text":"Sit with what that stirred in you.","next":"chapel_waking","thought":"magnificat","style":"return"}]},"vespers_ambiguous":{"location":"The Ship's Chapel","mood":"neutral","return_to":"chapel_waking","return_label":"Return to the chapel.","text":["You read both. Lament and proclamation. The ancient cry and the radical promise embedded in the same liturgy.","Merky nods once. The crew below are quiet in a way that might be reflection or calculation.","\"That was careful,\" Pavel says afterward. He means: that was a decision. He noticed the decision.","You are not sure whether you withheld or offered everything and let them take what they could carry."],"choices":[{"text":"Return to the chapel.","next":"chapel_waking","style":"return"}]},"corridor_first":{"location":"Crew Corridor — Aft Section","mood":"neutral","hub":true,"text":["The corridor is narrow. Iron, painted many times. Overhead pipes. The engines — constant, structural.","Forward: the mess hall, and beyond it the passenger section. A ladder down leads to cargo. A ladder up leads to the main deck.","There is a small window at the corridor's end. Through it, a slice of deck and the grey."],"choices":[{"text":"Go forward toward the mess.","next":"mess_approach"},{"text":"Go forward, past the mess, toward the passenger section.","next":"passenger_corridor"},{"text":"Go up to the main deck.","next":"main_deck"},{"text":"Go down toward cargo.","next":"cargo_approach"},{"text":"Look through the corridor window.","next":"corridor_window","once":true}]},"corridor_window":{"location":"Crew Corridor — Aft Section","mood":"uncanny","return_to":"corridor_first","return_label":"Step back.","on_enter":{"flag":"saw_window"},"text":["A narrow view: rear deck, part of the railing, the sea beyond.","A black cat is sitting on the railing.","This is improbable. She is long-haired, dark as a filing error, sitting with the focused patience of someone conducting an evaluation.","She holds one paw up, briefly. Then she is not on the railing. You did not see her leave."],"choices":[{"text":"Go to the main deck. Look for her.","next":"main_deck","set_note":"saw_haircut_window","effect":{"vigilance":1}},{"text":"Go to the mess.","next":"mess_approach","set_note":"saw_haircut_window"},{"text":"Go below to cargo.","next":"cargo_approach","set_note":"saw_haircut_window"}]},"main_deck":{"location":"Main Deck","mood":"neutral","hub":true,"text":["Cold. More cold than you prepared for.","Iron deck, slightly wet. The railing solid. The sea in all directions.","A working vessel. Equipment lashed and secured. Hatches. A lifeboat station to port. The wheelhouse forward and up, behind glass.","The air smells of salt, something mechanical, and — very faintly — incense."],"choices":[{"text":"Walk toward the bow.","next":"deck_bow"},{"text":"Look along the port railing.","next":"deck_haircut","once":true,"hide_if":"saw_haircut"},{"text":"Approach the wheelhouse.","next":"wheelhouse_exterior"},{"text":"The railing is empty.","next":"main_deck","show_if":"saw_haircut","style":"return"},{"text":"Go back inside.","next":"corridor_first"}]},"deck_bow":{"location":"Main Deck — Bow","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["The bow cuts the water. Grey to the horizon; the horizon lost a few miles out.","The wind asks nothing of you.","Peripherally: a cat on the port railing. Long-haired, black, balanced there with the equanimity of something that does not understand why this weather would present a problem."],"choices":[{"text":"Go to the cat.","next":"deck_haircut","hide_if":"saw_haircut"},{"text":"Watch her from here.","next":"deck_haircut_watch","hide_if":"saw_haircut","effect":{"vigilance":1}},{"text":"Give her privacy. Go inside.","next":"corridor_first"},{"text":"The railing is empty.","next":"main_deck","show_if":"saw_haircut","style":"return"}]},"deck_haircut_watch":{"location":"Main Deck — Bow","mood":"uncanny","art":"haircut","on_enter":{"note":"saw_haircut","flag":"saw_haircut"},"text":["You watch.","She is large. Long-haired, black the way the space between things is black. She sits on the railing with the bearing of someone who has held this position longer than the ship.","Her purr reaches you even at this distance. A low rasp that sounds like it has been through a great deal.","She lifts one paw. Holds it — the gesture slightly beside itself, performed from memory of itself. Then sets it down.","She turns and looks at you. The quality of recognition in her eyes is older than this crossing. Patient. Complete.","Then she is not on the railing. You did not see her leave."],"choices":[{"text":"Go below. To cargo.","next":"cargo_approach"},{"text":"Go to the mess.","next":"mess_approach"},{"text":"Approach the wheelhouse.","next":"wheelhouse_exterior"},{"text":"Return to the deck.","next":"main_deck","style":"return"}]},"deck_haircut":{"location":"Main Deck — Port Railing","mood":"uncanny","art":"haircut","on_enter":{"note":"saw_haircut","flag":"saw_haircut"},"text":["You approach. She is large, long-haired, black the way a filing error is black — present without explanation.","She watches you come with the focused patience of someone conducting an evaluation. Her purr begins: a low rasp that sounds like it has been through a great deal.","When you are close enough, she lifts one paw. Holds it. The gesture slightly beside itself.","Her eyes: recognition older than this crossing. Patient. Complete. She has assessed you.","Then she is not on the railing. The answer, you will learn, was yes."],"choices":[{"text":"Stand at the railing a moment. Then go below.","next":"cargo_approach"},{"text":"Go to the mess.","next":"mess_approach"},{"text":"Approach the wheelhouse.","next":"wheelhouse_exterior"},{"text":"Return to the deck.","next":"main_deck","style":"return"}]},"wheelhouse_exterior":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["The wheelhouse is glassed in, elevated. Through the salt-hazed windows you can see the shape of the helm, the navigational instruments, the particular stillness of a space where attention is required at all times.","A man is leaning against the exterior rail below the wheelhouse, looking at the water. He is not doing anything. He has the quality of someone who is very good at not doing anything — as if the not-doing is itself a practice.","He has not looked at you. You have the impression he registered your arrival some time ago."],"choices":[{"text":"Approach him. Introduce yourself.","next":"vance_meet","requires_stat":["composure",2]},{"text":"Stay back. Watch first.","next":"vance_watch","effect":{"vigilance":1}},{"text":"[Composure 2+] Approach him.","next":"vance_meet","show_if":"__locked_composure_2__","style":"return"}]},"vance_watch":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["You watch him from a distance.","He is tall. Work-worn in a way that is different from the other crew — not weathered, exactly. More that the weather has simply stopped bothering to change him.","A black cat — Haircut — appears from somewhere and sits near his feet. He does not look down at her. She does not look up at him. They occupy the space together with the ease of long practice.","He knows the cat's name. The cat knows his. You have not heard anyone tell either of them.","He still has not looked at you. He will, when he decides to."],"on_enter":{"flag":"saw_vance"},"choices":[{"text":"Approach him now.","next":"vance_meet","requires_stat":["composure",2]},{"text":"Leave them to it. Go inside.","next":"corridor_first"}]},"vance_meet":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","on_enter":{"note":"met_vance","flag":"met_vance"},"text":["He turns to look at you before you reach him. Not startled — simply done waiting.","\"Chaplain,\" he says. His voice carries without effort, even in the wind. Not a greeting and not a question.","\"Vance Landstorm,\" he says, after a pause. \"I've been on this vessel since before you were ordained.\"","He looks at the water again. Haircut sits at his feet, conducting her own independent assessment of the horizon.","\"She's been asking about you,\" he says. He does not specify who he means."],"choices":[{"text":"\"She? Who do you mean?\"","next":"vance_she","effect":{"vigilance":1}},{"text":"\"How long have you been on this route?\"","next":"vance_route","effect":{"communion":1}},{"text":"Say nothing. Let him continue.","next":"vance_silence","effect":{"composure":1}}]},"vance_she":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["He looks at Haircut. Then back at the water.","\"The cat,\" he says.","A pause. He means this and does not mean this. Both are true.","\"She assesses everyone who boards. Takes her time about it. She's been watching you since before you noticed her.\" He pauses. \"The fact that you noticed her at all is —\" Another pause. \"The previous chaplain didn't.\"","He stops talking. He appears to be done."],"choices":[{"text":"\"What happened to the previous chaplain?\"","next":"vance_previous","effect":{"vigilance":1}},{"text":"Leave him to the water. Go inside.","next":"corridor_first"}]},"vance_route":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["\"Long enough that I've stopped counting,\" he says.","A pause. \"The ship changes on every crossing. Not the hull. Not the engines. The ship.\"","\"This crossing is different,\" he says. Not as observation. As information."],"choices":[{"text":"\"Different how?\"","next":"vance_different","effect":{"doubt":1}},{"text":"Leave him to the water.","next":"corridor_first"}]},"vance_silence":{"location":"Main Deck — Wheelhouse Approach","mood":"neutral","return_to":"main_deck","return_label":"Return to the main deck.","text":["He waits. Then, apparently deciding something, he continues.","\"There's a passenger in the forward section who's been trying to get into the wheelhouse. Says he's a lawyer. Says he needs to see the ship's papers.\" A pause. \"He's not going to.\"","\"The cargo manifest has an entry that shouldn't be there. I've seen it before.\" He stops.","\"Before what?\" you ask.","He does not answer. He turns back to the water."],"choices":[{"text":"Go find the passenger. Forward section.","next":"passenger_corridor","effect":{"vigilance":1}},{"text":"Go find the manifest. Cargo.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"Leave him to it.","next":"corridor_first"}]},"vance_previous":{"location":"Main Deck — Wheelhouse Approach","mood":"tense","return_to":"main_deck","return_label":"Return to the main deck.","text":["He is quiet for long enough that you wonder if he heard you.","\"Left the ship,\" he says finally. \"Partway through a crossing.\" Another pause. \"Voluntarily, as far as I know.\"","\"This was in —\" He stops. Starts again. \"This was some time ago. A different kind of crossing than this one. Though I'm not sure I understood that at the time.\"","Haircut presses her side against his leg briefly. He doesn't look down."],"choices":[{"text":"Leave him to the water. Go inside.","next":"corridor_first"}]},"vance_different":{"location":"Main Deck — Wheelhouse Approach","mood":"uncanny","return_to":"main_deck","return_label":"Return to the main deck.","text":["He is quiet for a while.","\"The cargo,\" he says. \"Usually I know what we're carrying by weight and feel. This crossing I don't. Something in the lower hold doesn't — accounts for itself differently.\"","\"And the passenger in the forward section. He's been on this ship before. I know his hands. He doesn't know I know.\"","He turns and looks at you directly for the first time.","\"And you,\" he says. \"You're not what the last chaplain was.\" He holds your gaze for a moment. Then he's done. Back to the water."],"choices":[{"text":"Go to the passenger section.","next":"passenger_corridor","effect":{"vigilance":1}},{"text":"Go to cargo.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"Return to the main deck.","next":"main_deck","style":"return"}]},"mess_approach":{"location":"Crew Mess","mood":"neutral","text":["Warmth, and the smell of something cooked many times in the same pot.","A crew member — fifties, weathered — sits with a mug and does not look up. Two others at the far end whose conversation stops when you appear.","The crew knows what a ship's chaplain is for. They're uncertain whether they want it."],"choices":[{"text":"Pour yourself something. Let the room adjust.","next":"mess_drink","effect":{"communion":1}},{"text":"Introduce yourself to the table.","next":"mess_intro"},{"text":"Find a corner. Watch first.","next":"mess_observe","effect":{"vigilance":1}},{"text":"This can wait. Go below.","next":"cargo_approach"},{"text":"Continue forward to the passenger section.","next":"passenger_corridor"},{"text":"Go back to the corridor.","next":"corridor_first","style":"return"}]},"mess_drink":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["The coffee is thick, nearly finished, strong enough to have opinions.","The crew member with the mug glances at you. Then away. Then at you again.","\"Chaplain,\" they say. Not entirely a greeting.","\"Yes,\" you say.","\"Merky Crabbit,\" they say. \"First mate. In approximately that order.\""],"choices":[{"text":"\"How long have you been on this route?\"","next":"merky_route","effect":{"communion":1}},{"text":"\"What should I know about this ship?\"","next":"merky_ship","effect":{"vigilance":1}},{"text":"Say nothing. Let them decide what comes next.","next":"merky_silence"}]},"mess_intro":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["You introduce yourself. The table accepts this with the mild wariness of people introduced to many things.","\"Merky Crabbit. First mate.\" A pause. \"You're the first chaplain who introduced themselves to a table.\""],"choices":[{"text":"\"Is that a problem?\"","next":"merky_ship","effect":{"composure":1}},{"text":"\"Tables often know more than they let on.\"","next":"merky_route","effect":{"communion":1}}]},"mess_observe":{"location":"Crew Mess","mood":"neutral","on_enter":{"note":"merky_introduced"},"text":["You find a corner. The two at the far end resume — something about the cargo manifest. A discrepancy in the count.","\"Merky Crabbit,\" the one with the mug says, coming over. \"First mate. You've been sitting there like you're waiting for something.\""],"choices":[{"text":"\"I was. Now I'm here.\"","next":"merky_ship","effect":{"composure":1}},{"text":"\"What was the discrepancy?\"","next":"mess_discrepancy","effect":{"vigilance":1}}]},"mess_discrepancy":{"location":"Crew Mess","mood":"tense","return_to":"mess_approach","return_label":"Return to the mess.","text":["Merky looks at you steadily. \"You have good ears for someone who just arrived.\"","\"A count in the lower hold,\" they say, after a pause. \"One entry in the manifest that doesn't match what's physically there. Which means either the manifest is wrong or something is there that shouldn't be.\" A pause. \"Or both.\"","\"We're not alarmed,\" they say, in a tone that suggests some degree of alarm."],"choices":[{"text":"\"Have you reported it?\"","next":"merky_route","effect":{"vigilance":1}},{"text":"\"I'll have a reason to go below, then.\"","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"knows_manifest_issue"}]},"merky_route":{"location":"Crew Mess","mood":"neutral","text":["\"Long enough,\" Merky says. \"Long enough that I've stopped counting crossings and started counting something else. Haven't found the right unit yet.\"","\"And you? First time on a working vessel?\"","The question is casual. It is not casual."],"choices":[{"text":"\"I requested this posting. I had my reasons.\"","next":"merky_route_b","effect":{"vigilance":1},"cover_set":{"key":"posting","value":"posting_requested"},"set_note":"cover_posting_requested","hide_if":"cover_posting_set"},{"text":"\"I was assigned. No one asked me.\"","next":"merky_route_b","effect":{"composure":1},"cover_set":{"key":"posting","value":"posting_assigned"},"set_note":"cover_posting_assigned","hide_if":"cover_posting_set"},{"text":"\"I needed to be somewhere else.\"","next":"merky_route_b","effect":{"doubt":1},"cover_set":{"key":"posting","value":"posting_escape"},"set_note":"cover_posting_escape","hide_if":"cover_posting_set"},{"text":"\"Someone asked for me. I still don't know who.\"","next":"merky_route_b","effect":{"communion":1},"cover_set":{"key":"posting","value":"posting_summoned"},"set_note":"cover_posting_summoned","hide_if":"cover_posting_set"},{"text":"[What you said before.]","next":"merky_route_b","effect":{"composure":1},"show_if":"cover_posting_set"}]},"merky_route_b":{"location":"Crew Mess","mood":"neutral","text":["Merky nods. Accepts this or files it.","\"Before the collar. What were you?\""],"choices":[{"text":"\"A teacher.\"","next":"merky_cargo_warning","effect":{"communion":1},"cover_set":{"key":"background","value":"bg_teacher"},"set_note":"cover_bg_teacher","hide_if":"cover_background_set"},{"text":"\"Medical work.\"","next":"merky_cargo_warning","effect":{"vigilance":1},"cover_set":{"key":"background","value":"bg_medical"},"set_note":"cover_bg_medical","hide_if":"cover_background_set"},{"text":"\"Civil service. Minor.\"","next":"merky_cargo_warning","effect":{"composure":1},"cover_set":{"key":"background","value":"bg_functionary"},"set_note":"cover_bg_functionary","hide_if":"cover_background_set"},{"text":"\"A student. For a very long time.\"","next":"merky_cargo_warning","effect":{"doubt":1},"cover_set":{"key":"background","value":"bg_scholar"},"set_note":"cover_bg_scholar","hide_if":"cover_background_set"},{"text":"[The same answer as before.]","next":"merky_cargo_warning","effect":{"composure":1},"show_if":"cover_background_set"}]},"merky_cargo_warning":{"location":"Crew Mess","mood":"tense","on_enter":{"note":"merky_warned_cargo"},"text":["Merky nods. Stands.","\"Stay out of cargo,\" they say. Not quite a warning. \"There's a passenger down there who shouldn't be. Keeps saying he's lost. He talks about God. Thought that might be your department.\"","\"Also: the forward passenger section has someone who keeps trying to reach the wheelhouse. Maritime lawyer, he says.\" A pause. \"He's not.\""],"choices":[{"text":"Go to cargo now.","next":"cargo_approach","effect":{"vigilance":1}},{"text":"Go to the passenger section first.","next":"passenger_corridor","effect":{"vigilance":1}},{"text":"\"What tradition did you declare the ship maintains?\"","next":"merky_tradition"},{"text":"\"Thank you.\" Go to the deck.","next":"main_deck"}]},"merky_tradition":{"location":"Crew Mess","mood":"neutral","text":["\"We maintain whatever the company told us to. Which is none.\" A pause. \"What tradition are you?\""],"choices":[{"text":"\"Orthodox.\"","next":"cargo_approach","cover_set":{"key":"denomination","value":"denom_orthodox"},"set_note":"cover_denom_orthodox","hide_if":"cover_denomination_set"},{"text":"\"Protestant.\"","next":"cargo_approach","effect":{"composure":1},"cover_set":{"key":"denomination","value":"denom_protestant"},"set_note":"cover_denom_protestant","hide_if":"cover_denomination_set"},{"text":"\"Ecumenical.\"","next":"cargo_approach","effect":{"doubt":1},"cover_set":{"key":"denomination","value":"denom_ecumenical"},"set_note":"cover_denom_ecumenical","hide_if":"cover_denomination_set"},{"text":"\"Catholic.\"","next":"cargo_approach","cover_set":{"key":"denomination","value":"denom_catholic"},"set_note":"cover_denom_catholic","hide_if":"cover_denomination_set"},{"text":"[What you said before.]","next":"cargo_approach","effect":{"composure":1},"show_if":"cover_denomination_set"}]},"merky_ship":{"location":"Crew Mess","mood":"neutral","text":["\"She's older than she looks. Or looks older than she is.\" A drink. \"Crew's solid. Cargo is none of your business. Crossing takes as long as it takes.\"","\"And the passengers? A few. One has been asking questions he doesn't have the background for.\""],"choices":[{"text":"\"What kind of questions?\"","next":"merky_cargo_warning","effect":{"vigilance":1}},{"text":"\"Sounds like chaplain work.\"","next":"merky_route","effect":{"communion":1}}]},"merky_silence":{"location":"Crew Mess","mood":"neutral","text":["Merky looks at you for a long moment. You look back.","\"Huh,\" they say. This appears to conclude something.","\"Don't go below without a reason you'd say out loud,\" they say, walking away.","You are alone with old coffee and the sense of having passed a test."],"choices":[{"text":"Go below to cargo.","next":"cargo_approach","effect":{"composure":1}},{"text":"Go to the main deck.","next":"main_deck"},{"text":"Go to the passenger section.","next":"passenger_corridor"}]},"passenger_corridor":{"location":"Passenger Corridor — Forward Section","mood":"neutral","hub":true,"text":["A narrower corridor than the crew section, but with the pretension of width: wood panelling over the iron, a strip of carpet that has absorbed decades of salt water and given up.","Three cabin doors, numbered. A common area at the end: a table, two chairs, a lamp that was built for a different ship.","From the common area: the sound of papers being moved. Someone is in there."],"choices":[{"text":"Go to the common area.","next":"passenger_common"},{"text":"Listen at the cabin doors.","next":"passenger_cabins","effect":{"vigilance":1}},{"text":"Go back to the crew section.","next":"corridor_first","style":"return"}]},"passenger_cabins":{"location":"Passenger Corridor — Forward Section","mood":"neutral","return_to":"passenger_corridor","return_label":"Return to the corridor.","text":["Cabin 1: nothing. Or the very controlled silence of someone who knows they might be listened to.","Cabin 2: movement. Something being shifted, repositioned. A muttering — not distressed. Computational.","Cabin 3: nothing at all. A quality of nothing-at-all that is different from emptiness.","You note all three and file nothing yet."],"choices":[{"text":"Go to the common area. The sound of papers.","next":"passenger_common","effect":{"vigilance":1}},{"text":"Return to the corridor.","next":"passenger_corridor","style":"return"}]},"passenger_common":{"location":"Passenger Common Area","mood":"neutral","hub":true,"text":["The common area is larger than it needs to be for a working vessel. Someone added it later, or planned optimistically.","At the table: a man in his fifties with a briefcase open in front of him, papers arranged in a pattern that is either methodical or chaotic — you cannot tell which yet. He has two pairs of glasses and is wearing one of each type simultaneously, which you take a moment to process.","He looks up. He has the face of someone who has been waiting to be interrupted by exactly you."],"choices":[{"text":"Introduce yourself.","next":"butterantonio_meet"},{"text":"Ask what he's working on.","next":"butterantonio_papers","effect":{"vigilance":1}},{"text":"Look at the notice board on the wall.","next":"passenger_notice","once":true}]},"passenger_notice":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["A notice board. Ship regulations, an outdated schedule, a hand-drawn map of the vessel's layout.","The map is interesting. Someone has added annotations in pencil — small, careful. They are not in English. Or any language you can immediately place.","Some of the annotations mark rooms that don't appear on the printed layout."],"choices":[{"text":"Make a mental note. Return to the common area.","next":"passenger_common","effect":{"vigilance":1},"set_flag":"saw_notice_map"},{"text":"Leave it. Return to the common area.","next":"passenger_common","style":"return"}]},"butterantonio_meet":{"location":"Passenger Common Area","mood":"neutral","on_enter":{"note":"met_butterantonio","flag":"met_butterantonio"},"text":["\"Chaplain!\" he says, with the relief of someone who has been waiting for the right professional. \"Excellent. Sit down, please. Please sit down. I am Craigslist Butterantonio, maritime law, semi-retired but not in any way that affects my standing, which I assure you is considerable.\"","He gestures at the other chair. You sit.","\"I have been attempting to access the ship's official documentation for three days,\" he says, \"and I want to be honest with you about that, because I think honesty is going to be important in whatever this is.\" He gestures between the two of you. \"Whatever this is.\"","His two pairs of glasses catch the lamp light simultaneously."],"choices":[{"text":"\"What documentation?\"","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"\"Whatever what is?\"","next":"butterantonio_whatever","effect":{"doubt":1}},{"text":"\"Are you all right? You seem — agitated.\"","next":"butterantonio_state","effect":{"communion":1}}]},"butterantonio_papers":{"location":"Passenger Common Area","mood":"neutral","on_enter":{"note":"met_butterantonio","flag":"met_butterantonio"},"text":["He looks up before you've spoken. \"The cargo manifest,\" he says. \"Or rather, an anomaly in the cargo manifest, which I have been attempting to cross-reference with the ship's registry, the insurance documentation — which I obtained through methods I'd rather not specify — and what I believe to be a secondary manifest that someone went to some trouble to make difficult to find.\"","A pause. \"I'm Craigslist Butterantonio. Maritime law. Two pairs of glasses — one for reading, one for distance, I find it more efficient to wear both. You're the chaplain. Good. I was hoping there would be a chaplain.\""],"choices":[{"text":"\"What anomaly?\"","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"\"Why were you hoping for a chaplain?\"","next":"butterantonio_whatever","effect":{"doubt":1}},{"text":"\"What secondary manifest?\"","next":"butterantonio_docs","effect":{"vigilance":2}}]},"butterantonio_docs":{"location":"Passenger Common Area","mood":"tense","return_to":"passenger_common","return_label":"Return to the common area.","text":["\"The manifest lists a sealed container in the lower forward hold as ‘archival material, academic, declared value nominal.' That phrase — 'declared value nominal' — is a legal flag.\" He takes his reading glasses off, puts them back on. \"It means: the shipper has declared the value to be low. But the insurance documentation lists a different figure. A much higher figure. Under a category I've only seen used twice in forty years of practice.\"","\"What category?\" you ask.","He looks at you steadily. \"Culturally significant material, provenance disputed.\" He lets that settle. \"Which means: someone is moving something that belongs, arguably, to someone else. Possibly a nation-state.\"","He closes the briefcase.","\"I am not,\" he says carefully, \"here to stop it. I'm here to understand it. There's a difference. The law has — nuances.\""],"choices":[{"text":"\"Who hired you?\"","next":"butterantonio_client","effect":{"vigilance":1}},{"text":"\"What do you think it is?\"","next":"butterantonio_guess","effect":{"doubt":1}},{"text":"Leave him to his papers. Go to cargo.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"butterantonio_whatever":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["\"Whatever this is,\" he repeats. \"Because I have been on a number of ships in a number of capacities and I have never been on a ship that felt like this one. And I've been trying to articulate what I mean by that and I keep arriving at the same answer, which is that this ship is —\" he pauses, \"paying attention.\"","\"Ships don't pay attention,\" you say.","\"No,\" he agrees. \"They don't. And yet.\" He polishes one of his lenses. \"And then there's the manifest question. And the fact that someone was in my cabin last night. Nothing was taken. Nothing was moved. But someone was there. I know the difference between an empty room and a room that someone was recently in. I've spent a great deal of my professional life in rooms.\""],"choices":[{"text":"\"What's in the manifest?\"","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"\"Did you see who it was?\"","next":"butterantonio_visitor","effect":{"vigilance":1}},{"text":"Let him sit with that. Return.","next":"passenger_common","style":"return"}]},"butterantonio_state":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["He looks at you with something like gratitude.","\"Yes,\" he says. \"Somewhat. Not in a way that's going to resolve easily, I think.\" He takes both pairs of glasses off and sets them on the table side by side. Without them he looks older and more certain of something.","\"I've been doing this work for a long time,\" he says. \"I've seen things moved across water that should not have been moved. Things that were taken. Things that were hidden. Things that people died for, though usually the dying happened elsewhere and the water was just the mechanism.\" He puts the glasses back on. \"This crossing feels like one of those. I would like to be wrong.\"","He picks up a paper and puts it down again.","\"I would like to be wrong,\" he repeats, \"but I'm not often wrong.\""],"choices":[{"text":"\"Tell me about the manifest.\"","next":"butterantonio_docs","effect":{"vigilance":1}},{"text":"\"You won't be alone in whatever this is.\"","next":"butterantonio_reassure","effect":{"communion":1}},{"text":"Leave him to it. He needs to work.","next":"passenger_common","style":"return"}]},"butterantonio_client":{"location":"Passenger Common Area","mood":"tense","return_to":"passenger_common","return_label":"Return to the common area.","text":["He looks at you for a long moment.","\"I can't tell you that,\" he says. \"Privilege. Not the usual kind — not solicitor-client, though that also applies. A different kind of privilege. A prior agreement.\" A pause. \"I can tell you that my client is not on this ship. I can tell you that my client's interests and this ship's current manifest are in direct opposition. And I can tell you that I did not expect a chaplain.\"","\"Why does the chaplain change things?\" you ask.","He looks at you with both pairs of glasses.","\"Because the chaplain is the only person on this vessel,\" he says, \"who might understand what's actually at stake. Not legally. Theologically.\""],"choices":[{"text":"\"What's at stake, theologically?\"","next":"butterantonio_stakes","effect":{"doubt":1}},{"text":"Go to cargo. Find out yourself.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"butterantonio_guess":{"location":"Passenger Common Area","mood":"uncanny","return_to":"passenger_common","return_label":"Return to the common area.","text":["\"Honestly?\" He sets down his pen. \"Something that was taken during a period when taking was easy. An object of — I want to use the word 'resonance.' Not monetary resonance. The other kind.\"","\"An object that means something,\" you say.","\"An object that means something to a great many people who are not currently in a position to say so. Or who were not, until recently, in a position to say so.\" He pauses. \"History is — unstable. Things that were settled become unsettled. Borders move. Institutions dissolve. What was property becomes contested. What was taken may become returnable.\"","He closes the briefcase with a click.","\"There's a thought here,\" he says, \"that I've been sitting with for three days and haven't been able to settle. About what things are worth and who gets to decide. You might find it useful.\""],"choices":[{"text":"\"Let me hear it.\"","next":"butterantonio_thought","effect":{"doubt":1},"thought":"sobornost"},{"text":"Go to cargo. See for yourself.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"butterantonio_thought":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["\"The thought,\" he says, \"is this: there are objects that accumulate the belief of generations. Relics. Not necessarily in the religious sense — though sometimes — but objects around which a collective understanding has crystallised. They hold what the group knows about itself.\"","\"When those objects are removed, the group loses — not just the thing. Something in the structure of collective knowing. And when they're returned ——\" He stops. \"That's what I don't know. What happens when they're returned.\"","He looks at you steadily.","\"I suspect you might know. Or be on the way to knowing.\""],"choices":[{"text":"Go to cargo.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"},{"text":"Return to the common area.","next":"passenger_common","style":"return"}]},"butterantonio_visitor":{"location":"Passenger Common Area","mood":"uncanny","return_to":"passenger_common","return_label":"Return to the common area.","text":["\"I didn't see anyone,\" he says. \"That's what I mean.\" He pauses. \"I heard the door. I heard the quality of the air change — the way it changes when someone has been in a room and then isn't. I got up. No one there.\"","\"But there was a cat sitting in the middle of the floor,\" he says. \"Looking at me. A large black cat with long hair. I've never seen it before or since.\"","\"She was assessing something,\" he says. \"I have no other word for it. She looked at me for thirty seconds and then left through a door that was not open.\" He pauses. \"I've been trying to decide what to do with that information for twenty-four hours.\""],"choices":[{"text":"\"That's Haircut,\" you say. \"She does that.\"","next":"butterantonio_haircut","requires_flag":"saw_haircut","effect":{"communion":1}},{"text":"Say nothing. Return to the common area.","next":"passenger_common","style":"return"}]},"butterantonio_haircut":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["He stares at you.","\"You know the cat,\" he says.","\"She was assessing you,\" you say. \"She does that with everyone.\"","\"And?\" he says. \"What's the verdict, when she does that?\"","\"She's never been wrong,\" you say. You're not certain how you know this. But you know it.","He considers this for a long time. Then he opens his briefcase again.","\"All right,\" he says. \"Sit down. Let me tell you everything.\""],"choices":[{"text":"Sit down. Let him tell you everything.","next":"butterantonio_docs","effect":{"vigilance":1,"communion":1}}]},"butterantonio_reassure":{"location":"Passenger Common Area","mood":"neutral","return_to":"passenger_common","return_label":"Return to the common area.","text":["He looks at you.","\"That's a very chaplain thing to say,\" he says. \"I mean that as a compliment.\"","He picks up the pen again.","\"I don't need reassurance. I need — I need someone to know what I know. In case something happens to the knowing.\"","He spreads his papers on the table.","\"Let me show you the manifest.\""],"choices":[{"text":"Let him show you the manifest.","next":"butterantonio_docs","effect":{"vigilance":1}}]},"butterantonio_stakes":{"location":"Passenger Common Area","mood":"tense","return_to":"passenger_common","return_label":"Return to the common area.","text":["\"The question of what things belong to,\" he says. \"Legally, that's property law. Which is — complex, historically. But theologically: the question of what can be owned. Whether certain things that carry the weight of a people's self-understanding can be — alienated. Transferred. Whether that transfer is — valid. In a sense that is not legal.\"","He pauses.","\"There is an object in the lower hold of this ship,\" he says, \"that belongs — in some sense that is prior to law — to a great many people who no longer have a state. Or had one, briefly, and then lost it. And who have been — I think the word is waiting.\"","He looks at you directly.","\"You're the chaplain,\" he says. \"You understand waiting.\""],"choices":[{"text":"\"Tell me everything you know.\"","next":"butterantonio_docs","effect":{"doubt":1,"vigilance":1}},{"text":"Go to cargo. See it for yourself.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"butterantonio_knows"}]},"cargo_approach":{"location":"Forward Hold — Access","mood":"neutral","text":["The ladder down. Engine noise closer. The sound of water against the hull.","Work lights — islands of yellow in the larger dark. Crates lashed with care.","Toward the far wall, a figure crouched near a stack of crates, examining something with the concentration of someone who has been in the wrong place long enough to find something to concentrate on.","Below, in the lower level, a flash of colour on a crate. Calico. A small cat, asleep.","And to the far side: a sealed container, different from the others. Smooth where the others are rough. The manifest number stencilled on its side does not match the numbers around it."],"choices":[{"text":"Approach the figure.","next":"pavel_direct"},{"text":"Pause and observe the figure first.","next":"pavel_observe","effect":{"vigilance":1}},{"text":"\"Hello?\"","next":"pavel_announce","effect":{"communion":1}},{"text":"Go to the cat in the lower level.","next":"cargo_freezer_beef","once":true},{"text":"Examine the container. The one that doesn't match.","next":"cargo_container","requires_stat":["vigilance",2],"show_if":"butterantonio_knows"},{"text":"Examine the container.","next":"cargo_container_blind","once":true,"hide_if":"butterantonio_knows","requires_stat":["vigilance",2]}]},"cargo_container":{"location":"Forward Hold — Lower Aft","mood":"tense","return_to":"cargo_approach","return_label":"Return to the main hold.","text":["You approach the container.","It is sealed with a lock that is not a shipping lock — older than the container, or made to look older. The stencilling on the side lists a manifest number, an origin code, and a description in three languages, two of which you recognise (French and Russian) and one of which you do not.","The Russian reads, loosely: archival material, institutional collection, transfer authorised.","You know enough Russian for that much. You know enough theology to know what ‘institutional collection’ has historically meant for objects of contested provenance.","A thought surfaces. Something about the word ‘transfer’ and what it means for things that should not be transferable.","The container is warm. Warmer than the hold. This has no obvious explanation."],"choices":[{"text":"Sit with the thought about transfer and ownership.","next":"cargo_approach","thought":"sobornost","effect":{"doubt":1}},{"text":"Note it and return.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"found_container","set_note":"container_found","style":"return"}]},"cargo_container_blind":{"location":"Forward Hold — Lower Aft","mood":"tense","return_to":"cargo_approach","return_label":"Return to the main hold.","text":["You approach the container.","Sealed. Older lock. The stencilling lists a manifest number that doesn't match what you glimpsed on the main manifest — a discrepancy that may be administrative or may not be.","The description is in three languages. One is Russian. You catch fragments.","The container is warm. This has no obvious explanation.","You are not sure what you're looking at. But you are looking at it, and that seems to be the right impulse."],"choices":[{"text":"Note it and return.","next":"cargo_approach","effect":{"vigilance":1},"set_flag":"found_container","set_note":"container_found","style":"return"}]},"cargo_freezer_beef":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up to the main hold.","on_enter":{"note":"met_freezer_beef"},"text":["You climb down.","On a crate, a small calico cat is asleep with the comprehensive contentment of a creature who has found the optimal arrangement of the world and entered it fully.","She does not stir as you approach. She is extremely warm in a way you can tell from a distance."],"choices":[{"text":"Reach out and pet her.","next":"freezer_beef_contact","effect":{"composure":1}},{"text":"Don't disturb her. Just sit nearby.","next":"freezer_beef_nearby","effect":{"composure":1}}]},"freezer_beef_contact":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up.","text":["Without waking, without opening her eyes, she repositions so that more of her is in contact with your hand. Then more.","She is extremely warm.","Something in your chest that has been braced releases by a degree. Not all the way. A degree.","That degree is enough."],"choices":[{"text":"Stay here a while.","next":"freezer_beef_stay","effect":{"composure":1}},{"text":"Climb back up.","next":"cargo_approach","style":"return"}]},"freezer_beef_nearby":{"location":"Forward Hold — Lower Level","mood":"neutral","art":"freezer_beef","return_to":"cargo_approach","return_label":"Climb back up.","text":["You sit on an adjacent crate.","The calico breathes. Asleep, comprehensively content. Her assessment extends to you. You are adequate. That is sufficient.","Something eases. Just given a moment to be what it is."],"choices":[{"text":"Climb back up.","next":"cargo_approach","style":"return"}]},"freezer_beef_stay":{"location":"Forward Hold — Lower Level","mood":"neutral","text":["You stay.","She is asleep on you with the complete confidence of a creature who has assessed the situation and found it safe.","Somewhere above, a man in a too-large coat is in the wrong place for reasons he cannot fully explain.","For now: this."],"choices":[{"text":"Climb back up. Find Pavel.","next":"cargo_approach","style":"return"}]},"pavel_observe":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["A man — forties, or older. A coat slightly too large. He talks quietly to himself with the tone of someone confirming a proof.","You catch: \"— she said it would be this crossing, and this is this crossing, so —\"","He stops. Looks up. He has known you were there.","\"Oh. Good. You're the chaplain, yes? I was in the wrong place. Are you the chaplain?\""],"choices":[{"text":"\"Yes. And you are?\"","next":"pavel_intro"},{"text":"\"Who told you there was a chaplain?\"","next":"pavel_who","effect":{"vigilance":1}}]},"pavel_direct":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["He looks up as you approach with the face of someone who expected to be found.","\"Ah. There you are.\" As if you had an appointment here. He folds a small piece of paper into his pocket before you can see it.","\"I keep ending up in the wrong places,\" he says, warmly. \"Are you the chaplain?\""],"choices":[{"text":"\"Yes. And you are?\"","next":"pavel_intro"},{"text":"\"What does the chaplain being here mean to you?\"","next":"pavel_meaning","effect":{"doubt":1}},{"text":"\"What are you doing in cargo?\"","next":"pavel_hold","effect":{"composure":1}}]},"pavel_announce":{"location":"Forward Hold","mood":"neutral","art":"pavel","on_enter":{"flag":"met_pavel_flag","note":"met_pavel"},"text":["\"Oh! Yes! Sorry.\" He stands — nearly knocking something over. \"I know. Wrong place.\"","He seems very pleased to see you.","\"You're the chaplain,\" he says. Not a question."],"choices":[{"text":"\"Yes. And you?\"","next":"pavel_intro"},{"text":"\"How did you know?\"","next":"pavel_how","effect":{"vigilance":1}}]},"pavel_intro":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["\"Pavel,\" he says. \"Just Pavel. Last names are very Roman. Very empire. Paul had one and then he didn't, and I think that's interesting.\"","\"I'm a passenger,\" he adds, as if this clarifies the cargo hold."],"choices":[{"text":"\"Because of the crossing.\"","next":"pavel_crossing","effect":{"doubt":1}},{"text":"\"How did you end up in cargo?\"","next":"pavel_hold"},{"text":"\"What do you need?\"","next":"pavel_need","effect":{"communion":1}}]},"pavel_who":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["\"A woman. On the deck. She said: 'there's a chaplain, and the chaplain is what's interesting about this crossing.'\"","\"My name is Pavel. No last name.\""],"choices":[{"text":"\"What did she look like?\"","next":"pavel_woman","effect":{"vigilance":2}},{"text":"\"She said I was interesting.\"","next":"pavel_crossing","effect":{"doubt":1}},{"text":"\"What do you need, Pavel?\"","next":"pavel_need","effect":{"communion":1}}]},"pavel_meaning":{"location":"Forward Hold","mood":"neutral","art":"pavel","text":["\"That's a better question than I was expecting.\" He sits on a crate.","\"My name is Pavel. I'm here because I was told to be — not told-told. The way you know something. Do you know the feeling?\" He looks steadily. \"I think you might.\""],"choices":[{"text":"\"I might. Say more.\"","next":"pavel_crossing","effect":{"doubt":1,"communion":1}},{"text":"\"What were you told?\"","next":"pavel_crossing","effect":{"vigilance":1}}]},"pavel_hold":{"location":"Forward Hold","mood":"neutral","text":["\"I was looking for a room where things work differently. I was told it might be near cargo. I was wrong.\"","\"Pavel. Passenger. Cargo hold tourist.\""],"choices":[{"text":"\"What room?\"","next":"pavel_room","effect":{"vigilance":1}},{"text":"\"I'm the chaplain.\" Go from there.","next":"pavel_need","effect":{"communion":1}}]},"pavel_how":{"location":"Forward Hold","mood":"neutral","text":["\"The collar. And the way you came down the ladder — coming somewhere rather than going somewhere.\" \"Pavel. Sorry about the hold.\""],"choices":[{"text":"\"What do you notice about this ship?\"","next":"pavel_crossing","effect":{"doubt":1}},{"text":"\"What brought you here?\"","next":"pavel_crossing"}]},"pavel_woman":{"location":"Forward Hold","mood":"uncanny","text":["\"On deck. A dark coat. She looked at me for a long time and said what she said. And then she wasn't there.\"","\"I thought it was a cat, at first.\""],"choices":[{"text":"\"There is a cat.\"","next":"pavel_crossing","set_flag":"told_pavel_haircut","effect":{"vigilance":1}},{"text":"\"Tell me more about what she said.\"","next":"pavel_crossing","effect":{"doubt":1}}]},"pavel_room":{"location":"Forward Hold","mood":"neutral","text":["\"A room where the usual rules are more suggestions. I was told it exists here. She's not always literal.\""],"choices":[{"text":"\"Who is 'she'?\"","next":"pavel_she"},{"text":"\"Tell me about this crossing.\"","next":"pavel_crossing"}]},"pavel_need":{"location":"Forward Hold","mood":"neutral","text":["\"I need someone to tell what I think is happening, so I can hear it back and find out if it holds together.\"","\"Also I'm quite cold. Is there coffee somewhere?\""],"choices":[{"text":"\"There's coffee in the mess. Come on.\"","next":"v01_end","effect":{"communion":1}},{"text":"\"Tell me what you think is happening.\"","next":"pavel_crossing","effect":{"doubt":1}}]},"pavel_crossing":{"location":"Forward Hold","mood":"neutral","text":["\"Some crossings matter. This one matters. She told me. God told me. These are the same sentence.\"","He says it without performance. The way someone says it's cold."],"choices":[{"text":"\"Who is 'she'?\"","next":"pavel_she","effect":{"vigilance":1}},{"text":"\"What does 'matters' mean here?\"","next":"pavel_matters","effect":{"doubt":1}},{"text":"\"I understand the sentence.\"","next":"pavel_understands","effect":{"communion":1},"thought":"agape"}]},"pavel_she":{"location":"Forward Hold","mood":"neutral","text":["\"She is the one I mean when I say God and want to be accurate. Generous. Patient. Not what anyone expects.\"","\"She said some things about the chaplain. I'll hold onto those until I understand them better.\""],"choices":[{"text":"\"What things?\"","next":"pavel_about_you","effect":{"doubt":2}},{"text":"\"What does she want with this crossing?\"","next":"pavel_matters","effect":{"vigilance":1}},{"text":"Let that be. Ask about his life.","next":"pavel_life","effect":{"communion":1}}]},"pavel_about_you":{"location":"Forward Hold","mood":"tense","art":"pavel","on_enter":{"note":"pavel_she_said","thought":"kenosis_thought"},"text":["Pavel looks at you for a long moment.","\"She said you're asleep. Not as an insult. She says it warmly — like someone watching a person sleep who's glad they're resting but knows it's nearly time.\"","He adjusts his coat.","\"She isn't wrong about you, you know. Sorry. I say things like that. Are you hungry? I'm always hungry on ships.\""],"choices":[{"text":"\"What does 'nearly time' mean?\"","next":"v01_end","effect":{"doubt":1}},{"text":"\"Are you always like this?\"","next":"v01_end","effect":{"communion":1}},{"text":"Walk away. You need to think.","next":"v01_end_walk"}]},"pavel_matters":{"location":"Forward Hold","mood":"neutral","text":["\"Something is going to be decided on this ship, and the deciding will have consequences beyond the crossing. That's as specific as I can be. She doesn't send memos.\""],"choices":[{"text":"\"What's your role in what's being decided?\"","next":"pavel_about_you","effect":{"doubt":1}},{"text":"\"What's mine?\"","next":"pavel_about_you","effect":{"communion":1}}]},"pavel_understands":{"location":"Forward Hold","mood":"neutral","text":["He stops. Takes inventory.","\"Good. Then we can skip several conversations I was prepared to have.\"","\"Tell me what you know about this crossing.\""],"choices":[{"text":"\"Less than you, I think.\"","next":"pavel_about_you","effect":{"communion":1}},{"text":"\"I know I'm the chaplain and I don't fully know why.\"","next":"pavel_about_you","effect":{"doubt":1}}]},"pavel_life":{"location":"Forward Hold","mood":"neutral","text":["Postal worker. Teacher of postal workers. Civic administration. Then nothing for a while. Then this.","\"She didn't ask if I was convenient. She asked if I was available. I said yes before I knew what I was saying yes to. That seemed to be the right answer.\""],"choices":[{"text":"\"What did you say yes to?\"","next":"pavel_about_you","effect":{"doubt":1}},{"text":"\"That's how it tends to work.\"","next":"pavel_about_you","effect":{"communion":1}}]},"v01_end":{"location":"Forward Hold","mood":"neutral","text":["You stay in the hold with Pavel for a while. The engines move through the floor. He talks. You listen.","You are good at listening. You may have always been good at it.","\"She isn't wrong about you, you know,\" he says at some point. He has said this before. He doesn't know he has said it before.","\"The next crossing will be different. For both of us, I think.\"","You do not yet know what you are for. But something is for you.","Спасибо.","───────────────────────────────────────────","The crossing continues."],"choices":[{"text":"[ Begin the next crossing ]","next":"__new_play__","style":"cold"}]},"v01_end_walk":{"location":"Crew Corridor — Aft Section","mood":"neutral","text":["You climb the ladder. The corridor. The ship's sounds — constant, structural, not for you.","You think about what Pavel said. About the cat on the railing. About the {ICON} and the writing on its back. About a container in the lower hold that is warmer than the hold.","You are the ship's chaplain. You are on a crossing. You do not know what you are carrying.","Спасибо.","───────────────────────────────────────────","The crossing continues."],"choices":[{"text":"[ Begin
