const MEMO_STARTS = [`TO:`, `FROM:`, `RE:`, `DATE:`, `— MEMORANDUM —`, `———`, `━`];

function paraClass(line) {
  if (MEMO_STARTS.some(s => line.startsWith(s))) return `sp sp-memo`;
  if (line.startsWith(`━`) || line.startsWith(`T H E`)) return `sp sp-rule`;
  return `sp`;
}

function effectiveStat(statName) {
  const base = STATE.stats[statName] || 0;
  const penalty = (STATE.tempPenalties || {})[statName] || 0;
  return Math.max(base - penalty, 0);
}

function canAccess(choice, stats, charisms) {
  // Use effective stats (base minus temp penalties) for gating
  const effStats = {};
  Object.keys(stats).forEach(k => { effStats[k] = effectiveStat(k); });
  if (choice.requireStat && effectiveStat(choice.requireStat.stat) < choice.requireStat.min) return false;
  if (choice.requireCharism && !charisms.includes(choice.requireCharism)) return false;
  if (choice.requireFlag && !STATE.flags[choice.requireFlag]) return false;
  if (choice.requireFlag2 && !STATE.flags[choice.requireFlag2]) return false;
  if (choice.requireFlag3 && !STATE.flags[choice.requireFlag3]) return false;
  if (choice.requireNoFlag && STATE.flags[choice.requireNoFlag]) return false;
  if (choice.requireAwareness && (STATE.awareness || 0) < choice.requireAwareness) return false;
  // maxAwareness: choice vanishes if awareness gets too high (can't pretend anymore)
  if (choice.maxAwareness !== undefined && (STATE.awareness || 0) >= choice.maxAwareness) return false;
  if (choice.maxComposure !== undefined && (STATE.stats.composure || 0) >= choice.maxComposure) return false;
  // Permanent choices that have been taken vanish entirely
  if (choice.permanent && choice.id && STATE.permanentChoicesTaken.has(choice.id)) return false;
  return true;
}

function rollCheck(statValue, difficulty, opts) {
  opts = opts || {};
  // 2d6 for tighter distribution — fewer wild swings
  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  let roll = d1 + d2;

  // Stat substitution: high intuition can substitute for composure on notation/threshold rolls
  // Use the higher of the two stats when substitution applies
  if (opts.statKey === `composure` && opts.threshold) {
    const intuition = STATE.stats.intuition || 1;
    if (intuition > statValue) {
      statValue = intuition;
      if (!opts._subNote) opts._subNote = `intuition substituting for composure`;
    }
  }

  // Awareness bonus (Continuous helps those it knows)
  const awareMod = opts.awarenessBonus ? Math.floor((STATE.awareness || 0) / 2) : 0;

  // Charism modifiers to the roll total
  let charismBonus = 0;
  let charismNote = ``;
  const ch = STATE.charisms || [];
  if (opts.mortificationSpent && ch.includes(`mortification`)) {
    charismBonus += 2;
    STATE.stats.composure = Math.max((STATE.stats.composure || 1) - 1, 1);
    charismNote = `mortification +2 (−1 composure)`;
    STATE.mortificationSpent = false; // reset
    STATE.flags[`mortification_grace`] = true; // next Presence roll gets advantage
  }
  if (opts.statKey === `presence` && ch.includes(`consolation`)) {
    charismBonus += 1; charismNote = (charismNote ? charismNote + ` / ` : ``) + `consolation +1`;
  }
  if (opts.statKey === `reason` && opts.docCheck && ch.includes(`tongues`)) {
    charismBonus += 2; charismNote = `tongues +2`;
  }
  if (ch.includes(`unmaker`) && opts.corporate) {
    charismBonus += 1;
    // But Unmaker raises awareness slightly (corrosion noticed)
    STATE.awareness = Math.min((STATE.awareness || 0) + 1, 5);
    charismNote = `unmaker +1 (awareness ↑)`;
  }
  // Void Gaze: at Awareness 3+, Threshold rolls: roll twice, take higher
  if (ch.includes(`void_gaze`) && opts.threshold && (STATE.awareness || 0) >= 3) {
    const alt1 = Math.floor(Math.random() * 6) + 1;
    const alt2 = Math.floor(Math.random() * 6) + 1;
    const alt = alt1 + alt2;
    if (alt > roll) { roll = alt; charismNote = `void gaze (took higher roll)`; }
  }
  // Mortification Grace: next Presence roll uses advantage (roll twice, take higher)
  if (opts.statKey === `presence` && STATE.flags && STATE.flags[`mortification_grace`]) {
    delete STATE.flags[`mortification_grace`]; // consumed on use
    const gc1 = Math.floor(Math.random() * 6) + 1;
    const gc2 = Math.floor(Math.random() * 6) + 1;
    const graceRoll = gc1 + gc2;
    if (graceRoll > roll) { roll = graceRoll; charismNote = (charismNote?charismNote+` / `:``)+`grace (took higher roll)`; }
  }

  // Solidarity bonus on corporate/Board rolls — collective orientation
  if (opts.corporate && (STATE.solidarity || 0) >= 3) {
    charismBonus += 1;
    charismNote = (charismNote?charismNote+` / `:``)+`solidarity +1`;
  }

  // Mortification spend: player can burn 1 Composure for +2 (handled at choice level)

  let effectiveDiff = Math.max(difficulty - awareMod, 3);

  // Seam truth modifier: reconciliation choices alter interaction difficulty
  if (opts.npcKey && STATE.truths) {
    const npcTruth = STATE.truths[`${opts.npcKey}_nature`] || STATE.truths[opts.npcKey];
    // Stacy: institutional_time → easier, stacy_continuous → harder
    if (opts.npcKey === `stacy`) {
      if (npcTruth === `institutional_time`) effectiveDiff = Math.max(effectiveDiff - 1, 3);
      else if (npcTruth === `stacy_continuous`) effectiveDiff = Math.min(effectiveDiff + 1, 9);
    }
    // sm_contradiction truths affect Continuous contact rolls
    if (opts.npcKey === `continuous`) {
      const namingTruth = STATE.truths.naming_origin;
      if (namingTruth === `continuous`) effectiveDiff = Math.max(effectiveDiff - 1, 3);
      else if (namingTruth === `file`) effectiveDiff = Math.min(effectiveDiff + 1, 9);
    }
  }

  const total = roll + statValue + charismBonus;

  // Three bands: full success, partial (diff-2 to diff-1), failure
  let outcome = `fail`;
  if (total >= effectiveDiff) outcome = `success`;
  else if (total >= effectiveDiff - 2) outcome = `partial`;

  // Discernment: on presence/social checks, partial → success
  if (outcome === `partial` && opts.social && ch.includes(`discernment`)) {
    outcome = `success`; charismNote += (charismNote ? ` / ` : ``) + `discernment (partial→success)`;
  }

  const subNote = opts._subNote || ``;
  const fullCharismNote = [charismNote, subNote].filter(Boolean).join(` / `);

  return {
    d1, d2, roll, total, statValue, charismBonus, charismNote: fullCharismNote,
    difficulty: effectiveDiff, awareMod, outcome,
    success: outcome === `success`,
    partial: outcome === `partial`,
  };
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === `className`) e.className = v;
    else if (k === `onClick`) e.addEventListener(`click`, v);
    else if (k === `disabled`) e.disabled = v;
    else if (k === `style`) Object.assign(e.style, v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === `string` ? document.createTextNode(c) : c);
  });
  return e;
}

function pre(text, cls) {
  const e = document.createElement(`pre`);
  e.className = cls || `art-block`;
  e.textContent = text;
  return e;
}

function div(cls, ...children) { return el(`div`, { className: cls }, ...children); }
function p(cls, text) { const e = document.createElement(`p`); e.className = cls; e.textContent = text; return e; }
function btn(cls, text, onClick, disabled) {
  const e = el(`button`, { className: `btn ${cls}`, onClick, disabled: !!disabled });
  e.textContent = text;
  return e;
}
function hr(cls) { const e = document.createElement(`hr`); e.className = cls; return e; }

const SAVE_KEY = `severed_hours_v12`;

// FLAGS: permanent binary decisions that close/open paths and change NPC behaviour
// flags is a plain object: { flag_name: true }
// AWARENESS: 0-5, how much the Continuous has noticed you. Shown in stats bar.
// PERMANENT_CHOICES: set of choice IDs that have been consumed and disappear

let STATE = {
  screen: `ded`,
  sceneId: `opening_darkness`,
  stats: { ...INIT_STATS },
  charisms: [],
  notes: [],
  seen: new Set(),
  visitedLeaf: new Set(),
  flags: {},
  awareness: 0,
  permanentChoicesTaken: new Set(),
  // tempPenalties: { stat: penalty_amount } — restored at defined trigger
  tempPenalties: {},
  // truths: which version of contradictory facts the player holds
  truths: {},
  // actOneEnded: tracks when Act One letter was read (restores Reason)
  actOneEnded: false,
  rollResult: null,
  lastRollEcho: null,  // { outcome, stat } — shown once in next scene
  rollChoice: null,
  saveMsg: ``,
  saveMsgTimer: null,
  selectedCharisms: [],
  confirmRestart: false,
  notesPanelOpen: false,
  statusPanelOpen: false,
  pendingToast: null,
  introStep: 0,
  introRollResult: null,
  introRollDice: null,
  buildingRevised: false,
  mortificationSpent: false,
  retrySpent: false,
  discernmentRetrySpent: false,
  poaAbsorbedThisScene: false,
  unmakerUsedThisAct: false,
  mode: `attended`,
  solidarity: 0,  // hidden — increases when player acts collectively
};

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      screen: STATE.screen,
      sceneId: STATE.sceneId,
      stats: STATE.stats,
      charisms: STATE.charisms,
      notes: STATE.notes,
      seen: [...STATE.seen],
      visitedLeaf: [...(STATE.visitedLeaf || new Set())],
      flags: STATE.flags || {},
      awareness: STATE.awareness || 0,
      permanentChoicesTaken: [...(STATE.permanentChoicesTaken || new Set())],
      mode: STATE.mode || `attended`,
      version: GAME_VERSION,
      tempPenalties: STATE.tempPenalties || {},
      truths: STATE.truths || {},
      actOneEnded: STATE.actOneEnded || false,
      solidarity: STATE.solidarity || 0,
    }));
    const saveLabels2 = (STATE.awareness || 0) >= 5 ? [`held`, `witnessed`, `retained`, `recorded`] : [`saved`];
    STATE.saveMsg = saveLabels2[Math.floor(Math.random() * saveLabels2.length)];
    if (STATE.saveMsgTimer) clearTimeout(STATE.saveMsgTimer);
    STATE.saveMsgTimer = setTimeout(() => { STATE.saveMsg = ``; render(); }, 1800);
  } catch(e) {}
}

const GAME_VERSION = 12; // v1.0 // increment when scenes are removed or renamed

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      // Version check: if save is from an older version, clear it gracefully
      if (s.version && s.version < GAME_VERSION) {
        STATE.buildingRevised = true;
        localStorage.removeItem(SAVE_KEY);
        return;
      }
      // Scene integrity check: if saved scene no longer exists, restart
      if (s.sceneId && !SCENES[s.sceneId]) {
        STATE.buildingRevised = true;
        localStorage.removeItem(SAVE_KEY);
        return;
      }
      STATE.screen = s.screen || `ded`;
      STATE.sceneId = s.sceneId || `opening_darkness`;
      STATE.stats = s.stats || { ...INIT_STATS };
      STATE.charisms = s.charisms || [];
      STATE.notes = s.notes || [];
      STATE.seen = new Set(s.seen || []);
      STATE.visitedLeaf = new Set(s.visitedLeaf || []);
      STATE.flags = s.flags || {};
      STATE.awareness = s.awareness || 0;
      STATE.permanentChoicesTaken = new Set(s.permanentChoicesTaken || []);
      STATE.mode = s.mode || `attended`;
      STATE.tempPenalties = s.tempPenalties || {};
      STATE.truths = s.truths || {};
      STATE.actOneEnded = s.actOneEnded || false;
      STATE.solidarity = s.solidarity || 0;
      if (STATE.solidarity >= 4) STATE.flags[`solidarity_high`] = true;
    }
  } catch(e) {
    localStorage.removeItem(SAVE_KEY);
  }
}

function addNote(key) {
  if (!key || STATE.seen.has(key)) return;
  STATE.seen.add(key);
  const label = NOTES[key];
  if (label) {
    STATE.notes.push(label);
    STATE.pendingToast = label; // triggers toast notification
  }
}

function applyScene(id) {
  const s = SCENES[id];
  if (!s) return;
  STATE.poaAbsorbedThisScene = false; // reset per scene

  // Act 3 safety net: if player reached completion scenes via alternate routes,
  // ensure flags are set. Prevents hub lockout from edge-case routing.
  if (id === `act_three_hub`) {
    if (STATE.seen.has(`craigslist_bond`)) STATE.flags[`act3_craigslist_done`] = true;
    if (STATE.seen.has(`learned_notation`)) STATE.flags[`act3_eliza_done`] = true;
    if (STATE.seen.has(`philomena_holding`)) STATE.flags[`act3_philomena_done`] = true;
    if ((STATE.solidarity || 0) >= 4) STATE.flags[`solidarity_high`] = true;
  }
  if (s.se) addNote(s.se);
  if (s.ses) s.ses.forEach(addNote);
  if (s.awareness) {
    STATE.awareness = Math.min((STATE.awareness || 0) + s.awareness, 5);
  }
  if (s.awarenessLoss) {
    STATE.awareness = Math.max((STATE.awareness || 0) - s.awarenessLoss, 0);
  }
  if (s.flag) {
    const flags = typeof s.flag === `string` ? [s.flag] : s.flag;
    flags.forEach(f => { STATE.flags[f] = true; });
    // Solidarity: collective actions build it
    const solidarityFlags = new Set([`craigslist_ally_early`, `trusted_stacy`,
      `act3_craigslist_done`, `act3_philomena_done`, `craigslist_bond`]);
    flags.forEach(f => { if (solidarityFlags.has(f)) STATE.solidarity = Math.min((STATE.solidarity||0)+1, 5); });
    if ((STATE.solidarity||0) >= 4) STATE.flags[`solidarity_high`] = true;
  }
  if (s.overwriteNote) {
    const idx = STATE.notes.indexOf(s.overwriteNote.old);
    if (idx >= 0) STATE.notes[idx] = s.overwriteNote.new;
    else addNote(s.overwriteNote.new); // note not found — add fresh
  }
  if (s.restorePenalties) {
    STATE.tempPenalties = {};
  }
  if (s.resetUnmaker) {
    STATE.unmakerUsedThisAct = false;
  }
  if (s.setTruth) {
    STATE.truths[s.setTruth.key] = s.setTruth.value;
  }
  if (s.tempPenaltyOnEnter && !STATE.seen.has(`_penalty_${id}`)) {
    // Only apply once per scene visit
    STATE.seen.add(`_penalty_${id}`);
    Object.entries(s.tempPenaltyOnEnter).forEach(([k, v]) => {
      STATE.tempPenalties[k] = (STATE.tempPenalties[k] || 0) + v;
    });
    addNote(`reason_penalty_active`);
  }
  // Scene-level stat effects (e.g. composure from Philomena)
  // In 'witnessed' mode, healing composure scenes don't restore the stat
  if (s.effect) {
    Object.entries(s.effect).forEach(([k, v]) => {
      if (k === `composure` && v > 0 && s.healingComposure && STATE.mode === `witnessed`) return;
      STATE.stats[k] = Math.min((STATE.stats[k] || 0) + v, 6);
    });
  }
}

function applyChoice(choice) {
  // Awareness override: at Awareness 5, one unmistakable misdirection — fires once.
  // Player chooses "Head to the lobby" from the office; arrives in the garden instead.
  if ((STATE.awareness || 0) >= 5
      && choice.next === `lobby`
      && STATE.sceneId === `opening_darkness`
      && !STATE.seen.has(`_aw5_override_fired`)) {
    STATE.seen.add(`_aw5_override_fired`);
    STATE.pendingToast = `you intended the lobby`;
    choice = { ...choice, next: `garden` };
  }

  if (choice.next === `__restart__`) {
    resetState();
    render();
    return;
  }
  if (choice.effect) {
    Object.entries(choice.effect).forEach(([k, v]) => {
      // In witnessed mode, composure healing choices don't restore the stat
      if (k === `composure` && v > 0 && choice.healingComposure && STATE.mode === `witnessed`) return;
      // Presence of Absence: absorb first stat loss — show a subtle toast hint
      if (v < 0 && (STATE.charisms || []).includes(`presence_of_absence`) && !STATE.poaAbsorbedThisScene) {
        STATE.poaAbsorbedThisScene = true;
        STATE.pendingToast = `—`;  // minimal signal: something didn't happen
        return; // absorbed
      }
      STATE.stats[k] = Math.min((STATE.stats[k] || 0) + v, 6);
    });
  }
  // Cost: reduce a stat (mechanical instability)
  if (choice.cost) {
    Object.entries(choice.cost).forEach(([k, v]) => {
      // Presence of Absence absorbs first stat loss per scene
      if ((STATE.charisms || []).includes(`presence_of_absence`) && !STATE.poaAbsorbedThisScene) {
        STATE.poaAbsorbedThisScene = true;
        STATE.pendingToast = `—`;
        return;
      }
      STATE.stats[k] = Math.max((STATE.stats[k] || 1) - v, 1);
    });
  }
  // Temporary penalty: stored separately, restored at trigger
  if (choice.tempPenalty) {
    Object.entries(choice.tempPenalty).forEach(([k, v]) => {
      STATE.tempPenalties[k] = (STATE.tempPenalties[k] || 0) + v;
    });
    addNote(`reason_penalty_active`);
  }
  // Restore temp penalties
  if (choice.restorePenalties) {
    STATE.tempPenalties = {};
    addNote(`reason_penalty_restored`);
  }
  // Set truth
  if (choice.setTruth) {
    STATE.truths[choice.setTruth.key] = choice.setTruth.value;
    // New perspectives hint: nudge player to revisit key locations
    const perspectiveHints = {
      naming_origin: `Your understanding of your name's origin is set. Some earlier documents may read differently now.`,
      stacy_nature: `Your understanding of Stacy is set. The personnel file may respond.`,
    };
    const hint = perspectiveHints[choice.setTruth.key];
    if (hint) {
      STATE.pendingToast = hint;
      addNote(`files_may_differ`); // persistent journal entry
    }
  }
  // Set flags permanently
  if (choice.flag) {
    if (typeof choice.flag === `string`) STATE.flags[choice.flag] = true;
    else choice.flag.forEach(f => { STATE.flags[f] = true; });
  }
  // Raise awareness
  if (choice.awareness) {
    STATE.awareness = Math.min((STATE.awareness || 0) + choice.awareness, 5);
  }
  if (choice.awarenessLoss) {
    STATE.awareness = Math.max((STATE.awareness || 0) - choice.awarenessLoss, 0);
    STATE.pendingToast = `grounded — awareness recedes`;
  }
  // Mark permanent choice consumed
  if (choice.permanent && choice.id) {
    STATE.permanentChoicesTaken.add(choice.id);
  }
  // Overwrite a note (mechanical instability — system becomes unstable)
  if (choice.overwriteNote) {
    const idx = STATE.notes.indexOf(choice.overwriteNote.old);
    if (idx >= 0) STATE.notes[idx] = choice.overwriteNote.new;
  }
  if (choice.se) addNote(choice.se);
  // Witnessed mode: toast notification of what this choice cost/changed
  if (STATE.mode === `witnessed`) {
    const toastParts = [];
    if (choice.awareness && choice.awareness > 0) toastParts.push(`+${choice.awareness} awareness`);
    if (choice.effect) Object.entries(choice.effect).forEach(([k,v]) => {
      if (v > 0 && choice.healingComposure) return;
      if (v !== 0) toastParts.push(`${v>0?'+':''}${v} ${k}`);
    });
    if (choice.cost) Object.entries(choice.cost).forEach(([k,v]) => toastParts.push(`−${v} ${k}`));
    if (choice.permanent && choice.id) toastParts.push(`permanent`);
    if (toastParts.length) STATE.pendingToast = toastParts.join(' · ');
  }

  if (choice.next) {
    // If this choice came from a roll resolution, store echo for next scene
    if (STATE._lastResolvedRoll) {
      STATE.lastRollEcho = STATE._lastResolvedRoll;
      STATE._lastResolvedRoll = null;
    }
    applyScene(choice.next);
    STATE.sceneId = choice.next;
  }
  STATE.rollResult = null;
  STATE.rollChoice = null;
  if (STATE.screen !== `ded` && STATE.screen !== `title`) saveGame();
  render();
  window.scrollTo({ top: 0, behavior: `smooth` });
}

// RENDER FUNCTIONS

function renderDedication() {
  const revised = STATE.buildingRevised
    ? el(`p`, { className: `ded-revised` }, `The building has been revised since your last visit. Your save has been cleared. The garden is still safe.`)
    : null;
  STATE.buildingRevised = false;
  return div(`ded`,
    hr(`ded-rule`),
    el(`p`, { className: `ded-text` }, `For Emma St Francis.\nMy everything.\nCongratulations.`),
    hr(`ded-rule`),
    revised,
    el(`br`),
    btn(`btn-pri`, `continue`, () => { STATE.screen = `title`; render(); })
  );
}

function renderTitle() {
  return div(`title`,
    pre(ART.title_box, `title-art`),
    el(`h1`, { className: `title-h` }, `The Severed Hours`),
    p(`title-sub`, `a mystery in three acts`),
    p(`title-tag`, `You do not remember your name. This feels recent.`),
    btn(`btn-pri`, `begin`, () => { STATE.screen = `msel`; _lastScreen = null; render(); })
  );
}

function renderIntroScene() {
  const steps = STATE.introStep || 0;

  const scenes = [
    {
      text: [
        `The office is exactly as you left it.`,
        `You are not sure when you left it.`,
        `On the desk: a coffee cup, still warm. A memo dated three weeks from now. Your personnel file, which is thicker than it should be for someone who does not remember working here.`,
        `The window faces the interior courtyard. In the courtyard: a cat, sitting very still, watching the window with the focused attention of a professional.`,
        `Something is wrong. Not dramatically wrong — the wrongness is subtle, the kind you feel before you can name it.`,
        `The calendar on the wall reads October 14th.`,
        `You have the distinct sense that it has read October 14th before.`,
      ],
      choice: `Look more carefully at the calendar.`,
    },
    {
      text: [
        `The calendar is a standard wall calendar. October. A photograph of a lighthouse above the grid of dates.`,
        `October 14th is circled. In ink that looks fresh.`,
        `Below the 14, in very small handwriting — your handwriting: also 14.`,
        `Below that, smaller: 14.`,
        `You circle the 14 yourself, without deciding to. The pen is already in your hand.`,
        `This is the first thing you have done in this room that you understand completely.`,
        `Below your circle, your hand writes something else before you can stop it.`,
        `Something knocks at the door. Three beats, precise.`,
        `You steady yourself.`,
      ],
      roll: { stat: `composure`, difficulty: 3, label: `composure check — staying steady` },
      rollSuccess: `The knock is just a knock. You say: "Come in."`,
      rollPartial: `Your hand is shaking slightly. You say: "Come in." Your voice is steadier than your hand.`,
      rollFail: `Something in you tilts. You say: "Come in." The words feel borrowed.`,
      choice: `Say: "Come in."`,
    },
    {
      text: [
        `The door opens.`,
        `A woman with an expression of organised patience. "Good morning," she says. "I'm Stacy Blaeght. You've been expected."`,
        `She sets a coffee cup on the desk. The coffee smells like a specific memory you cannot locate. The cup is warm. This is the second cup. You do not remember the first.`,
        `"You don't remember your name," she says. It is not a question.`,
        `"No."`,
        `"That's alright," she says. "You will. The building keeps things."`,
        `She goes to the door. Pauses. "The building keeps things," she repeats, "and gives them back when the time is right. It has been right before. It will be right again."`,
        `She leaves.`,
        `You are in Special Matters, fifth year, October 14th.`,
        `You begin.`,
      ],
      choice: `Continue.`,
      last: true,
    },
  ];

  const current = scenes[Math.min(steps, scenes.length - 1)];
  const wrap = div(`csel`);
  wrap.style.maxWidth = `560px`;

  // Show roll result text if pending
  const introRollResult = STATE.introRollResult || null;
  if (introRollResult && current.roll) {
    const dice = STATE.introRollDice || {};
    const outcomeBand = introRollResult === `success` ? `SUCCESS`
      : introRollResult === `partial` ? `PARTIAL` : `FAILURE`;
    const outcomeCls = introRollResult === `success` ? `roll-success`
      : introRollResult === `partial` ? `roll-partial` : `roll-fail`;
    const rbox = div(`roll-box${introRollResult === `fail` ? ` roll-box-fail` : introRollResult === `partial` ? ` roll-box-partial` : ``}`);
    rbox.appendChild(p(`roll-label`, `COMPOSURE CHECK`));
    if (dice.d1 !== undefined) {
      const statVal = dice.total - dice.d1 - dice.d2;
      rbox.appendChild(p(`roll-math`, `[${dice.d1}]+[${dice.d2}] = ${dice.d1+dice.d2} + ${statVal} (composure) = ${dice.total} vs. difficulty ${current.roll.difficulty}`));
    }
    rbox.appendChild(p(`roll-result ${outcomeCls}`, `░░░░░░░░░░ ${outcomeBand}`));
    wrap.appendChild(rbox);
    const resultText = introRollResult === `success` ? current.rollSuccess
      : introRollResult === `partial` ? current.rollPartial
      : current.rollFail;
    const rp = el(`p`, { className: `sp roll-echo` }, resultText);
    rp.style.marginBottom = `1rem`;
    wrap.appendChild(rp);
  }

  current.text.forEach(line => {
    const p2 = el(`p`, { className: `sp` }, line);
    p2.style.marginBottom = `.9rem`;
    wrap.appendChild(p2);
  });

  // Show roll box if this scene has a roll and no result yet
  if (current.roll && !introRollResult) {
    const rollBox = div(`roll-box`);
    rollBox.appendChild(p(`roll-label`, current.roll.label.toUpperCase()));
    rollBox.appendChild(p(`roll-math`, `2d6 + ${current.roll.stat} vs. difficulty ${current.roll.difficulty}`));
    rollBox.style.marginTop = `1rem`;
    wrap.appendChild(rollBox);

    const rollBtn = btn(`btn-pri`, `roll`, () => {
      const d1 = Math.floor(Math.random() * 6) + 1;
      const d2 = Math.floor(Math.random() * 6) + 1;
      const statVal = STATE.stats[current.roll.stat] || 1;
      const total = d1 + d2 + statVal;
      const outcome = total >= current.roll.difficulty ? `success`
        : total >= current.roll.difficulty - 2 ? `partial` : `fail`;
      STATE.introRollResult = outcome;
      STATE.introRollDice = { d1, d2, total, outcome };
      _lastScreen = null; render();
    });
    rollBtn.style.marginTop = `.8rem`;
    wrap.appendChild(rollBtn);
    return wrap;
  }

  // Continue button (after roll resolved, or no roll)
  const nextBtn = btn(`btn-pri`,
    introRollResult ? `continue` : current.choice,
    () => {
      STATE.introRollResult = null;
      if (current.last) {
        STATE.screen = `csel`; _lastScreen = null; render();
      } else {
        STATE.introStep = steps + 1; _lastScreen = null; render();
      }
    });
  nextBtn.style.marginTop = `1.5rem`;
  wrap.appendChild(nextBtn);
  return wrap;
}

function renderModeSelect() {
  const sel = STATE.mode || `attended`;

  const modes = [
    {
      id: `attended`,
      name: `Attended`,
      desc: `The building sustains you as you work. Composure can be restored through moments of stillness — sitting with Freezer Beef, tea with Til, the garden before the descent. The retry mechanic lets you spend Composure to reroll failed Reason checks.`,
      rules: `Composure healing scenes restore the stat. Retry available on failed Reason rolls. Recommended for a first playthrough.`,
    },
    {
      id: `witnessed`,
      name: `Witnessed`,
      desc: `The building sees you clearly but does not intervene. Composure is a finite resource — once spent, it does not return through comfort or rest. What you bring down is what you have.`,
      rules: `Composure healing scenes give no mechanical benefit. Retry unavailable. Mortification spend still works — sacrifice is not healing. For players who want the stakes to be real.`,
    },

  );

function renderCharismSelect() {
  const sel = STATE.selectedCharisms;
  const MAX = 2;

  function toggle(k) {
    const i = sel.indexOf(k);
    if (i >= 0) sel.splice(i, 1);
    else if (sel.length < MAX) sel.push(k);
    render();
  }

  const grid = div(`csel-grid`);
  Object.entries(CHARISM_DEFS).forEach(([k, def]) => {
    const isSel = sel.includes(k);
    const optCls = `coption${isSel ? ` sel-${def.type}` : ``}`;
    const checkCls = `ccheck${isSel ? ` ccheck-${def.type}-on` : ``}`;
    const opt = el(`div`, { className: optCls, onClick: () => toggle(k) },
      el(`div`, { className: checkCls }, isSel ? `✓` : ``),
      div(``,
        p(`cname cname-${def.type}`, def.name),
        p(`ctype ctype-${def.type}`, def.type === `light` ? `Light Charism` : `Dark Charism`),
        p(`cdesc`, def.desc)
      )
    );
    grid.appendChild(opt);
  });

  const confirmBtn = btn(`btn-pri`, `begin with these charisms`,
    () => {
      STATE.charisms = [...sel];
      applyScene(`opening_darkness`);
      STATE.screen = `game`;
      saveGame();
      render();
    },
    sel.length !== MAX
  );

  return div(`csel`,
    el(`h2`, { className: `csel-h` }, `Starting Charisms`),
    p(`csel-sub`, `Choose two`),
    el(`p`, { className: `csel-intro` },
      `These are not skills you have learned.`,
      el(`br`), `They are things you seem to have always had.`,
      el(`br`), `Your character does not know where they came from.`,
      el(`br`), `Neither do you. Not yet.`
    ),
    p(`csel-count`, `${sel.length}/${MAX} selected`),
    grid,
    confirmBtn
  );
}

const STAT_LABELS = {
  reason:    [`reason`,    [`—`,`patterns emerge`,`files yield more`,`no lock holds`,`architecture of truth`,`the building speaks`]],
  intuition: [`intuition`, [`—`,`something stirs`,`the garden responds`,`contact deepens`,`the Continuous notices`,`you are known`]],
  composure: [`composure`, [`—`,`steady`,`the stairs are easier`,`you hold the contact`,`the depth does not shake you`,`nothing translates you`]],
  presence:  [`presence`,  [`—`,`you are here`,`rooms remember you`,`NPCs open up`,`the Board listens`,`the chair is warm`]],
};

function renderStatsBar() {
  const sbar = div(`sbar`);
  Object.entries(STATE.stats).forEach(([k, v]) => {
    const label = STAT_LABELS[k];
    const effect = label ? label[1][Math.min(v,5)] : ``;
    const penalty = (STATE.tempPenalties || {})[k] || 0;
    const effV = Math.max(v - penalty, 0);
    const s = div(`stat`);
    s.appendChild(document.createTextNode(`${k}: `));
    const bars = el(`span`, { className: `stat-val` }, `█`.repeat(Math.min(effV, 6)));
    s.appendChild(bars);
    if (penalty > 0) {
      const pen = el(`span`, { className: `stat-penalty` }, ` ▼${penalty}`);
      s.appendChild(pen);
    }
    if (effect && effect !== `—`) {
      const eff = el(`span`, { className: `stat-eff` }, ` — ${effect}`);
      s.appendChild(eff);
    }
    sbar.appendChild(s);
  });

  const cbar = div(`cbar`);
  STATE.charisms.forEach(k => {
    const def = CHARISM_DEFS[k];
    if (!def) return;
    cbar.appendChild(el(`span`, { className: `ctag ctag-${def.type}` }, def.name));
  });

  // Awareness row
  if ((STATE.awareness || 0) > 0) {
    const arow = div(`stat awareness-row`);
    const awLabels = [`—`,`noticed`,`observed`,`oriented toward`,`known`,`it is glad`];
    arow.appendChild(document.createTextNode(`the continuous: `));
    const awVal = el(`span`, { className: `stat-val awareness-val` }, `◉`.repeat(STATE.awareness));
    arow.appendChild(awVal);
    const awEff = el(`span`, { className: `stat-eff` }, ` — ${awLabels[Math.min(STATE.awareness,5)]}`);
    arow.appendChild(awEff);
    sbar.appendChild(arow);
  }

  // Mode badge
  const badgeCls = `mode-badge mode-${STATE.mode || `attended`}`;
  const badgeTxt = STATE.mode === `witnessed` ? `witnessed` : `attended`;
  sbar.appendChild(el(`span`, { className: badgeCls }, badgeTxt));

  const wrap = div(``);
  wrap.appendChild(sbar);
  if (STATE.charisms.length) wrap.appendChild(cbar);
  return wrap;
}

function renderRollBox() {
  const r = STATE.rollResult;
  const c = STATE.rollChoice;
  if (!r || !c) return null;

  const outcomeCls = r.outcome === `success` ? `roll-success`
                   : r.outcome === `partial`  ? `roll-partial`
                   : `roll-fail`;
  const boxCls = r.outcome === `success` ? `roll-box`
               : r.outcome === `partial`  ? `roll-box roll-box-partial`
               : `roll-box roll-box-fail`;

  const box = div(boxCls);
  box.appendChild(p(`roll-label`, `${c.roll.stat.toUpperCase()} CHECK`));

  // Dice display
  const diceStr = `[${r.d1}]+[${r.d2}] = ${r.roll}`;
  const statStr = `+ ${r.statValue} (${c.roll.stat})`;
  const bonusStr = r.charismBonus !== 0 ? ` + ${r.charismBonus} bonus` : ``;
  const awareStr = r.awareMod > 0 ? ` (−${r.awareMod} difficulty from awareness)` : ``;
  box.appendChild(p(`roll-math`, `${diceStr} ${statStr}${bonusStr} = ${r.total} vs. difficulty ${r.difficulty}${awareStr}`));

  if (r.charismNote) box.appendChild(p(`roll-charism`, r.charismNote));

  const outcomeTxt = r.outcome === `success` ? `░░░░░░░░░░ SUCCESS`
                   : r.outcome === `partial`  ? `░░░░░░░░░░ PARTIAL`
                   : `░░░░░░░░░░ FAILURE`;
  box.appendChild(p(`roll-result ${outcomeCls}`, outcomeTxt));

  const btnLabel = r.outcome === `success` ? `Continue (success)`
                 : r.outcome === `partial`  ? `Continue (partial success)`
                 : `Continue (failure)`;
  const continueBtn = btn(`btn-pri`, btnLabel, () => {
    let next;
    if (r.outcome === `success`) next = c.roll.successNext;
    else if (r.outcome === `partial` && c.roll.partialNext) next = c.roll.partialNext;
    else next = c.roll.failNext;
    STATE._lastResolvedRoll = { outcome: r.outcome, stat: c.roll.stat, total: r.total, diff: r.difficulty };
    applyChoice({ ...c, next });
  });
  continueBtn.style.marginTop = `.8rem`;

  const wrap = div(``);
  wrap.appendChild(box);
  wrap.appendChild(continueBtn);

  // Retry with cost: for failed/partial reason checks, spend 1 Composure to reroll
  // Retry available in Attended mode only
  const hasDisc = (STATE.charisms || []).includes(`discernment`);
  // Discernment: reroll any failed check once per scene (costs 1 awareness — seeing clearly is being seen)
  const canDiscernmentRetry = hasDisc && r.outcome !== `success` && !STATE.discernmentRetrySpent;
  // Standard retry: Attended only, Reason checks, costs Composure
  const isReasonFail = c.roll.stat === `reason` && r.outcome !== `success` && !STATE.retrySpent && STATE.mode === `attended`;
  const canRetry = isReasonFail && (STATE.stats.composure || 1) > 1;
  if (canRetry) {
    const retryBtn = btn(`btn retry-btn`,
      `Focus harder: spend 1 Composure to reroll`,
      () => {
        STATE.retrySpent = true;
        STATE.stats.composure = Math.max((STATE.stats.composure || 1) - 1, 1);
        const statVal = STATE.stats[c.roll.stat] || 1;
        STATE.rollResult = rollCheck(statVal, c.roll.difficulty, {
          awarenessBonus: c.roll.awarenessBonus, statKey: c.roll.stat,
          docCheck: c.roll.docCheck, social: c.roll.social,
          corporate: c.roll.corporate, threshold: c.roll.threshold,
        });
        render();
      }
    );
    retryBtn.style.marginTop = `.5rem`;
    wrap.appendChild(retryBtn);
  }

  // Discernment: reroll any failed check once per scene (costs 1 awareness)
  if (canDiscernmentRetry) {
    const discBtn = btn(`btn disc-retry-btn`,
      `Discernment: reroll (costs 1 awareness — seeing clearly is being seen)`,
      () => {
        STATE.discernmentRetrySpent = true;
        STATE.awareness = Math.min((STATE.awareness || 0) + 1, 5);
        const statVal = effectiveStat(c.roll.stat) || 1;
        const effectiveDiff2 = (STATE.mode === `witnessed` && c.roll.witnessedDifficulty)
          ? c.roll.witnessedDifficulty : c.roll.difficulty;
        STATE.rollResult = rollCheck(statVal, effectiveDiff2, {
          awarenessBonus: c.roll.awarenessBonus, statKey: c.roll.stat,
          docCheck: c.roll.docCheck, social: c.roll.social,
          corporate: c.roll.corporate, threshold: c.roll.threshold,
        });
        render();
      }
    );
    discBtn.style.marginTop = `.5rem`;
    wrap.appendChild(discBtn);
  }

  // Mortification: offer spend if not yet a success and player has the charism + composure > 1
  const hasMort = (STATE.charisms || []).includes(`mortification`);
  const canSpend = hasMort && (STATE.stats.composure || 1) > 1 && !STATE.mortificationSpent && r.outcome !== `success`;
  if (canSpend) {
    const mortBtn = btn(`btn mort-btn`,
      `Mortification: spend 1 Composure for +2 (reroll)`,
      () => {
        STATE.mortificationSpent = true;
        // Reroll with mortification
        const statVal = STATE.stats[c.roll.stat] || 1;
        STATE.rollResult = rollCheck(statVal, c.roll.difficulty, {
          awarenessBonus: c.roll.awarenessBonus, statKey: c.roll.stat,
          docCheck: c.roll.docCheck, social: c.roll.social,
          corporate: c.roll.corporate, threshold: c.roll.threshold,
          mortificationSpent: true,
        });
        render();
      }
    );
    mortBtn.style.marginTop = `.5rem`;
    wrap.appendChild(mortBtn);
  }

  return wrap;
}

function renderChoices(scene) {
  if (STATE.rollResult) return renderRollBox();

  // Awareness ≥ 4: one choice is quietly unavailable (the building has opinions)
  const awarenessRemoval = (STATE.awareness || 0) >= 4;
  let awarenessRemovedOne = STATE.seen.has(`_aw4_removed_${STATE.sceneId}`);

  // Pre-compute: is any real (non-fallback) ending accessible?
  // Used to suppress the fallback ending when real options exist.
  // Use canAccess directly — it handles all gate types correctly.
  // A real ending is accessible if it's not the fallback and canAccess returns true.
  const hasAnyRealEnding = scene.choices && scene.choices.some(c =>
    !c._fallback && canAccess(c, STATE.stats, STATE.charisms)
  );

  const wrap = div(`choices`);
  scene.choices.forEach(choice => {
    // Fallback ending: hide if any real ending is accessible
    if (choice._fallback && hasAnyRealEnding) return;


    const accessible = canAccess(choice, STATE.stats, STATE.charisms);
    const hasRoll = !!choice.roll;

    // Awareness ≥ 4: silently remove one non-essential accessible choice per hub
    // On opening_darkness: fires every visit (persistent disorientation on return)
    // Elsewhere: fires once per run (seen-gated)
    var aw4IsOpeningHub = STATE.sceneId === `opening_darkness`;
    if (awarenessRemoval && (!awarenessRemovedOne || aw4IsOpeningHub) && accessible && !hasRoll
        && !choice._fallback && !choice.permanent && !choice.requireFlag
        && !choice.requireCharism && !choice.lockedText && scene.choices.indexOf(choice) > 0
        && scene.choices.indexOf(choice) < scene.choices.length - 1) {
      awarenessRemovedOne = true;
      if (!aw4IsOpeningHub) STATE.seen.add(`_aw4_removed_${STATE.sceneId}`);
      return; // silently removed
    }

    // Hide choices that fail a FLAG gate entirely (permanent, binary — no value in showing)
    // Also hide maxAwareness/maxComposure failures (they've passed that window)
    // Keep requireStat/requireCharism failures visible-but-greyed (shows aspiration)
    const failsFlag = !accessible && (
      (choice.requireFlag && !STATE.flags[choice.requireFlag]) ||
      (choice.requireFlag2 && !STATE.flags[choice.requireFlag2]) ||
      (choice.requireFlag3 && !STATE.flags[choice.requireFlag3]) ||
      (choice.requireNoFlag && STATE.flags[choice.requireNoFlag]) ||
      (choice.maxAwareness !== undefined && (STATE.awareness || 0) >= choice.maxAwareness) ||
      (choice.maxComposure !== undefined && (STATE.stats.composure || 0) >= choice.maxComposure)
    );
    // Also hide permanently consumed choices (canAccess already returns false, but be explicit)
    const consumed = choice.permanent && choice.id && STATE.permanentChoicesTaken.has(choice.id);
    if (failsFlag || consumed) return; // skip entirely — don't render

    let cls = `choice`;
    if (!accessible && choice.requireCharism) {
      // Charism gates show their type via colour
      const cDef = CHARISM_DEFS[choice.requireCharism];
      cls += cDef && cDef.type === `dark` ? ` choice-locked choice-charism-dark` : ` choice-locked choice-charism-light`;
    } else if (!accessible) cls += ` choice-locked`;
    if (accessible && hasRoll) cls += ` choice-rolled`;
    if (accessible && choice.permanent && choice.id && !STATE.permanentChoicesTaken.has(choice.id)) cls += ` choice-permanent`;

    // Grey out already-visited leaf choices on hub scenes
    const alreadyVisited = (STATE.visitedLeaf || new Set()).has(choice.next);
    if (alreadyVisited) cls += ` visited`;
    // Locked endings show their prerequisite text
    if (!accessible && choice.lockedText) cls = `choice choice-locked-ending`;
    // Unmaker: can bypass ONE requireStat lock per act (not flag/charism locks)
    const hasUnmaker = (STATE.charisms || []).includes(`unmaker`);
    const unmakerBypassAvail = hasUnmaker && !STATE.unmakerUsedThisAct
      && choice.requireStat && !accessible && !choice.requireFlag && !choice.requireCharism;
    // Permanent consumed choices are hidden entirely (filtered in canAccess)

    // Cost preview tag — Attended mode only
    // Witnessed mode gets a post-choice toast instead (see applyChoice)
    if (accessible && !hasRoll && STATE.mode !== `witnessed`) {
      const costParts = [];
      if (choice.awareness && choice.awareness > 0) costParts.push(`+${choice.awareness} awareness`);
      if (choice.effect) Object.entries(choice.effect).forEach(([k,v]) => {
        if (v > 0 && choice.healingComposure) return;
        if (v !== 0) costParts.push(`${v>0?'+':''}${v} ${k}`);
      });
      if (choice.cost) Object.entries(choice.cost).forEach(([k,v]) => costParts.push(`−${v} ${k}`));
      if (choice.permanent && choice.id && !STATE.permanentChoicesTaken.has(choice.id)) costParts.push(`permanent`);
      if (costParts.length) choice._costTag = costParts.join(' · ');
      else delete choice._costTag;
    } else {
      delete choice._costTag;
    }

    const b = el(`button`, {
      className: cls,
      disabled: !accessible,
      onClick: () => {
        if (!accessible) return;
        if (hasRoll) {
          const statVal = effectiveStat(choice.roll.stat) || 1;
          // Mortification spend: player can burn 1 Composure for +2 to this roll
          // Tracked via STATE.mortificationSpent (resets each scene change)
          STATE.rollResult = rollCheck(statVal, choice.roll.difficulty, {
            awarenessBonus: choice.roll.awarenessBonus,
            statKey: choice.roll.stat,
            docCheck: choice.roll.docCheck,
            social: choice.roll.social,
            corporate: choice.roll.corporate,
            threshold: choice.roll.threshold,
            mortificationSpent: STATE.mortificationSpent || false,
          });
          STATE.rollChoice = choice;
          render();
        } else {
          applyChoice(choice);
        }
      }
    }, choice.text);

    if (!accessible && choice.lockedText) {
      const lockMsg = el(`span`, { className: `locked-ending-text` }, choice.lockedText);
      b.appendChild(lockMsg);
    }
    if (choice._costTag) {
      b.appendChild(el(`span`, { className: `choice-cost-tag` }, ` ◈ ${choice._costTag}`));
    }
    if (hasRoll && accessible) {
      const stat = choice.roll.stat;
      const diff = choice.roll.difficulty;
      let score = effectiveStat(stat) || 1;
      // Show substitution preview for threshold composure checks
      let subHint = ``;
      if (stat === `composure` && choice.roll.threshold) {
        const intuition = STATE.stats.intuition || 1;
        if (intuition > score) { score = intuition; subHint = ` (intuition substituting)`; }
      }
      // Show charism hints
      const ch = STATE.charisms || [];
      const hints = [];
      if (stat === `presence` && ch.includes(`consolation`)) hints.push(`consolation +1`);
      if (stat === `reason` && choice.roll.docCheck && ch.includes(`tongues`)) hints.push(`tongues +2`);
      if (ch.includes(`unmaker`) && choice.roll.corporate) hints.push(`unmaker +1`);
      if (ch.includes(`void_gaze`) && choice.roll.threshold && (STATE.awareness||0) >= 3) hints.push(`void gaze (roll twice)`);
      const hintStr = hints.length ? ` · ${hints.join(`, `)}` : ``;
      // Awareness mod preview
      const awareMod = choice.roll.awarenessBonus ? Math.floor((STATE.awareness||0)/2) : 0;
      const baseDiff = (STATE.mode === `witnessed` && choice.roll.witnessedDifficulty)
        ? choice.roll.witnessedDifficulty : diff;
      const effDiff = awareMod > 0 ? `${baseDiff}→${Math.max(baseDiff-awareMod,3)}` : `${baseDiff}`;
      const modeNote = (STATE.mode === `witnessed` && choice.roll.witnessedDifficulty && choice.roll.witnessedDifficulty !== diff)
        ? ` [witnessed: ${choice.roll.witnessedDifficulty}]` : ``;
      const tag = el(`span`, { className: `roll-tag` },
        `[2d6+${score} vs. difficulty ${effDiff}${hintStr}${subHint}${modeNote}]`
      );
      b.appendChild(tag);
    }

    // Unmaker bypass button for locked stat gates
    if (unmakerBypassAvail) {
      const uBtn = btn(`btn unmaker-bypass-btn`,
        `[UNMAKER] Force through (+2 awareness, irreversible)`,
        () => {
          STATE.unmakerUsedThisAct = true;
          STATE.flags[`unmaker_forced_entry`] = true;
          STATE.awareness = Math.min((STATE.awareness || 0) + 2, 5);
          applyChoice({ ...choice, requireStat: null });
        }
      );
      wrap.appendChild(uBtn);
    }

    wrap.appendChild(b);
  });
  return wrap;
}

function renderNotes() {
  if (!STATE.notes.length) return null;
  const wrap = div(`notes`);
  wrap.appendChild(p(`ntitle`, `Field Notes`));
  STATE.notes.slice(-16).forEach(n => {
    wrap.appendChild(p(`nitem`, `— ${n}`));
  });
  return wrap;
}

function renderStatusPanel() {
  const overlay = el(`div`, { className: `notes-overlay`,
    onClick: () => { STATE.statusPanelOpen = false; _lastSceneId = null; render(); }
  });
  const isUnraveling = STATE.mode === `witnessed` && (STATE.stats.composure || 1) <= 1;
  const panel = el(`div`, { className: `status-panel${isUnraveling ? ` unraveling` : ``}` });
  panel.addEventListener(`click`, e => e.stopPropagation());

  const closeBtn = el(`button`, { className: `status-panel-close`,
    onClick: () => { STATE.statusPanelOpen = false; _lastSceneId = null; render(); }
  }, `✕`);
  const heading = el(`h3`, {}, `current status`);
  heading.appendChild(closeBtn);
  panel.appendChild(heading);

  // Stats
  const stats = [`composure`, `reason`, `intuition`, `presence`];
  stats.forEach(s => {
    const base = STATE.stats[s] || 1;
    const eff = effectiveStat(s);
    const penalty = base - eff;
    const row = el(`div`, { className: `stat-row` });
    row.appendChild(el(`span`, { className: `slabel` }, s));
    const valStr = penalty > 0 ? `${eff} (${base}−${penalty} temp)` : `${eff}`;
    row.appendChild(el(`span`, { className: `sval` }, valStr));
    panel.appendChild(row);
  });

  // Awareness
  const awRow = el(`div`, { className: `stat-row` });
  awRow.appendChild(el(`span`, { className: `slabel` }, `awareness`));
  awRow.appendChild(el(`span`, { className: `sval` }, `${STATE.awareness || 0} / 5`));
  panel.appendChild(awRow);

  // Mode
  const modeRow = el(`div`, { className: `stat-row` });
  modeRow.appendChild(el(`span`, { className: `slabel` }, `mode`));
  modeRow.appendChild(el(`span`, { className: `sval` }, STATE.mode || `attended`));
  panel.appendChild(modeRow);

  // Charisms
  if (STATE.charisms && STATE.charisms.length) {
    const ch = el(`p`, { className: `run-summary-title` });
    ch.textContent = `charisms —`;
    ch.style.marginTop = `.8rem`;
    panel.appendChild(ch);

    const CHARISM_NOTES = {
      discernment: `reroll any failed check once per scene (costs 1 awareness)`,
      consolation: `+1 to presence rolls`,
      tongues: `+2 to document/reason checks`,
      presence_of_absence: `absorbs first stat loss per scene silently`,
      kenosis: `awareness gains reduced; Continuous clearer`,
      mortification: `spend 1 Composure for +2 reroll once per scene`,
      void_gaze: `threshold rolls use higher of two dice at Awareness 3+`,
      unmaker: `bypass one requireStat gate per act (+2 awareness)`,
    };
    STATE.charisms.forEach(c => {
      const def = CHARISM_DEFS[c];
      if (!def) return;
      const row = el(`div`, { className: `charism-row` });
      row.innerHTML = `<strong>${def.name}:</strong> ${CHARISM_NOTES[c] || def.desc}`;
      panel.appendChild(row);
    });
  }

  // Active penalties
  if (STATE.tempPenalties && Object.keys(STATE.tempPenalties).length) {
    const pen = el(`p`, { className: `run-summary-title` });
    pen.textContent = `temporary penalties —`;
    pen.style.marginTop = `.8rem`;
    panel.appendChild(pen);
    Object.entries(STATE.tempPenalties).forEach(([k, v]) => {
      panel.appendChild(el(`div`, { className: `charism-row` }, `${k}: −${v}`));
    });
  }

  const wrap = el(`div`, {});
  wrap.appendChild(overlay);
  wrap.appendChild(panel);
  return wrap;
}

function renderNotesPanel() {
  const overlay = el(`div`, { className: `notes-overlay`, onClick: () => {
    STATE.notesPanelOpen = false;
    _lastSceneId = null; render();
  }});
  const panel = el(`div`, { className: `notes-panel` });
  panel.addEventListener(`click`, e => e.stopPropagation());

  const closeBtn = el(`button`, { className: `notes-panel-close`,
    onClick: () => { STATE.notesPanelOpen = false; _lastSceneId = null; render(); }
  }, `✕`);
  const heading = el(`h3`, {}, `field notes`);
  heading.appendChild(closeBtn);
  panel.appendChild(heading);

  const notes = STATE.notes || [];
  if (!notes.length) {
    panel.appendChild(el(`p`, { className: `notes-panel-empty` }, `nothing recorded yet.`));
  } else {
    // Show in reverse order (most recent first)
    // Reverse map: label → NOTES key (for prerequisite highlighting)
    const labelToKey = {};
    Object.entries(NOTES).forEach(([k, v]) => { labelToKey[v] = k; });
    const PREREQ_KEYS = new Set([`read_own_letter`, `craigslist_ally_early`,
      `retreated_threshold`, `kenosis_garden`, `haircut_assessment_done`]);

    [...notes].reverse().forEach(label => {
      const key = labelToKey[label];
      const isPrereq = key && PREREQ_KEYS.has(key);
      const cls = isPrereq ? `nitem nitem-ending` : `nitem`;
      const item = el(`p`, { className: cls }, label);
      panel.appendChild(item);
    });
  }
  const wrap = el(`div`, {});
  wrap.appendChild(overlay);
  wrap.appendChild(panel);
  return wrap;
}

function renderScene() {
  const scene = SCENES[STATE.sceneId];
  if (!scene) return div(``, p(`sp`, `Error: scene not found: ${STATE.sceneId}`));

  const game = div(`game`);

  // Save indicator
  const saveInd = div(`save-indicator${STATE.saveMsg ? `` : ` save-hidden`}`,
    STATE.saveMsg || `·`);
  game.appendChild(saveInd);

  // Location
  // Awareness 5: the building watching replaces location bar
  if (scene.location) {
    const awareness5 = (STATE.awareness || 0) >= 5;
    const locText = awareness5
      ? `the continuous — present`
      : scene.location;
    const aw3 = STATE.awareness || 0;
    const locGlitch = aw3 >= 5 ? ` glitch-5` : aw3 >= 4 ? ` glitch-4` : ``;
    const locEl = p(`loc${(aw3 >= 3 || awareness5) ? ` loc-aware` : ``}${locGlitch}`, locText);
    game.appendChild(locEl);
  }

  // Stats
  game.appendChild(renderStatsBar());

  // Portrait
  if (scene.portrait && ART[scene.portrait]) {
    const aw = STATE.awareness || 0;
    const glitchCls = aw >= 5 ? `portrait glitch-5` : aw >= 4 ? `portrait glitch-4` : `portrait`;
    game.appendChild(pre(ART[scene.portrait], glitchCls));
  }

  // Run summary on final screen
  if (STATE.sceneId === `final_screen`) {
    const summaryItems = [];
    if (STATE.charisms.length) summaryItems.push(`charisms: ${STATE.charisms.join(`, `)}`);
    if (STATE.flags[`coffee_accepted`]) summaryItems.push(`you let the coffee come`);
    if (STATE.flags[`coffee_refused`]) summaryItems.push(`you kept the glass in place`);
    if (STATE.flags[`trusted_stacy`]) summaryItems.push(`Stacy knows you said her name`);
    if (STATE.flags[`craigslist_ally_early`]) summaryItems.push(`Craigslist was a genuine second`);
    if (STATE.flags[`dismissed_craigslist`]) summaryItems.push(`Craigslist was not asked early`);
    if (STATE.flags[`retreated_threshold`]) summaryItems.push(`you went back before you went through`);
    if (STATE.flags[`trusted_continuous`]) summaryItems.push(`you trusted the Continuous's version`);
    if (STATE.flags[`haircut_assessment_done`]) summaryItems.push(`Haircut completed her assessment`);
    if ((STATE.awareness || 0) >= 5) summaryItems.push(`awareness: maximum`);
    else if ((STATE.awareness || 0) >= 3) summaryItems.push(`awareness: ${STATE.awareness}`);
    if (!summaryItems.length) summaryItems.push(`a quiet run`);
    const summary = el(`div`, { className: `run-summary` });
    summary.appendChild(el(`p`, { className: `run-summary-title` }, `this run —`));
    summaryItems.forEach(item => {
      summary.appendChild(el(`p`, { className: `run-summary-item` }, item));
    });
    game.appendChild(summary);
  }

  // Art — glitch at high awareness for reality-adjacent locations
  if (scene.art && ART[scene.art]) {
    const aw2 = STATE.awareness || 0;
    const glitchable = new Set([`lobby`,`garden`,`threshold_art`,`continuous_contact`,
      `basement`,`dept_nine`,`sundial_inscription`,`archive`]);
    let artCls = `art-block`;
    if (glitchable.has(scene.art) && aw2 >= 5) artCls += ` glitch-5`;
    else if (glitchable.has(scene.art) && aw2 >= 4) artCls += ` glitch-4`;
    game.appendChild(pre(ART[scene.art], artCls));
  }

  // Stat summary for pre-descent scene
  if (scene.statSummary) {
    const comp = effectiveStat(`composure`);
    const intu = effectiveStat(`intuition`);
    const reas = effectiveStat(`reason`);
    const pres = effectiveStat(`presence`);
    const aw = STATE.awareness || 0;
    const ch = STATE.charisms || [];
    const charismNote = ch.includes(`void_gaze`) ? `Void Gaze: threshold rolls use higher of two throws.`
      : ch.includes(`kenosis`) ? `Kenosis: awareness gains reduced. Emptiness is a kind of readiness.`
      : ch.includes(`mortification`) ? `Mortification: you can spend Composure to push through.`
      : ``;
    const subNote = intu > comp ? ` Intuition (${intu}) will substitute for Composure on Threshold rolls.` : ``;
    const txt = `Composure: ${comp}. Intuition: ${intu}. Reason: ${reas}. Presence: ${pres}. Awareness: ${aw}.${subNote}${charismNote ? ` ` + charismNote : ``}`;
    game.appendChild(p(`sp inject-p stat-summary-p`, txt));
  }

  // Roll echo — one line at top of scene, cleared after display
  if (STATE.lastRollEcho) {
    const echo = STATE.lastRollEcho;
    const echoKey = `${echo.outcome}_${echo.stat}`;
    const echoMessages = {'success_reason': 'Your Reason held. The pattern resolved cleanly.', 'success_intuition': 'The orientation was true. You found what you were facing.', 'success_composure': 'You held the depth. The notation did what it was made to do.', 'success_presence': 'You were present. The room received you.', 'partial_reason': 'Partial. Your Reason found the shape of it, not the whole.', 'partial_intuition': 'Partial. The contact was real but thin.', 'partial_composure': 'Partial. You held, but not cleanly. The depth was closer than expected.', 'partial_presence': 'Partial. Something landed. Not everything.', 'fail_reason': 'Your Reason slipped. The pattern refused.', 'fail_intuition': 'The orientation failed. You faced the wrong direction.', 'fail_composure': 'The notation slipped. The depth was more than you could hold.', 'fail_presence': 'The room did not receive you. Something closed.'};
    const echoText = echoMessages[echoKey] || ``;
    if (echoText) {
      const echoEl = p(`sp roll-echo`, echoText);
      game.appendChild(echoEl);
    }
    STATE.lastRollEcho = null;
  }

  // Text
  const stxt = div(`stxt`);
  scene.text.forEach(line => {
    const cls = paraClass(line);
    stxt.appendChild(p(cls, line));
  });
  // Collision event: high awareness + low composure = the building intervenes
  if (scene.collisionIf) {
    const ci = scene.collisionIf;
    if ((STATE.awareness||0) >= ci.awareness && (STATE.stats.composure||1) <= (ci.maxComposure||1)) {
      const collKey = `_col_${STATE.sceneId}`;
      if (!STATE.seen.has(collKey)) {
        STATE.seen.add(collKey);
        const colEl = p(`sp inject-p collision-inject`, ci.text);
        stxt.appendChild(colEl);
        if (ci.effect) Object.entries(ci.effect).forEach(([k,v]) => {
          STATE.stats[k] = Math.min((STATE.stats[k]||1) + v, 6);
        });
      }
    }
  }

  // Void Gaze at Awareness 4+: sees things uninvited in any scene — once per scene
  const voidGazeKey = `_vgv_${STATE.sceneId}`;
  if ((STATE.charisms || []).includes(`void_gaze`) && (STATE.awareness || 0) >= 4
      && scene.voidGazeVision && !STATE.seen.has(voidGazeKey)) {
    STATE.seen.add(voidGazeKey);
    stxt.appendChild(p(`sp inject-p void-vision`, scene.voidGazeVision));
  }

  // Unmaker aftermath: arrived by force — scene acknowledges it once
  if (STATE.flags && STATE.flags[`unmaker_forced_entry`]) {
    delete STATE.flags[`unmaker_forced_entry`];
    stxt.appendChild(p(`sp inject-p unmaker-entry`,
      `Something in this space registers that you arrived by force rather than passage. The Continuous noted the corrosion. Whatever you find here is real — but the door knows how you opened it.`
    ));
  }

  // Inject charism/flag/stat-gated paragraphs
  if (scene.injectIf) {
    scene.injectIf.forEach(inj => {
      let show = true;
      if (inj.requireCharism && !STATE.charisms.includes(inj.requireCharism)) show = false;
      if (inj.requireFlag && !STATE.flags[inj.requireFlag]) show = false;
      if (inj.requireNoFlag && STATE.flags[inj.requireNoFlag]) show = false;
      if (inj.requireAwareness && (STATE.awareness || 0) < inj.requireAwareness) show = false;
      if (inj.maxAwareness !== undefined && (STATE.awareness || 0) >= inj.maxAwareness) show = false;
      if (inj.requireStat) {
        const val = STATE.stats[inj.requireStat.stat] || 0;
        if (inj.requireStat.inverse) { if (val >= inj.requireStat.min) show = false; }
        else { if (val < inj.requireStat.min) show = false; }
      }
      if (show) {
        const injP = p(`sp inject-p`, inj.text);
        stxt.appendChild(injP);
      }
    });
  }
  game.appendChild(stxt);

  // Choices / roll
  if (scene.choices && scene.choices.length) {
    game.appendChild(renderChoices(scene));
  }

  // Back button for examination leaf scenes
  if (scene.returnTo) {
    const backWrap = div(``);
    backWrap.style.marginTop = `1rem`;
    const backBtn = el(`button`, {
      className: `btn back-btn`,
      onClick: () => {
        STATE.visitedLeaf = STATE.visitedLeaf || new Set();
        STATE.visitedLeaf.add(STATE.sceneId);
        STATE.sceneId = scene.returnTo;
        _lastSceneId = null; // force re-render
        render();
        window.scrollTo({ top: 0, behavior: `smooth` });
      }
    }, `← back`);
    backWrap.appendChild(backBtn);
    game.appendChild(backWrap);
  }

  // Notes
 // const notes = renderNotes();
 // if (notes) game.appendChild(notes);

  // Restart bar — always visible during game
  game.appendChild(renderRestartBar());

  return game;
}

function renderRestartBar() {
  const bar = div(`restart-bar`);
  if (!STATE.confirmRestart) {
    const restartBtn = el(`button`, {
      className: `btn restart-btn`,
      onClick: () => {
        STATE.confirmRestart = true;
        _lastSceneId = null;
        render();
      }
    }, `restart from beginning`);
    bar.appendChild(restartBtn);
  } else {
    const msg = el(`span`, { className: `confirm-msg` }, `are you sure? all progress will be lost.`);
    const yes = el(`button`, {
      className: `btn confirm-yes`,
      onClick: () => {
        // Full state reset — mirrors the __restart__ handler in applyChoice
        resetState();
        render();
      }
    }, `yes, restart`);
    const no = el(`button`, {
      className: `btn confirm-no`,
      onClick: () => {
        STATE.confirmRestart = false;
        _lastSceneId = null;
        render();
      }
    }, `no, keep going`);
    bar.appendChild(msg);
    bar.appendChild(yes);
    bar.appendChild(no);
  }
  return bar;
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════

// Track last rendered scene/screen so we only rebuild DOM on real changes.
// Save indicator updates happen in-place without triggering animation.
let _lastScreen = null;
let _lastSceneId = null;
let _lastCharismSel = null;
let _lastLeafSize = 0;
let _lastRollKey = `none`;
let _lastAwareness = `0`;

function render() {
  const root = document.getElementById(`root`);
  const screenChanged = STATE.screen !== _lastScreen;
  const sceneChanged  = STATE.sceneId !== _lastSceneId;
  // Also force redraw when charism selection changes
  const selStr = STATE.selectedCharisms.join(`,`) + `|` + (STATE.mode || `attended`) + `|` + (STATE.introStep || 0) + `|` + (STATE.introRollResult || ``);
  const selChanged = selStr !== (_lastCharismSel || ``);
  if (selChanged) _lastCharismSel = selStr;
  // Force redraw when visitedLeaf changes (so hub dims visited choices)
  const leafSize = (STATE.visitedLeaf || new Set()).size;
  const leafChanged = leafSize !== (_lastLeafSize || 0);
  if (leafChanged) _lastLeafSize = leafSize;
  // Force redraw when roll result appears or clears
  const rollKey = STATE.rollResult ? `${STATE.rollResult.d1}-${STATE.rollResult.d2}-${STATE.rollResult.total}` : `none`;
  const rollChanged = rollKey !== (_lastRollKey || `none`);
  if (rollChanged) _lastRollKey = rollKey;
  // Track awareness changes (affects stats bar)
  const awareStr2 = String(STATE.awareness || 0);
  const awareChanged = awareStr2 !== (_lastAwareness || `0`);
  if (awareChanged) _lastAwareness = awareStr2;

  // Only rebuild the DOM when the screen or scene actually changes.
  if (screenChanged || sceneChanged || selChanged || leafChanged || rollChanged || awareChanged) {
    _lastScreen  = STATE.screen;
    _lastSceneId = STATE.sceneId;
    // Per-scene ability flags ONLY reset when the scene itself changes
    // (not on roll results, awareness ticks, or other mid-scene state changes)
    if (sceneChanged) {
      STATE.mortificationSpent = false;
      STATE.retrySpent = false;
      STATE.discernmentRetrySpent = false;
      STATE.poaAbsorbedThisScene = false;
    }

    root.innerHTML = ``;
    const wrap = div(`wrap`);

    if (STATE.screen === `ded`)   wrap.appendChild(renderDedication());
    else if (STATE.screen === `title`) wrap.appendChild(renderTitle());
    else if (STATE.screen === `msel`)  wrap.appendChild(renderModeSelect());
    else if (STATE.screen === `intro`) wrap.appendChild(renderIntroScene());
    else if (STATE.screen === `csel`)  wrap.appendChild(renderCharismSelect());
    else if (STATE.screen === `game`)  wrap.appendChild(renderScene());

    // Toast notification (note discovered or Witnessed stat change)
    if (STATE.screen === `game` && STATE.pendingToast) {
      const toast = el(`div`, { className: `note-toast` }, STATE.pendingToast);
      wrap.appendChild(toast);
      // Auto-clear after animation completes (3s)
      const toastVal = STATE.pendingToast;
      setTimeout(() => {
        if (STATE.pendingToast === toastVal) {
          STATE.pendingToast = null;
          // No re-render needed — toast just fades via CSS
        }
      }, 3000);
    }

    // Notes + Status buttons — visible during game
    if (STATE.screen === `game`) {
      const notesBtn = el(`button`, {
        className: `notes-btn`,
        onClick: () => {
          STATE.notesPanelOpen = !STATE.notesPanelOpen;
          STATE.statusPanelOpen = false;
          _lastSceneId = null; render();
        }
      }, `field notes`);
      wrap.appendChild(notesBtn);
      if (STATE.notesPanelOpen) wrap.appendChild(renderNotesPanel());

      const statusBtn = el(`button`, {
        className: `status-btn`,
        onClick: () => {
          STATE.statusPanelOpen = !STATE.statusPanelOpen;
          STATE.notesPanelOpen = false;
          _lastSceneId = null; render();
        }
      }, `status`);
      wrap.appendChild(statusBtn);
      if (STATE.statusPanelOpen) wrap.appendChild(renderStatusPanel());
    }

    root.appendChild(wrap);
  } else if (STATE.pendingToast) {
    // Toast pending — need a full render to show it even if scene hasn't changed
    _lastSceneId = null;
    render();
    return;
  } else {
    // Scene hasn't changed — just patch the save indicator in-place,
    // leaving the rest of the DOM (and its animation state) untouched.
    const ind = document.querySelector(`.save-indicator`);
    if (ind) {
      if ((STATE.awareness || 0) >= 5 && !STATE.saveMsg) {
        if (!window._saveInterval) {
          const cycleLabels = [`·`, `held`, `witnessed`, `reconciled`, `·`, `retained`];
          let _ci = 0;
          window._saveInterval = setInterval(() => {
            const el = document.querySelector(`.save-indicator`);
            if (!el || (STATE.awareness || 0) < 5 || STATE.saveMsg) {
              clearInterval(window._saveInterval); window._saveInterval = null; return;
            }
            _ci = (_ci + 1) % cycleLabels.length;
            el.textContent = cycleLabels[_ci];
            el.className = `save-indicator`;
          }, 1800);
        }
      } else {
        if (window._saveInterval) { clearInterval(window._saveInterval); window._saveInterval = null; }
        ind.textContent = STATE.saveMsg || `·`;
        ind.className = `save-indicator` + (STATE.saveMsg ? `` : ` save-hidden`);
      }
    }
  }
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════

loadGame();
render();
</script>
</body>
</html>
