<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Severed Hours — Cal St Francis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:      #1a1612;
  --ink-2:    #211d18;
  --rule:     #3d3528;
  --rule-hi:  #5a4e38;
  --vellum:   #e8dcc8;
  --vellum-3: #9a8a6a;
  --gold:     #c9a84c;
  --gold-hi:  #e8c870;
  --red:      #9a2820;
  --status-color: #90c060;
}

[data-theme="light"] {
  --ink:      #f6f5f4;
  --ink-2:    #ffffff;
  --rule:     #dadce0;
  --rule-hi:  #c0c2c5;
  --vellum:   #202124;
  --vellum-3: #5f6368;
  --gold:     #1a73e8;
  --gold-hi:  #4285f4;
  --red:      #c5221f;
  --status-color: #2e7d32;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--ink);
  color: var(--vellum);
  font-family: 'Spectral', Georgia, serif;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  transition: background 0.2s ease, color 0.2s ease;
}

a { color: var(--gold); text-decoration: none; transition: color .15s; }
a:hover { color: var(--gold-hi); }

/* ── NAV ── */
nav {
  border-bottom: 1px solid var(--rule);
  background: rgba(26,22,18,.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background 0.2s;
}
[data-theme="light"] nav {
  background: rgba(246,245,244,.97);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 50px;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1.75rem;
}
.nav-brand {
  font-family: 'IM Fell English', serif;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: .04em;
}
.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
  align-items: center;
}
.nav-links a {
  font-family: 'Spectral', serif;
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--vellum-3);
  transition: color .15s;
}
.nav-links a:hover { color: var(--gold); }

/* Theme toggle button */
.theme-toggle {
  background: none;
  border: 1px solid var(--rule);
  border-radius: 24px;
  padding: 4px 12px;
  font-size: 0.8rem;
  font-family: 'Spectral', serif;
  font-weight: 600;
  color: var(--vellum-3);
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.04em;
}
.theme-toggle:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-bg, rgba(201,168,76,.08));
}
.theme-toggle span {
  font-size: 1rem;
}

/* ── HAMBURGER ICON ── */
.nav-toggle {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px;
  height: 36px;
  background: none;
  border: 1px solid var(--rule);
  cursor: pointer;
  padding: 8px 7px;
  flex-shrink: 0;
}
.nav-toggle span {
  display: block;
  height: 1px;
  background: var(--vellum-3);
  transition: all .2s;
}
.nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.nav-toggle.open span:nth-child(2) { opacity: 0; }
.nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

/* ── RESPONSIVE MOBILE NAV ── */
@media (max-width: 640px) {
  .nav-toggle { display: flex; }
  .nav-links {
    display: none;
    position: fixed;
    top: 50px;
    left: 0; right: 0;
    background: rgba(26,22,18,.99);
    border-bottom: 1px solid var(--rule);
    flex-direction: column;
    gap: 0;
    padding: .5rem 0;
    z-index: 99;
  }
  [data-theme="light"] .nav-links {
    background: rgba(246,245,244,.99);
  }
  .nav-links.open { display: flex; }
  .nav-links li a, .nav-links li button {
    display: block;
    padding: .85rem 1.75rem;
    font-size: .85rem;
    letter-spacing: .1em;
    width: 100%;
    text-align: left;
  }
  .theme-toggle {
    border: none;
    border-radius: 0;
    padding: .85rem 1.75rem;
    width: 100%;
    justify-content: flex-start;
  }
}
/* ── GAME LABEL BAR ── */
.game-bar {
  background: var(--ink-2);
  border-bottom: 1px solid var(--rule-hi);
  flex-shrink: 0;
  padding: .45rem 1.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.2s, border-color 0.2s;
}
.game-bar-title {
  font-family: 'IM Fell English', serif;
  font-size: .95rem;
  color: var(--gold);
  letter-spacing: .04em;
}
.game-bar-meta {
  font-family: 'Spectral', serif;
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--vellum-3);
}

/* ── IFRAME ── */
.game-frame {
  flex: 1;
  width: 100%;
  border: none;
  display: block;
  background: #09080a;
  transition: background 0.2s;
}
[data-theme="light"] .game-frame {
  background: #e9e8e7;
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="nav-brand">Cal St Francis</span>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#support">Support</a></li>
      <li><button class="theme-toggle" id="themeToggle"><span>🌙</span> Dark</button></li>
    </ul>
  </div>
</nav>

<div class="game-bar">
  <span class="game-bar-title">The Severed Hours</span>
  <span class="game-bar-meta">Text Adventure · v1.19</span>
</div>

<iframe
  class="game-frame"
  src="games/severed-hours.html"
  title="The Severed Hours — a text adventure"
  allowfullscreen
></iframe>

<script>
const toggle = document.getElementById('navToggle');
const links  = document.getElementById('navLinks');

toggle.addEventListener('click', () => {
  toggle.classList.toggle('open');
  links.classList.toggle('open');
});

// Close menu when a link is tapped (except theme toggle)
links.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    toggle.classList.remove('open');
    links.classList.remove('open');
  });
});

// Theme switcher logic
const themeBtn = document.getElementById('themeToggle');
const setTheme = (theme) => {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const isDark = theme === 'dark';
  themeBtn.innerHTML = isDark ? '<span>🌙</span> Dark' : '<span>☀️</span> Light';
};
const savedTheme = localStorage.getItem('theme');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
if (savedTheme) {
  setTheme(savedTheme);
} else {
  setTheme(prefersDark ? 'dark' : 'light');
}
themeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const current = document.documentElement.getAttribute('data-theme');
  const newTheme = current === 'dark' ? 'light' : 'dark';
  setTheme(newTheme);
});
</script>
</body>
</html>
